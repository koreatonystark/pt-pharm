kr": "알파2 작용제/항경직제", "rx": true, "risk": "moderate", "image": "", "emoji": "💤", "summary_en": "Short-acting muscle relaxant/antispastic. Very sedating. Hypotension risk. Hepatotoxicity (rare). Do NOT use with ciprofloxacin.", "summary_kr": "단기 근이완/항경직제. 매우 강한 진정 효과. 저혈압 위험. 간독성(드물게). 시프로플록사신 병용 절대 금지.", "mechanism_en": "Alpha-2 agonist in spinal cord → inhibits spinal interneurons → ↓spasticity. Also reduces norepinephrine → hypotension.", "mechanism_kr": "척수 알파2 작용 → 척수 중간뉴런 억제 → 경직 감소. 노르에피네프린 감소 → 저혈압.", "onset": "1–2 hr (peak 1.5 hr)", "halflife": "2.5 hr", "scenarios": [{"title": "Profound sedation + PT", "title_kr": "심한 진정 효과 + PT", "body_en": "Tizanidine 8mg peaks 1.5hr post-dose with intense sedation. Schedule PT BEFORE dose or 3+ hours after. Patient may appear drunk — eyes drooping, slurred, slow movements. Driving after dose is dangerous.", "body_kr": "복용 1.5시간 후 최고 진정 효과. PT는 복용 전 또는 3시간 이상 후 계획. 환자가 술 취한 것처럼 보일 수 있음. 복용 후 운전 위험 교육."}, {"title": "Hypotension during position changes", "title_kr": "자세 변경 시 저혈압", "body_en": "Tizanidine + antihypertensive: BP can drop significantly on position change. Tilt table use with tizanidine = extra caution. Measure BP lying/sitting/standing. Tilt progression must be slow.", "body_kr": "티자니딘 + 혈압약 병용: 자세 변경 시 BP 큰 폭 하강. 틸트 테이블 사용 시 각별 주의. 와위→앉기→서기 혈압 측정 필수. 기울기 천천히."}, {"title": "Ciprofloxacin absolute contraindication", "title_kr": "시프로플록사신 절대 금기", "body_en": "Patient on tizanidine prescribed ciprofloxacin (common UTI antibiotic): THIS IS A MAJOR DRUG INTERACTION. Cipro inhibits tizanidine metabolism → toxic blood levels → profound hypotension, sedation. Notify prescriber immediately.", "body_kr": "티자니딘 + 시프로플록사신(흔한 요로감염 항생제): 중대 약물 상호작용. 시프로가 티자니딘 대사 억제 → 독성 혈중 농도 → 심각한 저혈압·진정. 즉시 처방의에게 알릴 것."}], "side_effects_en": ["Sedation — major (α2 agonism → ↓norepinephrine release → CNS depression)", "Hypotension (↓norepinephrine → vasodilation + ↓cardiac output)", "Dry mouth (↓sympathetic salivary gland stimulation)", "Hepatotoxicity — rare (CYP1A2-mediated toxic metabolite)", "Dizziness (hypotension + CNS depression combined)"], "side_effects_kr": ["진정 주요 (α2 작용 → 노르에피네프린 분비 감소 → CNS 억제)", "저혈압 (노르에피네프린 감소 → 혈관 확장 + 심박출량 감소)", "구강건조 (교감신경 타액선 자극 감소)", "간독성 드물게 (CYP1A2 매개 독성 대사물)", "어지러움 (저혈압 + CNS 억제 복합)"], "red_flags": ["[BEFORE PT] Check if patient was recently prescribed ciprofloxacin → stop PT, call prescriber immediately — MAJOR interaction: ciprofloxacin blocks tizanidine metabolism → toxic levels → severe hypotension + CNS depression", "[BEFORE PT] Schedule PT BEFORE tizanidine dose or 3+ hours after — peak sedation at 1.5 hr post-dose makes PT unsafe", "[DURING PT] BP drop >20 mmHg on any position change → slow all transitions, hold tilt table and inversion exercises", "[DURING PT] Extreme drowsiness or falls during session → stop, do not allow patient to drive home; contact caregiver", "[AFTER PT] Jaundice or right upper quadrant pain in long-term tizanidine user → refer to physician same day — hepatotoxicity"], "red_flags_kr": ["[PT 전] 최근 시프로플록사신 처방 확인 → PT 중지, 즉시 처방의 연락 — 중대한 상호작용: 시프로가 티자니딘 대사 차단 → 독성 수준 → 심각한 저혈압 + CNS 억제", "[PT 전] PT는 티자니딘 복용 전 또는 3시간 이상 후로 예약 — 복용 후 1.5시간 최고 진정으로 PT 위험", "[PT 중] 자세 변경 시 혈압 20mmHg 이상 하강 → 모든 자세 전환 속도 늦추기, 틸트 테이블 및 역전 운동 보류", "[PT 중] 세션 중 극심한 졸음 또는 낙상 → 중지, 직접 운전 금지; 보호자 연락", "[PT 후] 장기 티자니딘 복용자 황달 또는 우상복부 통증 → 당일 의사 의뢰 — 간독성"], "interactions_en": ["Ciprofloxacin: MAJOR — toxic levels", "Antihypertensives: additive hypotension", "Alcohol/CNS depressants: profound sedation", "OCP: increases tizanidine levels"], "interactions_kr": ["시프로플록사신: 금기 - 독성 수준", "혈압약: 저혈압 가중", "알코올/CNS억제제: 심각한 진정", "경구피임약: 티자니딘 혈중 농도 증가"], "chart_note_en": "Patient on Tizanidine 4mg TID for spasticity. PT session scheduled 30 min before pm dose. BP 118/72 (lying) → 106/68 (standing): acceptable. No ciprofloxacin or other contraindicated drugs per patient report.", "chart_note_kr": "티자니딘 4mg 1일 3회(경직). 오후 복용 30분 전 PT 세션. BP 118/72(와위)→106/68(서기): 허용 범위. 시프로플록사신 등 금기 약물 없음 확인.", "dosage": [{"form": "Spasticity", "normal": "4–8mg q6–8h PRN", "high": "36mg/day max"}]}, {"id": "duloxetine", "name": "Duloxetine", "brand": "Cymbalta", "name_kr": "둘록세틴", "category": "Neurological", "category_kr": "신경계", "class": "SNRI Antidepressant", "class_kr": "세로토닌·노르에피네프린 재흡수 억제제(SNRI)", "rx": true, "risk": "moderate", "image": "", "emoji": "🧠", "summary_en": "SNRI for depression, anxiety, fibromyalgia, DPN, chronic pain. Used widely in PT patients. Serotonin syndrome risk with tramadol.", "summary_kr": "우울증·불안·섬유근통·당뇨신경병증·만성 통증에 사용. PT 환자에서 매우 흔함. 트라마돌과 세로토닌 증후군 위험.", "mechanism_en": "Inhibits serotonin + norepinephrine reuptake → mood elevation, pain modulation (descending inhibition).", "mechanism_kr": "세로토닌 + 노르에피네프린 재흡수 억제 → 기분 향상, 통증 조절(하행 억제 강화).", "onset": "2–4 weeks (full effect)", "halflife": "12 hr", "scenarios": [{"title": "Serotonin syndrome with tramadol", "title_kr": "트라마돌과 세로토닌 증후군", "body_en": "Patient on duloxetine prescribed tramadol for acute PT pain. HIGH RISK: serotonin syndrome (agitation, fever, diaphoresis, clonus, tachycardia). If patient shows these signs during PT — 911 immediately. Report to prescriber before patient takes tramadol.", "body_kr": "둘록세틴 복용 중 트라마돌 추가 처방 → 세로토닌 증후군 고위험: 초조·발열·발한·간대성경련·빈맥. PT 중 이 증상 → 즉시 119. 처방 전 처방의에게 알릴 것."}, {"title": "Pain modulation benefit", "title_kr": "통증 조절 이점", "body_en": "Duloxetine for fibromyalgia: patient may have improved pain tolerance allowing better PT participation. Monitor for over-exertion — pain suppression means reduced protective feedback.", "body_kr": "섬유근통 환자의 둘록세틴: 통증 내성 향상으로 PT 참여 개선 가능. 단, 통증 억제로 과운동 위험 → 주관적 호소보다 객관적 기능 평가 중심."}, {"title": "Hypertension monitoring", "title_kr": "혈압 모니터링", "body_en": "SNRI increases norepinephrine → mild BP elevation possible. Monitor BP in hypertensive patients starting duloxetine. Coordinate with prescriber if consistent BP increase noted during PT sessions.", "body_kr": "SNRIs는 노르에피네프린 증가로 혈압 소폭 상승 가능. 고혈압 환자의 둘록세틴 시작 시 PT 세션 중 혈압 모니터링."}, {"title": "Discontinuation syndrome", "title_kr": "중단 증후군", "body_en": "Patient stopped duloxetine abruptly: 'electric shock' sensations (brain zaps), dizziness, flu-like symptoms. This is discontinuation syndrome, not withdrawal. Reassure patient; PT can continue. Advise physician about tapering.", "body_kr": "갑작스러운 중단 시 '전기 충격' 느낌·어지러움·독감 유사 증상 = 중단 증후군(금단과 다름). PT 지속 가능. 의사에게 서서히 감량 권고."}], "side_effects_en": ["Nausea (↑serotonin in GI tract → GI motility changes)", "Dry mouth (↓parasympathetic tone via NE reuptake inhibition)", "Insomnia (↑norepinephrine → CNS arousal)", "Dizziness (↓BP via α1 receptor effects)", "BP elevation (↑norepinephrine → ↑vascular resistance)", "Sweating (↑norepinephrine → ↑sympathetic tone)"], "side_effects_kr": ["구역 (소화관 세로토닌 증가 → 위장 운동 변화)", "구강건조 (NE 재흡수 억제 통한 부교감 긴장도 감소)", "불면 (노르에피네프린 증가 → CNS 각성)", "어지러움 (α1 수용체 효과 통한 혈압 감소)", "혈압 상승 (노르에피네프린 증가 → 혈관 저항 증가)", "발한 (노르에피네프린 증가 → 교감신경 긴장도 증가)"], "red_flags": ["[BEFORE PT] Patient on duloxetine recently prescribed tramadol → stop PT, call prescriber before patient takes tramadol — serotonin syndrome risk is high", "[BEFORE PT] Monitor BP in hypertensive patients new to duloxetine — SNRI raises norepinephrine → possible BP elevation at start of treatment", "[DURING PT] Agitation + fever + diaphoresis + muscle twitching (clonus) + tachycardia → call 911 immediately — serotonin syndrome emergency", "[DURING PT] Patient expresses suicidal thoughts → stop PT, stay with patient, call 988 or 911 — SNRI black box warning", "[DURING PT] Pain appears masked allowing excessive ROM → use anatomical limits not patient pain tolerance; duloxetine suppresses descending pain modulation", "[AFTER PT] Patient reports electric shock sensations, dizziness, flu symptoms (stopped duloxetine abruptly) → reassure: discontinuation syndrome, not withdrawal; advise to contact prescriber for taper"], "red_flags_kr": ["[PT 전] 둘록세틴 복용 중 최근 트라마돌 처방 → PT 중지, 트라마돌 복용 전 처방의 연락 — 세로토닌 증후군 위험 높음", "[PT 전] 둘록세틴 시작 초기 고혈압 환자 혈압 모니터링 — SNRI가 노르에피네프린 상승 → 치료 초기 혈압 상승 가능", "[PT 중] 초조 + 발열 + 발한 + 근육 연축(간대성경련) + 빈맥 → 즉시 119 호출 — 세로토닌 증후군 응급", "[PT 중] 자살 충동 표현 → PT 중지, 환자와 함께 있기, 988 또는 119 연락 — SNRI 블랙박스 경고", "[PT 중] 통증 억제로 과도한 ROM 허용 시 → 환자 통증 내성이 아닌 해부학적 한계 사용; 둘록세틴은 하행 통증 조절 억제", "[PT 후] 전기 충격 느낌, 어지러움, 독감 증상 보고(갑자기 중단) → 안심: 중단 증후군이며 금단이 아님; 감량을 위해 처방의 연락 권고"], "interactions_en": ["Tramadol: serotonin syndrome", "MAOIs: serotonin syndrome (absolute contraindication)", "Warfarin: may alter bleeding risk", "NSAIDs: additive GI/bleeding risk"], "interactions_kr": ["트라마돌: 세로토닌 증후군", "MAOIs: 세로토닌 증후군(절대 금기)", "와파린: 출혈 위험 변화", "NSAIDs: 소화관/출혈 위험 가중"], "chart_note_en": "Patient on Duloxetine 60mg QD (fibromyalgia). Pain VAS 4/10 today (improved from 7/10). No tramadol or other serotonergic drugs reported. Exercise tolerance improving.", "chart_note_kr": "둘록세틴 60mg 1일 1회(섬유근통). 통증 VAS 4/10(7/10에서 개선). 트라마돌 등 세로토닌 약물 없음 확인. 운동 내성 호전 중.", "dosage": [{"form": "Depression/Pain", "normal": "30–60mg QD", "high": "120mg/day"}]}, {"id": "oxycodone", "name": "Oxycodone", "brand": "OxyContin / Percocet", "name_kr": "옥시코돈", "category": "Pain", "category_kr": "통증", "class": "Opioid Agonist (Schedule II)", "class_kr": "오피오이드 작용제(II급 규제약물)", "rx": true, "risk": "high", "image": "", "emoji": "🚨", "summary_en": "Potent opioid. Percocet = oxycodone + APAP. Respiratory depression = overdose. Check RR before PT. Narcan (naloxone) awareness.", "summary_kr": "강력한 오피오이드. Percocet = 옥시코돈 + APAP. 호흡 억제 = 과용량. PT 전 호흡수 확인. 날록손 인지.", "mechanism_en": "Binds mu-opioid receptors in CNS → analgesia, euphoria, respiratory depression, constipation.", "mechanism_kr": "뮤 오피오이드 수용체 결합 → 진통·도취감·호흡 억제·변비.", "onset": "10–30 min (IR)", "halflife": "3–5 hr (IR) / 12 hr (ER)", "scenarios": [{"title": "Overdose triad recognition", "title_kr": "과용량 3징후 인식", "body_en": "Patient on oxycodone arrives for PT: pinpoint pupils (miosis) + respiratory rate <12 + decreased level of consciousness = OPIOID OVERDOSE TRIAD. Call 911 immediately. If clinic has naloxone (Narcan), administer per protocol.", "body_kr": "옥시코돈 복용 환자 도착 시: 점상 동공 + 호흡수 12 미만 + 의식 저하 = 오피오이드 과용량 3징후 → 즉시 119. 날록손 있으면 프로토콜 따라 투여."}, {"title": "Pain masking during exercise", "title_kr": "운동 중 통증 은폐", "body_en": "Post-surgical patient on oxycodone able to complete aggressive ROM. But opioids mask pain → tissue damage risk without feedback. Limit ROM to anatomically safe ranges, not patient-reported pain tolerance.", "body_kr": "수술 후 옥시코돈 복용 환자 공격적 ROM 가능 → 통증 은폐로 조직 손상 위험. ROM을 환자 통증 허용 범위가 아닌 해부학적 안전 범위로 제한."}, {"title": "APAP calculation (Percocet)", "title_kr": "APAP 계산(Percocet)", "body_en": "Percocet 5/325 = 5mg oxycodone + 325mg APAP. Patient taking 2 tabs q6h = 2600mg APAP/day from Percocet alone. Add regular Tylenol or NyQuil → easily approaching 4g hepatotoxic threshold.", "body_kr": "Percocet 5/325 x 2정 x 4회 = APAP 2600mg/일. 추가 타이레놀 복용 시 4g 간독성 한계치 근접. 모든 약물의 APAP 총량 계산 필수."}, {"title": "Constipation and back pain", "title_kr": "변비와 요통", "body_en": "Opioid-induced constipation is near-universal (90%+). Severe straining during Valsalva worsens lumbar disc pressure. Ask opioid patients: 'How are your bowels?' If severe constipation, address with MD before aggressive lumbar exercise.", "body_kr": "오피오이드 유발 변비는 거의 100%. 심한 힘주기 시 요추 디스크 압력 악화. 오피오이드 환자의 배변 상태 확인. 심한 변비 시 요추 운동 전 의사 상담."}], "side_effects_en": ["Respiratory depression (μ-opioid receptor in brainstem → ↓respiratory drive — most dangerous)", "Constipation (μ-receptor in GI → ↓peristalsis; does NOT develop tolerance unlike other effects)", "Nausea/vomiting (μ-receptor in chemoreceptor trigger zone)", "Sedation (μ-receptor in CNS → ↓alertness)", "Dependence/tolerance (μ-receptor downregulation + neuroadaptation)", "Pruritus (histamine release + central μ-receptor itch pathway)"], "side_effects_kr": ["호흡 억제 (뇌간 μ-오피오이드 수용체 → 호흡 충동 감소 — 가장 위험)", "변비 (소화관 μ 수용체 → 연동 운동 감소; 다른 효과와 달리 내성 생기지 않음)", "구역/구토 (화학수용체 유발대의 μ 수용체)", "진정 (CNS μ 수용체 → 각성도 감소)", "의존성/내성 (μ 수용체 하향조절 + 신경 적응)", "소양증 (히스타민 분비 + 중추 μ 수용체 가려움 경로)"], "red_flags": ["[BEFORE PT] Check respiratory rate before every session — oxycodone + gabapentin or benzodiazepine: RR <14 → hold PT, notify physician", "[BEFORE PT] Post-surgical patient on oxycodone: do not allow patient to drive to PT alone — impaired judgment and reaction time", "[DURING PT] Pinpoint pupils + RR <12 + decreased consciousness → call 911 immediately, administer naloxone (Narcan) if available — opioid overdose triad", "[DURING PT] Pain appears masked → restrict ROM to anatomical limits, not patient-reported tolerance; opioids remove protective pain signal", "[DURING PT] Constipation causing Valsalva straining → assess for impact on lumbar spine; hold axial loading if severe constipation unaddressed", "[AFTER PT] Rapid dose escalation reported by patient → do not provide more sessions until physician reviews — tolerance/dependence concern"], "red_flags_kr": ["[PT 전] 모든 세션 전 호흡수 확인 — 옥시코돈 + 가바펜틴 또는 벤조디아제핀: RR 14 미만 → PT 보류, 의사 통보", "[PT 전] 옥시코돈 복용 수술 후 환자: 혼자 PT에 운전해 오지 않도록 — 판단력 및 반응 시간 저하", "[PT 중] 점상동공 + RR 12 미만 + 의식 저하 → 즉시 119 호출, 날록손(Narcan) 있으면 투여 — 오피오이드 과용량 3징후", "[PT 중] 통증 억제로 과도한 ROM 허용 시 → 환자 보고 내성이 아닌 해부학적 한계로 ROM 제한; 오피오이드는 보호적 통증 신호 제거", "[PT 중] 변비로 인한 발살바 힘주기 → 요추에 미치는 영향 평가; 심한 변비 미해결 시 축성 하중 보류", "[PT 후] 환자가 빠른 용량 증가 보고 → 의사가 검토할 때까지 추가 세션 제공 금지 — 내성/의존 우려"], "interactions_en": ["Benzodiazepines: BLACK BOX respiratory depression", "Gabapentin: respiratory depression", "Alcohol: CNS/respiratory depression", "MAOIs: serotonin syndrome"], "interactions_kr": ["벤조디아제핀: 블랙박스 호흡 억제", "가바펜틴: 호흡 억제", "알코올: CNS/호흡 억제", "MAOIs: 세로토닌 증후군"], "chart_note_en": "Patient on Oxycodone 5mg q6h PRN post-op. RR 16 at session start. Pain VAS 3/10 with medication. ROM limited to anatomically safe ranges per opioid use protocol. No miosis observed.", "chart_note_kr": "수술 후 옥시코돈 5mg PRN 복용. 세션 시작 시 호흡수 16. 투약 후 통증 VAS 3/10. 오피오이드 사용 프로토콜에 따라 해부학적 안전 범위로 ROM 제한. 점상동공 없음.", "dosage": [{"form": "Pain", "normal": "5–15mg q4–6h IR", "high": "Dose escalation = tolerance/addiction risk"}]}, {"id": "albuterol", "name": "Albuterol", "brand": "ProAir / Ventolin / Proventil", "name_kr": "알부테롤", "category": "Respiratory", "category_kr": "호흡기", "class": "Short-Acting Beta-2 Agonist (SABA)", "class_kr": "단기 베타2 작용제(SABA)", "rx": true, "risk": "low", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Salbutamol_Inhaler.jpg/120px-Salbutamol_Inhaler.jpg", "emoji": "💨", "summary_en": "Rescue inhaler for asthma/COPD. Use 20 min before exercise (EIB). Tachycardia and tremor are common. Use >2x/week = not well controlled.", "summary_kr": "천식/COPD 구조 흡입기. 운동 유발 기관지경련 예방: 운동 20분 전 사용. 빈맥·진전 흔함. 주 2회 초과 사용 = 미조절 상태.", "mechanism_en": "β2 agonist → smooth muscle relaxation → bronchodilation. Onset 5–15 min, duration 4–6 hr.", "mechanism_kr": "β2 작용 → 기관지 평활근 이완 → 기관지 확장. 발현 5-15분, 지속 4-6시간.", "onset": "5–15 min", "halflife": "3–8 hr", "scenarios": [{"title": "Pre-exercise EIB prevention", "title_kr": "운동 유발 기관지경련 예방", "body_en": "Exercise-induced bronchospasm (EIB) patient: albuterol 2 puffs 15–20 min before PT session. Ensure patient has inhaler available during all PT sessions. Warm-up period especially important.", "body_kr": "운동 유발 기관지경련 환자: PT 세션 15-20분 전 알부테롤 2회 흡입. 세션 중 흡입기 항상 휴대. 충분한 준비 운동 특히 중요."}, {"title": "Acute bronchospasm during PT", "title_kr": "PT 중 급성 기관지경련", "body_en": "Patient develops audible wheeze + dyspnea during treadmill. STOP exercise. Have patient use rescue inhaler (2 puffs). If no relief in 15 min → 911. SpO2 <90% → oxygen + 911.", "body_kr": "트레드밀 중 청진 가능한 천명음 + 호흡 곤란 → 운동 즉시 중지. 구조 흡입기 2회 흡입. 15분 후 호전 없음 → 119. SpO2 90% 미만 → 산소 투여 + 119."}, {"title": "Tachycardia interpretation", "title_kr": "빈맥 해석", "body_en": "Patient HR 108 after albuterol use + mild exercise. This may be medication effect, not just exercise HR. Do NOT push intensity based on HR target — patient may already be at albuterol-induced tachycardia baseline. Use SpO2 and RPE for guidance.", "body_kr": "알부테롤 + 운동 후 HR 108 → 약물 효과로 HR 기저치 상승 가능. HR 목표로 강도 조절 금지. SpO2와 RPE 사용."}, {"title": "Overuse = poor control", "title_kr": "과사용 = 미조절 신호", "body_en": "Patient reports using rescue inhaler daily. This indicates poorly controlled asthma. PT cannot be the asthma manager, but document frequency and refer to pulmonologist for controller medication (ICS/LABA) optimization.", "body_kr": "매일 구조 흡입기 사용 = 미조절 천식. PT가 관리할 수 없음. 사용 빈도 기록 후 호흡기 전문의 의뢰. 조절약(ICS/LABA) 최적화 필요."}], "side_effects_en": ["Tachycardia (β2 stimulation → some β1 cross-reactivity → ↑HR)", "Tremor in skeletal muscle (β2 stimulation of muscle → ↑neuromuscular excitability)", "Hypokalemia at high doses (β2 → ↑Na/K-ATPase → K⁺ shifts into cells)", "Palpitations (↑HR + ↑myocardial contractility)", "Nervousness/anxiety (β2 stimulation in CNS + cardiovascular effects perceived as anxiety)"], "side_effects_kr": ["빈맥 (β2 자극 → 일부 β1 교차 반응 → HR 증가)", "골격근 진전 (근육 β2 자극 → 신경근 흥분성 증가)", "고용량 저칼륨혈증 (β2 → Na/K-ATPase 활성화 → K⁺이 세포 내로 이동)", "심계항진 (HR 증가 + 심근 수축력 증가)", "초조/불안 (CNS β2 자극 + 심혈관 효과가 불안으로 인지됨)"], "red_flags": ["[BEFORE PT] Ensure patient has rescue inhaler available during all PT sessions — do not start exercise without it present", "[BEFORE PT] Exercise-induced bronchospasm (EIB): 2 puffs albuterol 15–20 min before PT; if not done, delay start", "[DURING PT] Audible wheeze + dyspnea during exercise → stop exercise immediately, have patient use 2 puffs inhaler; if no improvement in 15 min → call 911", "[DURING PT] SpO2 <90% → stop immediately, call 911, administer supplemental O2 if available", "[DURING PT] HR >150 at rest post-albuterol → stop PT, do not push intensity; monitor until HR normalizes", "[AFTER PT] Patient reports using rescue inhaler daily or >2x/week → document and refer to pulmonologist — poorly controlled asthma; do not increase PT intensity"], "red_flags_kr": ["[PT 전] 모든 PT 세션 중 구조 흡입기 휴대 확인 — 없으면 운동 시작 금지", "[PT 전] 운동 유발 기관지경련(EIB): PT 15-20분 전 알부테롤 2회 흡입; 미실시 시 시작 지연", "[PT 중] 운동 중 청진 가능한 천명음 + 호흡곤란 → 즉시 운동 중지, 흡입기 2회 사용; 15분 후 호전 없으면 119 호출", "[PT 중] SpO2 90% 미만 → 즉시 중지, 119 호출, 보충 산소 있으면 투여", "[PT 중] 알부테롤 후 안정시 HR 150 초과 → PT 중지, 강도 높이지 말 것; HR 정상화까지 모니터링", "[PT 후] 매일 또는 주 2회 초과 구조 흡입기 사용 보고 → 기록 후 호흡기 전문의 의뢰 — 미조절 천식; PT 강도 증가 금지"], "interactions_en": ["Beta-blockers: block bronchodilation (avoid non-selective BB in asthma)", "MAOIs: tachycardia", "Diuretics: hypokalemia synergy"], "interactions_kr": ["베타차단제: 기관지 확장 차단(천식에 비선택적 BB 금기)", "MAOIs: 빈맥", "이뇨제: 저칼륨혈증 상승"], "chart_note_en": "Patient with asthma, on Albuterol PRN. 2 puffs administered 15 min pre-exercise. No wheeze or dyspnea during session. SpO2 98%. HR peaked at 112 (attributed to partial albuterol effect + exercise).", "chart_note_kr": "천식 환자, 알부테롤 PRN. 운동 15분 전 2회 흡입. 세션 중 천명음·호흡곤란 없음. SpO2 98%. HR 최고 112(알부테롤 + 운동 효과).", "dosage": [{"form": "Rescue", "normal": "2 puffs (180mcg) q4–6h PRN", "high": "Frequent use = poor control"}]}, {"id": "metformin", "name": "Metformin", "brand": "Glucophage", "name_kr": "메트포르민", "category": "Endocrine", "category_kr": "내분비", "class": "Biguanide / Antidiabetic", "class_kr": "비구아나이드/항당뇨병제", "rx": true, "risk": "low", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Metformin_500mg.jpg/120px-Metformin_500mg.jpg", "emoji": "💊", "summary_en": "First-line for Type 2 DM. Does NOT cause hypoglycemia alone. Lactic acidosis (rare). Hold before contrast dye procedures.", "summary_kr": "2형 당뇨 1차 선택. 단독으로는 저혈당 유발 안 함. 젖산 산증(드물게). 조영제 시술 전 중단.", "mechanism_en": "↓hepatic gluconeogenesis, ↑insulin sensitivity, ↓intestinal glucose absorption. Does not stimulate insulin secretion.", "mechanism_kr": "간의 포도당 신생합성 억제, 인슐린 감수성 증가, 장의 포도당 흡수 감소. 인슐린 분비 자극 없음.", "onset": "1–3 days (full effect weeks)", "halflife": "4–9 hr", "scenarios": [{"title": "Exercise + metformin synergy", "title_kr": "운동 + 메트포르민 시너지", "body_en": "Metformin and aerobic exercise have additive glucose-lowering effects through similar mechanisms. Reinforce exercise adherence — PT is actually augmenting the drug's mechanism. Educate patient on this synergy.", "body_kr": "메트포르민과 유산소 운동은 유사한 기전으로 혈당 강하 상가 효과. PT가 약물 기전 강화 역할. 환자에게 이 시너지 교육 가능."}, {"title": "No hypoglycemia concern alone", "title_kr": "단독 저혈당 위험 없음", "body_en": "Metformin alone does NOT cause hypoglycemia (unlike insulin or sulfonylureas). If patient on ONLY metformin experiences hypoglycemic symptoms during PT, consider other causes: skipped meal, other medication, underlying condition.", "body_kr": "메트포르민 단독 저혈당 유발 없음. 메트포르민만 복용 중 저혈당 증상 시 다른 원인 탐색: 결식, 다른 약물, 기저 질환."}, {"title": "GI symptoms timing", "title_kr": "소화관 증상 타이밍", "body_en": "Metformin causes GI upset (nausea, diarrhea) especially at treatment start. Patient may have reduced exercise tolerance due to GI discomfort. Time PT after meals when GI symptoms are minimized. Extended-release form has less GI side effects.", "body_kr": "초기 복용 시 소화관 부작용(구역·설사) 많음. 소화관 증상이 적은 식후에 PT 배치. 서방형이 부작용 적음."}, {"title": "Contrast media hold protocol", "title_kr": "조영제 처치 전 중단 프로토콜", "body_en": "Patient scheduled for IV contrast (MRI, CT angiography): metformin should be held 48hr before and restarted 48hr after (if renal function normal). If PT refers patient for imaging, note metformin status in referral.", "body_kr": "IV 조영제 검사(CT 혈관조영술 등) 전 48시간 중단, 48시간 후 재개(신기능 정상 시). 영상 검사 의뢰 시 메트포르민 복용 여부 기록."}], "side_effects_en": ["GI upset — nausea/diarrhea (↑GLP-1 + direct gut motility effect; improves with food/ER formulation)", "Lactic acidosis — rare but fatal (↓hepatic lactate clearance in renal impairment or hypoxia)", "Vitamin B12 deficiency — long-term (↓B12 absorption in terminal ileum via Ca²⁺-dependent mechanism)", "Metallic taste (unknown mechanism)"], "side_effects_kr": ["소화관 부작용 구역/설사 (GLP-1 증가 + 장 운동 직접 효과; 식후 복용 또는 서방형으로 개선)", "젖산 산증 드물지만 치명적 (신기능 저하 또는 저산소증 시 간의 젖산 제거 감소)", "비타민B12 결핍 장기 (Ca²⁺ 의존 기전 통한 말단 회장 B12 흡수 감소)", "금속 맛 (기전 불명확)"], "red_flags": ["[BEFORE PT] Patient scheduled for IV contrast scan → confirm metformin held 48hr pre- and post-procedure before PT referral — acute kidney injury risk", "[DURING PT] Muscle pain + weakness + rapid breathing + confusion in metformin user → call 911 immediately — rare but fatal lactic acidosis; do not wait to see if it improves", "[DURING PT] Significant GI distress (nausea/diarrhea) limiting participation → reschedule post-meal; note in chart; refer to prescriber if ongoing", "[AFTER PT] Exercise + metformin can cause hypoglycemia in patients also on insulin/sulfonylurea → educate patient to check glucose post-session"], "red_flags_kr": ["[PT 전] IV 조영제 검사 예정 환자 → PT 의뢰 전 시술 전후 48시간 메트포르민 중단 확인 — 급성 신손상 위험", "[PT 중] 메트포르민 복용자 근육통 + 근력 약화 + 빠른 호흡 + 혼동 → 즉시 119 호출 — 드물지만 치명적인 젖산 산증; 호전 기다리지 말 것", "[PT 중] 참여를 제한하는 심각한 소화관 증상(구역/설사) → 식후로 재일정; 차트 기록; 지속 시 처방의 의뢰", "[PT 후] 운동 + 메트포르민은 인슐린/설포닐우레아 병용 환자에서 저혈당 유발 가능 → 세션 후 혈당 확인 교육"], "interactions_en": ["Alcohol: lactic acidosis risk", "Contrast media: acute renal failure → lactic acidosis", "Carbonic anhydrase inhibitors: lactic acidosis"], "interactions_kr": ["알코올: 젖산 산증 위험", "조영제: 급성 신부전 → 젖산 산증", "탄산탈수효소 억제제: 젖산 산증"], "chart_note_en": "Patient on Metformin 1000mg BID (T2DM). No hypoglycemia reported during aerobic exercise today. Blood glucose 142 pre-exercise. GI: mild nausea reported, scheduled PT post-meal.", "chart_note_kr": "메트포르민 1000mg 1일 2회(2형 당뇨). 유산소 운동 중 저혈당 없음. 운동 전 혈당 142. 소화관: 경미한 구역, 식후 PT 배치.", "dosage": [{"form": "T2DM", "normal": "500–1000mg BID", "high": "2550mg/day max"}]}, {"id": "insulin", "name": "Insulin (Rapid/Long-acting)", "brand": "Humalog / Lantus / NovoLog", "name_kr": "인슐린(속효성/지속형)", "category": "Endocrine", "category_kr": "내분비", "class": "Insulin / Antidiabetic", "class_kr": "인슐린/항당뇨병제", "rx": true, "risk": "high", "image": "", "emoji": "💉", "summary_en": "Type 1 DM essential. T2DM later stage. HYPOGLYCEMIA = main PT risk. Check glucose before every session. 15-15 Rule for hypoglycemia.", "summary_kr": "1형 당뇨 필수. 2형 당뇨 후기. 저혈당 = 주요 PT 위험. 매 세션 전 혈당 확인. 저혈당 시 15-15 규칙.", "mechanism_en": "Binds insulin receptor → GLUT4 translocation → glucose uptake in muscle/fat. Rapid: 15min onset/4hr duration. Basal: 24hr.", "mechanism_kr": "인슐린 수용체 결합 → GLUT4 이동 → 근육·지방에서 포도당 흡수. 속효성: 15분 발현/4시간. 기저: 24시간.", "onset": "Rapid: 15 min / Long: 2–4 hr (no peak)", "halflife": "Varies by formulation", "scenarios": [{"title": "Pre-exercise glucose check mandatory", "title_kr": "운동 전 혈당 측정 필수", "body_en": "EVERY PT session for insulin-dependent patient: BG check required. Glucose <100 mg/dL → give 15–30g carb, recheck in 15 min, then exercise. Glucose 100–250 = safe to exercise. Glucose >300 = postpone PT.", "body_kr": "인슐린 의존 환자 모든 PT 세션: 혈당 측정 필수. 100 미만 → 15-30g 탄수화물 보충, 15분 후 재측정. 100-250 = 운동 가능. 300 초과 = PT 연기."}, {"title": "15-15 Hypoglycemia Rule", "title_kr": "15-15 저혈당 규칙", "body_en": "During PT, patient shows: shakiness, diaphoresis, confusion, pallor. BG check: 68 mg/dL. STOP. Give 15g fast carb (4oz juice, glucose tabs). Wait 15 min. Recheck BG. If still <70 → repeat. Do not restart PT until BG stable >100.", "body_kr": "PT 중 떨림·발한·혼동·창백 → 혈당 측정. 68 mg/dL → 중지. 속효성 탄수화물 15g 투여(주스 120mL 또는 포도당 정제). 15분 대기 후 재측정. 여전히 70 미만 → 반복. BG 100 초과 안정 후 PT 재개."}, {"title": "Post-exercise late hypoglycemia", "title_kr": "운동 후 지연 저혈당", "body_en": "Exercise increases insulin sensitivity for 24–48 hours. Insulin-dependent patient may experience hypoglycemia hours after PT session. Educate: eat complex carbs post-PT, monitor BG at home, nocturnal hypoglycemia risk.", "body_kr": "운동은 24-48시간 인슐린 감수성 증가. 세션 수 시간 후 저혈당 발생 가능. 세션 후 복합 탄수화물 섭취, 귀가 후 혈당 모니터링, 야간 저혈당 위험 교육."}, {"title": "Injection site and PT", "title_kr": "주사 부위와 PT", "body_en": "Insulin injected into exercising limb absorbs faster → increased hypoglycemia risk. Ask: 'Where did you inject your insulin today?' If in exercising area (thigh for cycling, arm for resistance), document and monitor more closely.", "body_kr": "운동하는 부위에 주사 시 흡수 빨라짐 → 저혈당 위험 증가. '오늘 어디에 주사했나요?' 확인. 운동 부위(사이클: 허벅지, 저항 운동: 팔) 시 더 밀접한 모니터링."}], "side_effects_en": ["Hypoglycemia — major risk (↑glucose uptake exceeds carb intake or timing mismatch)", "Weight gain (anabolic effect → ↑fat storage + ↑protein synthesis)", "Lipohypertrophy at injection sites (local ↑fat deposition from repeated insulin exposure)", "Hypokalemia (β2-mediated K⁺ shift into cells — clinically relevant in DKA treatment)"], "side_effects_kr": ["저혈당 주요 위험 (포도당 흡수 증가가 탄수화물 섭취 또는 타이밍 불일치 초과)", "체중 증가 (동화 효과 → 지방 저장 증가 + 단백질 합성 증가)", "주사 부위 지방 비대 (반복적인 인슐린 노출로 인한 국소 지방 침착 증가)", "저칼륨혈증 (β2 매개 K⁺의 세포 내 이동 — DKA 치료 시 임상적으로 중요)"], "red_flags": ["[BEFORE PT] Check blood glucose before every session — BG <100 mg/dL → give 15–30g carb, recheck in 15 min before exercising; BG >300 → postpone PT, check ketones, refer to physician", "[BEFORE PT] Ask where patient injected insulin today — injection in exercising limb (thigh for cycling, arm for resistance) → faster absorption → higher hypoglycemia risk; monitor closely", "[DURING PT] Shakiness + diaphoresis + pallor + confusion → stop immediately, check BG; if <70 → 15g fast carb, wait 15 min, recheck; if <50 + unconscious → call 911, glucagon", "[DURING PT] Hypoglycemia symptoms but BG normal in patient on beta-blocker → beta-blocker masks tachycardia; treat symptomatically, refer to physician", "[AFTER PT] Exercise increases insulin sensitivity 24–48 hours → educate patient: hypoglycemia can occur hours after PT session, especially overnight; advise complex carb snack post-session", "[AFTER PT] BG was well-controlled during session but drops significantly 2–4 hours later (post-exercise late hypoglycemia) → adjust pre-PT insulin dose with physician"], "red_flags_kr": ["[PT 전] 모든 세션 전 혈당 확인 — BG 100 미만 → 15-30g 탄수화물 보충, 15분 후 재측정 후 운동; BG 300 초과 → PT 연기, 케톤 확인, 의사 의뢰", "[PT 전] 오늘 인슐린 주사 부위 확인 — 운동하는 사지에 주사(사이클: 허벅지, 저항: 팔) → 빠른 흡수 → 저혈당 위험 증가; 면밀히 모니터링", "[PT 중] 떨림 + 발한 + 창백 + 혼동 → 즉시 중지, 혈당 확인; 70 미만 → 속효성 탄수화물 15g, 15분 대기, 재측정; 50 미만 + 의식 없음 → 119 호출, 글루카곤", "[PT 중] 베타차단제 복용 환자 저혈당 증상이나 혈당 정상 → 베타차단제가 빈맥 은폐; 증상 치료 후 의사 의뢰", "[PT 후] 운동 후 24-48시간 인슐린 감수성 증가 → 교육: 특히 야간에 PT 세션 후 수 시간 뒤 저혈당 발생 가능; 세션 후 복합 탄수화물 간식 권고", "[PT 후] 세션 중 혈당 잘 조절됐으나 2-4시간 후 급하강(운동 후 지연 저혈당) → 의사와 함께 PT 전 인슐린 용량 조정"], "interactions_en": ["Beta-blockers: mask tachycardia (hypoglycemia sign)", "Corticosteroids: raise BG, antagonize insulin", "Alcohol: hypoglycemia risk"], "interactions_kr": ["베타차단제: 저혈당 빈맥 증상 은폐", "코르티코스테로이드: 혈당 상승, 인슐린 길항", "알코올: 저혈당 위험"], "chart_note_en": "Type 1 DM patient on Insulin glargine 24U QHS + Humalog sliding scale. Pre-PT BG: 156 mg/dL. Session completed without hypoglycemia. Post-PT education on late hypoglycemia and nocturnal monitoring provided.", "chart_note_kr": "1형 당뇨 환자, 인슐린 글라진 24단위 취침 전 + Humalog 슬라이딩 스케일. 운동 전 혈당 156. 저혈당 없이 세션 완료. 지연 저혈당 및 야간 모니터링 교육 제공.", "dosage": [{"form": "T1DM", "normal": "Individualized by BG", "high": "Excess → hypoglycemia"}]}];

var KR=false, curCat='all', curQ='', curId=null;
var starred=JSON.parse(localStorage.getItem('ptph3')||'[]');

function ge(id){return document.getElementById(id);}
function T(en,kr){return KR&&kr?kr:en;}
function isStar(id){return starred.indexOf(id)>=0;}
function saveStar(){localStorage.setItem('ptph3',JSON.stringify(starred));}

function toggleStarId(id){
  if(isStar(id)) starred=starred.filter(function(s){return s!==id;});
  else starred.push(id);
  saveStar();
  document.querySelectorAll('[data-sid="'+id+'"]').forEach(function(el){
    el.textContent=isStar(id)?'★':'☆';
  });
  if(curId===id) ge('dstar').textContent=isStar(id)?'★':'☆';
  if(ge('v-star').classList.contains('on')) renderStar();
}
function toggleStarCur(){if(curId) toggleStarId(curId);}

function riskB(r){
  var cls=r==='low'?'blo':r==='moderate'?'bmo':'bhi';
  var lbl=r==='low'?'🟢 Low':r==='moderate'?'🟡 Moderate':'🔴 High';
  return '<span class="b '+cls+'">'+lbl+'</span>';
}

// Drug card HTML (no template literals, no nested quotes)
function dcard(d){
  var ic=ICONS[d.id]?
    '<div class="ic"><img data-did="'+d.id+'" src="'+ICONS[d.id]+'"></div>':
    '<div class="ic">'+d.emoji+'</div>';
  var rxc=d.rx?'brx':'bot';
  var rxl=d.rx?'Rx':'OTC';
  var sl=isStar(d.id)?'★':'☆';
  return '<div class="dc" data-id="'+d.id+'">' +
    '<div style="display:flex;align-items:center;gap:8px">' +
      ic+
      '<div style="flex:1;min-width:0"><div class="dn">'+T(d.name,d.name_kr)+'</div><div class="db">'+d.brand+'</div></div>'+
      '<button class="sb" data-sid="'+d.id+'">'+sl+'</button>'+
    '</div>'+
    '<div class="br"><span class="b bcl">'+T(d.class,d.class_kr)+'</span><span class="b '+rxc+'">'+rxl+'</span>'+riskB(d.risk)+'</div>'+
    '<div class="ds">'+T(d.summary_en,d.summary_kr)+'</div>'+
  '</div>';
}

function bindCards(container){
  container.querySelectorAll('.dc').forEach(function(el){
    el.addEventListener('click',function(){openDet(el.dataset.id);});
  });
  container.querySelectorAll('.sb').forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      toggleStarId(el.dataset.sid);
    });
  });
}

// Image loading
var imgC={};
function loadImg(id){
  if(imgC[id]) return;
  fetch('https://rximage.nlm.nih.gov/api/rximage/1/rxnav?name='+encodeURIComponent(id)+'&resolution=120')
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.nlmRxImages&&data.nlmRxImages.length){
        imgC[id]=data.nlmRxImages[0].imageUrl;
        document.querySelectorAll('img[data-did="'+id+'"]').forEach(function(img){
          img.src=imgC[id];img.style.objectFit='cover';
        });
      }
    }).catch(function(){});
}
function loadImgs(){
  document.querySelectorAll('img[data-did]').forEach(function(el){
    if(imgC[el.dataset.did]){el.src=imgC[el.dataset.did];el.style.objectFit='cover';}
    else loadImg(el.dataset.did);
  });
}

// DRUGS TAB
function renderDrugs(){
  var list=DRUGS.filter(function(d){
    var cok=curCat==='all'||TAGS[d.id].cat===curCat;
    var sq=curQ.toLowerCase();
    var qok=!sq||d.name.toLowerCase().indexOf(sq)>=0||d.brand.toLowerCase().indexOf(sq)>=0||
      d.name_kr.indexOf(sq)>=0||d.class.toLowerCase().indexOf(sq)>=0||
      d.summary_en.toLowerCase().indexOf(sq)>=0||d.summary_kr.indexOf(sq)>=0;
    return cok&&qok;
  });
  var el=ge('dlist');
  el.innerHTML=list.length?list.map(dcard).join(''):'<div class="empty">No drugs found</div>';
  bindCards(el);
  setTimeout(loadImgs,50);
}

// CONDITIONS TAB
function renderConds(){
  ge('cbk').style.display='none';
  ge('cmain').style.display='block';
  ge('cdetail').style.display='none';
  var html='';
  Object.keys(CONDS).forEach(function(cname){
    var ids=CONDS[cname];
    var dnames=ids.map(function(id){
      var drug=DRUGS.find(function(d){return d.id===id;});
      return drug?T(drug.name,drug.name_kr):id;
    }).join(' · ');
    html+='<div class="cc" data-cname="'+cname.replace(/"/g,'&quot;')+'" data-cids="'+ids.join(',')+'">'+
      '<div class="cn">'+cname+'</div>'+
      '<div class="cd">'+dnames+'</div>'+
    '</div>';
  });
  ge('cmain').innerHTML=html;
  ge('cmain').querySelectorAll('.cc').forEach(function(el){
    el.addEventListener('click',function(){
      showCondDetail(el.dataset.cname,el.dataset.cids.split(','));
    });
  });
}

function showCondDetail(cname,ids){
  curCondIds=ids;
  ge('cbk').style.display='flex';
  ge('cbktitle').textContent=cname;
  ge('cmain').style.display='none';
  ge('cdetail').style.display='block';

  var drugs=ids.map(function(id){return DRUGS.find(function(d){return d.id===id;});}).filter(Boolean);

  // Collect all interaction tags for these drugs
  var interMap={};
  drugs.forEach(function(d){
    var inters=TAGS[d.id]?TAGS[d.id].inter:[];
    inters.forEach(function(ik){
      if(!interMap[ik]) interMap[ik]=[];
      interMap[ik].push(d.id);
    });
  });

  // Find shared interactions (2+ drugs)
  var shared={};
  Object.keys(interMap).forEach(function(ik){
    if(interMap[ik].length>=2) shared[ik]=interMap[ik];
  });

  var html='';

  // Drug list
  html+='<div style="font-size:12px;font-weight:700;color:var(--teal);padding:4px 0 8px">Drugs in this condition</div>';
  html+=drugs.map(dcard).join('');

  // Interaction section
  if(Object.keys(shared).length>0){
    html+='<div style="font-size:12px;font-weight:700;color:var(--yel);padding:12px 0 8px">⚠️ Interactions between these drugs</div>';
    Object.keys(shared).forEach(function(ik){
      var info=INTER[ik];
      if(!info) return;
      var drugNames=shared[ik].map(function(id){
        var dr=DRUGS.find(function(d){return d.id===id;});
        return dr?T(dr.name,dr.name_kr):id;
      }).join(' + ');
      html+='<div class="itag" style="background:#1a1a2e;border:1px solid '+info.color+';color:var(--tx);margin-bottom:6px">'+
        '<div style="font-weight:700;font-size:13px;color:'+info.color+'">'+info.label+'</div>'+
        '<div style="font-size:12px;color:var(--mu);margin-top:2px">Drugs: '+drugNames+'</div>'+
        '<div style="font-size:12px;margin-top:4px;line-height:1.5">'+info.desc+'</div>'+
      '</div>';
    });
  }

  ge('cdetail').innerHTML=html;
  bindCards(ge('cdetail'));
  setTimeout(loadImgs,50);
}

ge('cbkbtn').addEventListener('click',function(){renderConds();});

// STARRED TAB
function renderStar(){
  var list=DRUGS.filter(function(d){return isStar(d.id);});
  var el=ge('slist');
  el.innerHTML=list.length?list.map(dcard).join(''):'<div class="empty">⭐ No starred drugs<br><small style="display:block;margin-top:6px;font-size:12px">Tap ☆ on any drug card</small></div>';
  bindCards(el);
  setTimeout(loadImgs,50);
}

function showTab(tab){
  closeDet();

  ge('v-'+tab).classList.add('on');

// DETAIL
function openDet(id){
  var d=DRUGS.find(function(x){return x.id===id;});
  if(!d) return;
  curId=id;
  ge('dtitle').textContent=T(d.name,d.name_kr);
  ge('dbrand').textContent=d.brand;
  ge('dstar').textContent=isStar(id)?'★':'☆';
  ge('dlang').textContent=KR?'EN/한':'한/EN';

  var rf=(KR?d.red_flags_kr:d.red_flags).map(function(s){var col='#ffb3b3';
    var txt=s;
    if(s.indexOf('[BEFORE PT]')>=0){col='#93c5fd';txt=s.replace('[BEFORE PT] ','');}
    else if(s.indexOf('[DURING PT]')>=0){col='#ffb3b3';txt=s.replace('[DURING PT] ','');}
    else if(s.indexOf('[AFTER PT]')>=0){col='#fde68a';txt=s.replace('[AFTER PT] ','');}
    return '<div class="rtag" style="color:'+col+'">'+txt+'</div>';}).join('');
  var se=(KR?d.side_effects_kr:d.side_effects_en).map(function(s){return '<div class="tag">• '+s+'</div>';}).join('');
  var sc=d.scenarios.map(function(s){
    return '<div class="scen"><div class="sct">📍 '+T(s.title,s.title_kr)+'</div><div class="scb">'+T(s.body_en,s.body_kr)+'</div></div>';
  }).join('');
  var ia=(KR?d.interactions_kr:d.interactions_en).map(function(s){return '<div class="iatag">↔ '+s+'</div>';}).join('');
  var ds=d.dosage.map(function(r){return '<tr><td>'+r.form+'</td><td>'+r.normal+'</td><td style="color:var(--red)">'+r.high+'</td></tr>';}).join('');
  var bdg='<span class="b bcl">'+T(d.class,d.class_kr)+'</span><span class="b '+(d.rx?'brx':'bot')+'">'+(d.rx?'Rx':'OTC')+'</span>'+riskB(d.risk);
  var imsrc=ICONS[d.id]||'';

  ge('dbody').innerHTML=
    '<div class="hero">'+
      '<div class="him" id="dhim">'+imh+'<div class="hlnk">🔍</div></div>'+
      '<div style="flex:1;min-width:0">'+
        '<div class="br" style="margin-bottom:5px">'+bdg+'</div>'+
        '<div style="font-size:13px;line-height:1.6;color:var(--tx)">'+T(d.summary_en,d.summary_kr)+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="sec"><div class="st">⚙️ Mechanism</div><p style="font-size:13px;line-height:1.6">'+T(d.mechanism_en,d.mechanism_kr)+'</p></div>'+
    '<div class="sec"><div class="st" style="color:var(--red)">🚨 Red Flags for PT</div>'+rf+'</div>'+
    '<div class="sec"><div class="st">⚠️ Side Effects</div>'+se+'</div>'+
    '<div class="sec"><div class="st" style="color:var(--pur)">🔗 Drug Interactions</div>'+ia+'</div>'+
    '<div class="sec"><div class="st" style="color:var(--teal)">🏥 PT Clinical Scenarios</div>'+sc+'</div>'+
    '<div class="sec"><div class="st" style="color:var(--grn)">📋 PT Chart Documentation</div><div class="nbox">'+T(d.chart_note_en,d.chart_note_kr)+'</div></div>'+
    '<div class="sec"><div class="st">⚡ Quick Facts</div><div class="qg">'+
      '<div class="qi"><div class="ql">Onset</div><div class="qv">'+d.onset+'</div></div>'+

  ge('dhim').addEventListener('click',function(){if(URLS[id]) window.open(URLS[id],'_blank');});

var tipEl=null,tipTerm=null,tipDef=null,tipNorm=null,tipTimer=null;

function initTip(){
  tipEl=document.getElementById('tip');
  tipTerm=document.getElementById('tip-term');
  tipDef=document.getElementById('tip-def');
  tipNorm=document.getElementById('tip-norm');
}

function showTip(el,key){
  if(!tipEl) initTip();
  var e=ABBR[key]; if(!e) return;
  tipTerm.textContent=key+' = '+e.term;
  tipDef.textContent=e.def||'';
  if(e.norm){tipNorm.textContent=e.norm;tipNorm.style.display='block';}
  else{tipNorm.style.display='none';}
  var r=el.getBoundingClientRect();
  var left=Math.min(r.left,window.innerWidth-272);
  if(left<8)left=8;
  var top=r.bottom+8;
  if(top+140>window.innerHeight)top=r.top-148;
  tipEl.style.left=left+'px';
  tipEl.style.top=top+'px';
  tipEl.classList.add('on');
  clearTimeout(tipTimer);
  tipTimer=setTimeout(hideTip,4000);
}

function hideTip(){if(tipEl)tipEl.classList.remove('on');}

document.addEventListener('click',function(e){
  if(tipEl&&!e.target.classList.contains('abbr'))hideTip();
});

// Keys sorted longest first to avoid partial matches
var AKEYS=Object.keys(ABBR).sort(function(a,b){return b.length-a.length;});
// Build regex — escape special chars
var APATT=AKEYS.map(function(k){return k.replace(/[+²⁺]/g,'\\$&');}).join('|');
var ARE=new RegExp('(^|[\\s(\\[/,;:!?])(' + APATT + ')(?=[\\s),\\].:;!?/]|$)','g');

function markupNode(node){
  var txt=node.nodeValue;
  if(!txt||!txt.trim())return;
  if(['SCRIPT','STYLE','INPUT','TEXTAREA'].indexOf(node.parentNode.tagName)>=0)return;
  if(node.parentNode.classList&&node.parentNode.classList.contains('abbr'))return;
  ARE.lastIndex=0;
  if(!ARE.test(txt))return;
  ARE.lastIndex=0;
  var frag=document.createDocumentFragment();
  var last=0,m;
  while((m=ARE.exec(txt))!==null){
    var pre=m[1],key=m[2],idx=m.index;
    if(idx+pre.length>last)frag.appendChild(document.createTextNode(txt.slice(last,idx+pre.length)));
    var sp=document.createElement('span');
    sp.className='abbr';
    sp.textContent=key;
    (function(k,s){s.addEventListener('click',function(e){e.stopPropagation();showTip(s,k);});})(key,sp);
    frag.appendChild(sp);
    last=idx+pre.length+key.length;
  }
  if(last<txt.length)frag.appendChild(document.createTextNode(txt.slice(last)));
  node.parentNode.replaceChild(frag,node);
}

function markupAbbr(container){
  if(!container)return;
  var walker=document.createTreeWalker(container,NodeFilter.SHOW_TEXT,null,false);
  var nodes=[];
  var n;
  while((n=walker.nextNode()))nodes.push(n);
  nodes.forEach(markupNode);
}

// Wrap openDet to auto-markup after render
var _oDet=openDet;
openDet=function(id){_oDet(id);setTimeout(function(){markupAbbr(ge('dbody'));},100);};

// Wrap showCondDetail to auto-markup
var _oSCD=showCondDetail;
showCondDetail=function(cn,ids){_oSCD(cn,ids);setTimeout(function(){markupAbbr(ge('cdetail'));},100);};
