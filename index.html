const CONDITIONS = {"Hypertension / 고혈압": ["metoprolol", "lisinopril", "losartan", "amlodipine", "furosemide", "hctz"], "Heart Failure / 심부전": ["metoprolol", "lisinopril", "furosemide"], "Atrial Fibrillation / 심방세동": ["warfarin", "apixaban", "metoprolol"], "DVT / PE / 혈전": ["warfarin", "apixaban"], "Hyperlipidemia / 고지혈증": ["atorvastatin"], "Type 2 Diabetes / 2형 당뇨": ["metformin", "insulin"], "Type 1 Diabetes / 1형 당뇨": ["insulin"], "Chronic Pain / 만성 통증": ["gabapentin", "duloxetine", "oxycodone"], "Neuropathic Pain / 신경병성 통증": ["gabapentin", "duloxetine"], "Spasticity / 경직 (MS/SCI)": ["baclofen", "tizanidine"], "Asthma / COPD / 천식·폐쇄성 폐질환": ["albuterol"], "Osteoporosis / 골다공증": ["alendronate", "prednisone"], "Acute MSK Pain / 급성 근골격계 통증": ["ibuprofen", "acetaminophen", "aspirin"], "Fibromyalgia / 섬유근통": ["duloxetine", "gabapentin"], "Post-Surgical Pain / 수술 후 통증": ["oxycodone", "acetaminophen"], "Rheumatoid Arthritis / 류마티스 관절염": ["prednisone", "ibuprofen"], "Gout / 통풍": ["losartan", "hctz"], "Depression / Anxiety / 우울·불안": ["duloxetine"]};
let isKR = false;
let currentCat = 'all';
let currentSearch = '';
let currentDetailId = null;
let starred = JSON.parse(localStorage.getItem('pt_pharm_stars') || '[]');

function t(en, kr) { return isKR && kr ? kr : en; }

function toggleLang() {
  isKR = !isKR;
  const lbl = isKR ? 'EN/한' : '한/EN';
  document.getElementById('langBtn').textContent = lbl;
  const dlb = document.getElementById('detailLangBtn');
  if (dlb) dlb.textContent = lbl;
  renderAll();
  if (currentDetailId) openDetail(currentDetailId);
}

function saveStars() { localStorage.setItem('pt_pharm_stars', JSON.stringify(starred)); }
function isStarred(id) { return starred.includes(id); }
function toggleStar(id) {
  if (isStarred(id)) starred = starred.filter(s => s !== id);
  else starred.push(id);
  saveStars();
  renderAll();
  if (document.getElementById('detailView').classList.contains('open')) {
    document.getElementById('detailStarBtn').textContent = isStarred(id) ? '★' : '☆';
  }
}
function toggleStarDetail() { if (currentDetailId) toggleStar(currentDetailId); }

function filterCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.filter-chip').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  renderDrugs();
}

function doSearch() {
  currentSearch = document.getElementById('searchInput').value.toLowerCase();
  renderDrugs();
}

function filteredDrugs() {
  return DRUGS.filter(d => {
    const catOk = currentCat === 'all' || d.category === currentCat;
    const q = currentSearch;
    const searchOk = !q || d.name.toLowerCase().includes(q) || d.brand.toLowerCase().includes(q)
      || d.name_kr.includes(q) || d.class.toLowerCase().includes(q)
      || d.summary_en.toLowerCase().includes(q) || d.summary_kr.includes(q);
    return catOk && searchOk;
  });
}

function riskBadge(r) {
  return `<span class="badge badge-risk-${r}">${r==='low'?'🟢 Low Risk':r==='moderate'?'🟡 Moderate':'🔴 High Risk'}</span>`;
}

function renderDrugs() {
  const grid = document.getElementById('drugGrid');
  const drugs = filteredDrugs();
  if (!drugs.length) { grid.innerHTML = '<div class="empty">No drugs found</div>'; return; }
  grid.innerHTML = drugs.map(d => `
    <div class="drug-card" onclick="openDetail('${d.id}')">
      <div class="drug-img">
        ${d.image ? `<img src="${d.image}" alt="${d.name}" onerror="this.parentNode.innerHTML='${d.emoji}'">` : d.emoji}
      </div>
      <div class="drug-info">
        <div class="drug-name">${t(d.name, d.name_kr)}</div>
        <div class="drug-brand">${d.brand}</div>
        <div class="badge-row">
          <span class="badge badge-class">${t(d.class, d.class_kr)}</span>
          <span class="badge ${d.rx ? 'badge-rx' : 'badge-otc'}">${d.rx ? 'Rx' : 'OTC'}</span>
          ${riskBadge(d.risk)}
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:5px">${t(d.summary_en, d.summary_kr)}</div>
      </div>
      <button class="star-btn" onclick="event.stopPropagation();toggleStar('${d.id}')">${isStarred(d.id)?'★':'☆'}</button>
    </div>
  `).join('');
  setTimeout(loadVisibleImages, 50);
}

function renderConditions() {
  const list = document.getElementById('condList');
  list.innerHTML = Object.entries(CONDITIONS).map(([cond, ids]) => {
    const drugs = ids.map(id => DRUGS.find(d => d.id === id)).filter(Boolean);
    return `<div class="cond-card" onclick="showCondDrugs(${JSON.stringify(ids)})">
      <div class="cond-name">${cond}</div>
      <div class="cond-drugs">${drugs.map(d => t(d.name, d.name_kr)).join(' · ')}</div>
    </div>`;
  }).join('');
  setTimeout(loadVisibleImages, 50);
}

function showCondDrugs(ids) {
  showTab('drugs');
  currentCat = 'all';
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.filter-chip').forEach(e => e.classList.remove('active'));
  document.querySelector('.filter-chip').classList.add('active');
  const grid = document.getElementById('drugGrid');
  const drugs = ids.map(id => DRUGS.find(d => d.id === id)).filter(Boolean);
  grid.innerHTML = drugs.map(d => `
    <div class="drug-card" onclick="openDetail('${d.id}')">
      <div class="drug-img">
        ${d.image ? `<img src="${d.image}" alt="${d.name}" onerror="this.parentNode.innerHTML='${d.emoji}'">` : d.emoji}
      </div>
      <div class="drug-info">
        <div class="drug-name">${t(d.name, d.name_kr)}</div>
        <div class="drug-brand">${d.brand}</div>
        <div class="badge-row">
          <span class="badge badge-class">${t(d.class, d.class_kr)}</span>
          <span class="badge ${d.rx ? 'badge-rx' : 'badge-otc'}">${d.rx ? 'Rx' : 'OTC'}</span>
          ${riskBadge(d.risk)}
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:5px">${t(d.summary_en, d.summary_kr)}</div>
      </div>
      <button class="star-btn" onclick="event.stopPropagation();toggleStar('${d.id}')">${isStarred(d.id)?'★':'☆'}</button>
    </div>
  `).join('');
  setTimeout(loadVisibleImages, 50);
}

function renderStarred() {
  const grid = document.getElementById('starredGrid');
  const drugs = DRUGS.filter(d => isStarred(d.id));
  if (!drugs.length) { grid.innerHTML = '<div class="empty">⭐ No starred drugs yet<br><small>Tap ☆ on any drug card</small></div>'; return; }
  grid.innerHTML = drugs.map(d => `
    <div class="drug-card" onclick="openDetail('${d.id}')">
      <div class="drug-img">
        ${d.image ? `<img src="${d.image}" alt="${d.name}" onerror="this.parentNode.innerHTML='${d.emoji}'">` : d.emoji}
      </div>
      <div class="drug-info">
        <div class="drug-name">${t(d.name, d.name_kr)}</div>
        <div class="drug-brand">${d.brand}</div>
        <div class="badge-row">
          <span class="badge badge-class">${t(d.class, d.class_kr)}</span>
          ${riskBadge(d.risk)}
        </div>
      </div>
      <button class="star-btn" onclick="event.stopPropagation();toggleStar('${d.id}')">★</button>
    </div>
  `).join('');
  setTimeout(loadVisibleImages, 50);
}

function renderAll() {
  renderDrugs();
  renderConditions();
  renderStarred();
}

function showTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'starred') renderStarred();
  setTimeout(loadVisibleImages, 50);
}

function openDetail(id) {
  const d = DRUGS.find(x => x.id === id);
  if (!d) return;
  currentDetailId = id;
  document.getElementById('detailTitle').textContent = t(d.name, d.name_kr);
  document.getElementById('detailStarBtn').textContent = isStarred(id) ? '★' : '☆';
  
  const c = document.getElementById('detailContent');
  c.innerHTML = `
    <!-- Hero -->
    <div class="detail-drug-hero">
      <div class="detail-drug-img" onclick="openDrugsComPage('${d.id}',event)" style="cursor:pointer;position:relative" title="Tap to view drug photos">
        ${DRUG_FALLBACK_SVG[d.id] ? `<img data-drug-id="${d.id}" src="${DRUG_FALLBACK_SVG[d.id]}" style="width:100%;height:100%;object-fit:contain;display:block">` : d.emoji}
        <div style="position:absolute;bottom:2px;right:2px;background:rgba(0,0,0,0.65);border-radius:4px;padding:1px 4px;font-size:10px;line-height:1.5;pointer-events:none">🔍</div>
      </div>
      <div class="detail-drug-main">
        <div class="detail-drug-name">${t(d.name, d.name_kr)}</div>
        <div class="detail-drug-brand">${d.brand}</div>
        <div class="badge-row" style="margin-top:8px">
          <span class="badge badge-class">${t(d.class, d.class_kr)}</span>
          <span class="badge ${d.rx?'badge-rx':'badge-otc'}">${d.rx?'Rx':'OTC'}</span>
          ${riskBadge(d.risk)}
        </div>
        <div class="detail-drug-summary">${t(d.summary_en, d.summary_kr)}</div>
      </div>
    </div>

    <!-- Quick Facts -->
    <div class="section">
      <div class="section-title">⚡ Quick Facts</div>
      <div class="quick-grid">
        <div class="quick-item"><div class="quick-label">Onset</div><div class="quick-val">${d.onset}</div></div>
        <div class="quick-item"><div class="quick-label">Half-life</div><div class="quick-val">${d.halflife}</div></div>
        <div class="quick-item"><div class="quick-label">Category</div><div class="quick-val">${t(d.category, d.category_kr)}</div></div>
        <div class="quick-item"><div class="quick-label">Risk Level</div><div class="quick-val" style="color:var(--risk-${d.risk})">${d.risk.toUpperCase()}</div></div>
      </div>
    </div>

    <!-- Mechanism -->
    <div class="section">
      <div class="section-title">⚙️ Mechanism</div>
      <p style="font-size:13px;line-height:1.6">${t(d.mechanism_en, d.mechanism_kr)}</p>
    </div>

    <!-- PT Clinical Scenarios -->
    <div class="section">
      <div class="section-title" style="color:var(--teal)">🏥 PT Clinical Scenarios</div>
      <div class="scenario-list">
        ${d.scenarios.map(s => `
          <div class="scenario-item">
            <div class="scenario-title">📍 ${t(s.title, s.title_kr)}</div>
            <div class="scenario-body">${t(s.body_en, s.body_kr)}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- Dosage -->
    <div class="section">
      <div class="section-title">💊 Dosage</div>
      <table class="dose-table">
        <tr><th>Use</th><th>Normal</th><th>High/Toxic</th></tr>
        ${d.dosage.map(row => `<tr><td>${row.form}</td><td>${row.normal}</td><td style="color:var(--red)">${row.high}</td></tr>`).join('')}
      </table>
    </div>

    <!-- Side Effects -->
    <div class="section">
      <div class="section-title">⚠️ Side Effects</div>
      <div class="tag-list">
        ${(isKR ? d.side_effects_kr : d.side_effects_en).map(s => `<div class="tag-item">• ${s}</div>`).join('')}
      </div>
    </div>

    <!-- Red Flags -->
    <div class="section">
      <div class="section-title" style="color:var(--red)">🚨 Red Flags for PT</div>
      <div class="tag-list">
        ${(isKR ? d.red_flags_kr : d.red_flags).map(s => `<div class="red-flag-item">⚡ ${s}</div>`).join('')}
      </div>
    </div>

    <!-- Interactions -->
    <div class="section">
      <div class="section-title" style="color:var(--purple)">🔗 Drug Interactions</div>
      <div class="tag-list">
        ${(isKR ? d.interactions_kr : d.interactions_en).map(s => `<div class="interaction-item">↔ ${s}</div>`).join('')}
      </div>
    </div>

    <!-- Chart Note -->
    <div class="section">
      <div class="section-title" style="color:var(--green)">📋 PT Chart Documentation</div>
      <div class="note-box">${t(d.chart_note_en, d.chart_note_kr)}</div>
    </div>
  `;
  
  document.getElementById('detailView').classList.add('open');
  document.getElementById('detailView').scrollTop = 0;
  setTimeout(loadVisibleImages, 50);
}

function closeDetail() {
  document.getElementById('detailView').classList.remove('open');
  currentDetailId = null;
}

// Handle back button on mobile
window.addEventListener('popstate', closeDetail);

renderAll();
setTimeout(loadVisibleImages, 100);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(r => console.log('SW registered'))
      .catch(e => console.log('SW failed:', e));
  });
}

// iOS install prompt banner
function showInstallBanner() {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true;
  const dismissed = localStorage.getItem('install_dismissed');
  if (isIOS && !isStandalone && !dismissed) {
    const banner = document.createElement('div');
    banner.id = 'install-banner';
    banner.style.cssText = `
      position:fixed;bottom:90px;left:12px;right:12px;z-index:9999;
      background:#1a1d27;border:1px solid #00bfae;border-radius:14px;
      padding:14px 16px;display:flex;align-items:center;gap:12px;
      box-shadow:0 4px 20px rgba(0,191,174,0.3);
    `;
    banner.innerHTML = `
      <span style="font-size:32px">💊</span>
      <div style="flex:1">
        <div style="font-weight:700;font-size:14px;color:#e8eaf0">앱으로 설치하기</div>
        <div style="font-size:12px;color:#8b8fa8;margin-top:2px">
          하단 <strong style="color:#00bfae">공유(⬆)</strong> 버튼 → <strong style="color:#00bfae">홈 화면에 추가</strong>
        </div>
      </div>
      <button onclick="document.getElementById('install-banner').remove();localStorage.setItem('install_dismissed','1')"
        style="background:none;border:none;color:#8b8fa8;font-size:20px;cursor:pointer;padding:4px">✕</button>
    `;
    document.body.appendChild(banner);
  }
}
window.addEventListener('load', showInstallBanner);
</script>
</body>
