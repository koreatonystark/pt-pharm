<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PT Pharm">
<meta name="theme-color" content="#00bfae">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>PT Pharmacology</title>
<style>

:root{--bg:#0f1117;--card:#1a1d27;--c2:#22263a;--teal:#00bfae;--blue:#3d8ef8;
  --red:#ff4d4f;--yel:#fbbf24;--grn:#22c55e;--pur:#a78bfa;--tx:#e8eaf0;--mu:#8b8fa8;--br:#2d3154}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;padding-bottom:76px}
/* header */
#hdr{background:var(--card);padding:10px 16px 0;border-bottom:1px solid var(--br);position:sticky;top:0;z-index:50}
.h1{font-size:17px;font-weight:700;color:var(--teal)}
.h2{font-size:11px;color:var(--mu)}
.lbtn{background:var(--teal);color:#000;border:none;border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer}
#sbar{display:flex;align-items:center;gap:8px;background:var(--c2);border:1px solid var(--br);border-radius:10px;padding:8px 12px;margin:8px 0 10px}
#sbar input{background:none;border:none;outline:none;color:var(--tx);font-size:14px;width:100%}
/* filter chips */
#fbar{display:flex;gap:7px;overflow-x:auto;padding:8px 16px;scrollbar-width:none}
#fbar::-webkit-scrollbar{display:none}
.chip{background:var(--c2);border:1px solid var(--br);border-radius:20px;padding:5px 12px;font-size:12px;white-space:nowrap;cursor:pointer;color:var(--mu);user-select:none}
.chip.on{background:var(--teal);color:#000;border-color:var(--teal);font-weight:700}
/* tabs */
#tbar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--br);display:flex;padding:6px 0 env(safe-area-inset-bottom,6px);z-index:500}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px;cursor:pointer;border:none;background:none;color:var(--mu);font-size:10px}
.tb.on{color:var(--teal)}
.tb svg{width:20px;height:20px}
/* views */
.view{display:none;padding:12px 16px}
.view.on{display:block}
/* drug card */
.dc{background:var(--card);border:1px solid var(--br);border-radius:12px;padding:12px;cursor:pointer;margin-bottom:10px}
.dc:active{opacity:.8}
.dn{font-weight:700;font-size:15px}
.db{color:var(--mu);font-size:12px;margin-top:1px}
.br{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.b{padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600}
.bcl{background:#1e3a5f;color:var(--blue)}
.brx{background:#1a2e1a;color:var(--grn)}
.bot{background:#2e2a1a;color:var(--yel)}
.blo{background:#1a2e1a;color:#22c55e}
.bmo{background:#2e2a1a;color:#fbbf24}
.bhi{background:#2e1a1a;color:#ff4d4f}
.sb{font-size:20px;cursor:pointer;background:none;border:none;padding:2px;flex-shrink:0;color:var(--tx)}
.ds{font-size:13px;color:var(--tx);line-height:1.6;margin-top:6px}
.ic{width:34px;height:34px;border-radius:7px;background:var(--c2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px}
.ic img{width:100%;height:100%;object-fit:contain}
/* condition list */
.cc{background:var(--card);border:1px solid var(--br);border-radius:12px;padding:12px;cursor:pointer;margin-bottom:6px}
.cc:active{opacity:.8}
.cn{font-weight:600;font-size:14px}
.cd{color:var(--mu);font-size:12px;margin-top:3px}
/* interaction tags in condition detail */
.itag{border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:13px;line-height:1.5}
/* back row */
.bkrow{display:none;align-items:center;gap:8px;margin-bottom:12px}
.bkbtn{background:none;border:none;color:var(--teal);font-size:22px;cursor:pointer;padding:0;line-height:1}
.bktitle{font-size:15px;font-weight:700}
/* detail panel */
#det{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;overflow-y:auto;padding-bottom:40px}
#det.on{display:block}
#dhdr{background:var(--card);padding:10px 14px;border-bottom:1px solid var(--br);position:sticky;top:0;z-index:10}
#dbtn{background:none;border:none;color:var(--teal);font-size:22px;cursor:pointer;padding:0;line-height:1;flex-shrink:0}
#dtitle{font-size:18px;font-weight:800;color:var(--tx)}
#dbrand{font-size:12px;color:#a0a4bc;margin-left:6px}
#dlang{background:var(--teal);color:#000;border:none;border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700;cursor:pointer}
#dstar{font-size:20px;cursor:pointer;background:none;border:none;padding:2px;color:var(--tx)}
#dbody{padding:12px 14px;display:flex;flex-direction:column;gap:12px}
.sec{background:var(--card);border-radius:12px;padding:14px}
.st{font-weight:700;font-size:14px;margin-bottom:8px}
.tag{background:var(--c2);border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:5px}
.rtag{background:#2e1a1a;border:1px solid #5a2020;border-radius:8px;padding:8px 12px;font-size:13px;color:#ffb3b3;margin-bottom:5px}
.iatag{background:#1a1f3a;border:1px solid #2d3575;border-radius:8px;padding:8px 12px;font-size:13px;color:#b3c3ff;margin-bottom:5px}
.scen{background:#003d36;border:1px solid #005a50;border-radius:10px;padding:12px;margin-bottom:8px}
.sct{font-weight:700;font-size:13px;color:var(--teal);margin-bottom:5px}
.scb{font-size:13px;line-height:1.6;color:#c8f0ec}
.nbox{background:#1a2e1a;border:1px solid #2d5a2d;border-radius:10px;padding:12px;font-size:12px;color:#b3f0b3;line-height:1.6;font-family:monospace}
.qg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.qi{background:var(--c2);border-radius:8px;padding:8px}
.ql{font-size:10px;color:var(--mu);margin-bottom:2px}
.qv{font-size:12px;font-weight:600}
.dtb{width:100%;border-collapse:collapse}
.dtb th{background:var(--c2);padding:7px;font-size:12px;text-align:left;color:var(--mu)}
.dtb td{padding:7px;font-size:12px;border-top:1px solid var(--br)}
.hero{display:flex;align-items:flex-start;gap:10px;padding:12px;background:var(--card);border-radius:12px}
.him{width:52px;height:52px;border-radius:8px;background:var(--c2);flex-shrink:0;overflow:hidden;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;font-size:24px}
.him img{width:100%;height:100%;object-fit:contain;display:block}
.hlnk{position:absolute;bottom:1px;right:1px;background:rgba(0,0,0,.7);border-radius:3px;padding:0 3px;font-size:9px;line-height:1.6;pointer-events:none}
.empty{text-align:center;color:var(--mu);padding:40px 0}


/* ── Tooltip / Abbr system ── */
.abbr{border-bottom:1px dotted var(--teal);cursor:pointer;color:inherit;font-weight:inherit;white-space:nowrap}
#tip{position:fixed;z-index:9000;background:#1a1d27;border:1px solid var(--teal);border-radius:10px;
  padding:10px 14px;max-width:260px;box-shadow:0 4px 20px rgba(0,191,174,.25);
  pointer-events:none;opacity:0;transition:opacity .15s;font-size:13px;line-height:1.5}
#tip.on{opacity:1}
#tip-term{font-weight:700;color:var(--teal);font-size:14px;margin-bottom:2px}
#tip-norm{color:var(--grn);font-size:12px;margin-top:4px;padding-top:4px;border-top:1px solid var(--br)}
</style></head><body>

<div id="hdr">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
    <div><div class="h1">💊 PT Pharmacology</div><div class="h2">Dr.Jeon 2026 · 22 Drugs · Clinical Reference</div></div>
    <button class="lbtn" id="lbtn" onclick="toggleLang()">한/EN</button>
  </div>
  <div id="sbar">
    <span style="color:var(--mu)">🔍</span>
    <input id="si" type="text" placeholder="Search drug or condition..." oninput="onSearch()">
  </div>
</div>

<div id="fbar">
  <span class="chip on" data-cat="all">All</span>
  <span class="chip" data-cat="Cardiovascular">❤️ Cardio</span>
  <span class="chip" data-cat="Musculoskeletal">🦴 MSK</span>
  <span class="chip" data-cat="Neurological">🧠 Neuro</span>
  <span class="chip" data-cat="Pain">🚨 Opioid</span>
  <span class="chip" data-cat="Respiratory">💨 Resp</span>
  <span class="chip" data-cat="Endocrine">💉 Endo</span>
</div>

<div class="view on" id="v-drugs"><div id="dlist"></div></div>

<div class="view" id="v-conds">
  <div class="bkrow" id="cbk">
    <button class="bkbtn" id="cbkbtn">←</button>
    <span class="bktitle" id="cbktitle"></span>
  </div>
  <div id="cmain"></div>
  <div id="cdetail" style="display:none"></div>
</div>

<div class="view" id="v-star"><div id="slist"></div></div>

<div id="tbar">
  <button class="tb on" id="t-drugs" onclick="showTab('drugs')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Drugs
  </button>
  <button class="tb" id="t-conds" onclick="showTab('conds')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>Conditions
  </button>
  <button class="tb" id="t-star" onclick="showTab('star')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Starred
  </button>
</div>

<div id="det">
  <div id="dhdr">
    <div style="display:flex;align-items:center;gap:8px">
      <button id="dbtn" onclick="closeDet()">←</button>
      <div style="flex:1;min-width:0;overflow:hidden">
        <div style="display:flex;flex-wrap:wrap;align-items:baseline;gap:0 6px;line-height:1.4">
          <span id="dtitle">-</span><span id="dbrand">-</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
        <button id="dlang" onclick="toggleLang()">한/EN</button>
        <button id="dstar" onclick="toggleStarCur()">☆</button>
      </div>
    </div>
  </div>
  <div id="dbody"></div>
</div>

<script>
var DRUGS=[{"id": "metoprolol", "name": "Metoprolol", "brand": "Lopressor / Toprol-XL", "name_kr": "메토프롤롤", "category": "Cardiovascular", "category_kr": "심혈관계", "class": "Beta-1 Blocker", "class_kr": "베타1 차단제", "rx": true, "risk": "moderate", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Metoprolol_succinate_100mg.jpg/120px-Metoprolol_succinate_100mg.jpg", "emoji": "💊", "summary_en": "Selective beta-1 blocker for HTN, angina, HF. Blunts HR response to exercise.", "summary_kr": "고혈압·협심증·심부전에 사용. 운동 중 심박수 반응을 억제함.", "mechanism_en": "Competitively blocks β1-adrenergic receptors → ↓HR, ↓contractility, ↓BP. Cardioselective at low doses.", "mechanism_kr": "β1 수용체 경쟁적 차단 → 심박수·수축력·혈압 감소. 저용량에서 심장선택적.", "onset": "1–2 hr (oral)", "halflife": "3–7 hr (IR) / 14–22 hr (ER)", "scenarios": [{"title": "HR cap during exercise", "title_kr": "운동 중 HR 상한선", "body_en": "Patient on metoprolol 50mg BID: HR stays at 58 bpm despite moderate intensity cycling. This is EXPECTED — do not push harder assuming patient is deconditioned. Use RPE (Borg 11–13) instead of HR targets.", "body_kr": "메토프롤롤 복용 환자: 중등도 사이클링에서도 HR 58 유지 → 컨디션 문제가 아님. HR 기반 목표 대신 RPE 11-13 사용."}, {"title": "Orthostatic hypotension risk", "title_kr": "기립성 저혈압 위험", "body_en": "Patient rises quickly from supine after lumbar traction. HR cannot compensate (blocked). Check BP lying→sitting→standing. Dizziness + BP drop >20mmHg = orthostatic hypotension.", "body_kr": "누운 자세에서 갑자기 일어날 때 HR 보상 불가. 와위→앉기→서기 BP 확인. 20mmHg 이상 하강 = 기립성 저혈압."}, {"title": "Bradycardia threshold", "title_kr": "서맥 기준", "body_en": "Pre-exercise HR <50 bpm → hold aerobic exercise. Document: 'Patient HR 46 at rest, physician notified, exercise withheld per protocol.'", "body_kr": "운동 전 HR 50 미만 → 유산소 운동 보류. 의사에게 알리고 차트에 기록."}, {"title": "Abrupt discontinuation danger", "title_kr": "갑작스러운 중단 위험", "body_en": "Patient says 'I stopped my beta blocker 2 days ago.' RED FLAG: rebound tachycardia, angina, possible MI. Refer immediately — do not perform vigorous exercise.", "body_kr": "2일 전 갑자기 중단 → 반동성 빈맥·협심증·심근경색 위험. 즉시 의뢰, 강도 높은 운동 금지."}], "side_effects_en": ["Bradycardia (↓HR from β1 blockade)", "Fatigue (↓cardiac output → ↓exercise capacity)", "Cold extremities (↓peripheral perfusion)", "Depression (CNS β-receptor effect)", "Dyspnea in asthmatics (β2 blockade at high doses)", "Sexual dysfunction (↓sympathetic tone)"], "side_effects_kr": ["서맥 (β1 차단 → HR 감소)", "피로 (심박출량 감소 → 운동 능력 저하)", "사지냉감 (말초 관류 감소)", "우울증 (CNS β 수용체 영향)", "천식 환자 호흡곤란 (고용량 시 β2 차단)", "성기능 장애 (교감신경 긴장도 감소)"], "red_flags": ["[BEFORE PT] HR <50 bpm at rest → hold aerobic exercise, document, notify physician if persistent or symptomatic", "[BEFORE PT] Patient stopped beta-blocker abruptly 2+ days ago → cancel session, refer to ER same day — rebound tachycardia/angina/MI risk", "[DURING PT] HR stays <50 despite increasing intensity → stop, use RPE scale only, do not push harder", "[DURING PT] Patient reports chest pain or pressure during exercise → stop immediately, call 911 — possible angina or MI", "[DURING PT] Sudden dyspnea + bilateral crackles + S3 → stop, call 911 — acute heart failure", "[AFTER PT] Patient reports dizziness on standing post-session → have patient sit, check BP, educate on slow position changes"], "red_flags_kr": ["[PT 전] 안정시 HR 50 미만 → 유산소 운동 보류, 차트 기록, 지속/증상 있으면 의사 연락", "[PT 전] 2일 이상 전 베타차단제 갑자기 중단 → 세션 취소, 당일 응급실 의뢰 — 반동성 빈맥/협심증/심근경색 위험", "[PT 중] 강도 높여도 HR 50 미만 유지 → 중지, RPE 척도만 사용, 더 밀어붙이지 말 것", "[PT 중] 운동 중 흉통 또는 흉압 호소 → 즉시 중지, 119 호출 — 협심증 또는 심근경색 가능", "[PT 중] 갑작스러운 호흡곤란 + 양측 수포음 + S3 → 중지, 119 호출 — 급성 심부전", "[PT 후] 세션 후 서기 시 어지러움 호소 → 앉히고 혈압 확인, 천천히 자세 변경 교육"], "interactions_en": ["Calcium channel blockers (amlodipine): additive HR/BP reduction", "NSAIDs: blunt antihypertensive effect", "Insulin: masks hypoglycemia tachycardia"], "interactions_kr": ["CCB(암로디핀): 심박수·혈압 추가 감소", "NSAIDs: 항고혈압 효과 감소", "인슐린: 저혈당 빈맥 증상 은폐"], "chart_note_en": "Patient taking Metoprolol succinate 50mg QD. Exercise HR 52–58 bpm. RPE scale used for intensity monitoring. No signs of peripheral hypoperfusion noted.", "chart_note_kr": "메토프롤롤 서신산염 50mg 1일 1회 복용 중. 운동 중 HR 52-58 bpm. RPE 척도로 강도 모니터링. 말초 저관류 징후 없음.", "dosage": [{"form": "HTN", "normal": "25–100mg QD/BID", "high": ">200mg/day"}]}, {"id": "lisinopril", "name": "Lisinopril", "brand": "Zestril / Prinivil", "name_kr": "리시노프릴", "category": "Cardiovascular", "category_kr": "심혈관계", "class": "ACE Inhibitor", "class_kr": "ACE 억제제", "rx": true, "risk": "moderate", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Lisinopril_10mg.jpg/120px-Lisinopril_10mg.jpg", "emoji": "💊", "summary_en": "ACE inhibitor for HTN, HF, diabetic nephropathy. Risk of dry cough and hyperkalemia.", "summary_kr": "고혈압·심부전·당뇨신증에 사용. 마른기침과 고칼륨혈증 위험.", "mechanism_en": "Blocks ACE → ↓angiotensin II → vasodilation + ↓aldosterone → ↓BP. Bradykinin accumulation causes cough.", "mechanism_kr": "ACE 차단 → 안지오텐신II 감소 → 혈관 확장. 브래디키닌 축적으로 기침 발생.", "onset": "1 hr", "halflife": "12 hr", "scenarios": [{"title": "Chronic dry cough ID", "title_kr": "만성 마른기침 식별", "body_en": "Patient in PT for shoulder rehab complains of new persistent dry cough x 3 weeks. Ask: 'Are you on lisinopril or any blood pressure medicine?' ACE inhibitor cough affects 10–15% of users. Refer to physician to switch to ARB.", "body_kr": "어깨 재활 중 3주간 지속되는 마른기침 호소 → 리시노프릴 등 ACE 억제제 복용 여부 확인. 10-15%에서 발생. 의사에게 ARB 전환 검토 의뢰."}, {"title": "First-dose hypotension", "title_kr": "첫 용량 저혈압", "body_en": "Patient just started lisinopril this week. First PT session: check BP before AND after first exercise bout. Systolic drop >20mmHg = stop, have patient sit/lie down.", "body_kr": "이번 주 리시노프릴 시작 → 첫 PT 세션 운동 전후 혈압 확인. 수축기 20mmHg 이상 하강 시 운동 중지, 앉히거나 눕힘."}, {"title": "Angioedema emergency", "title_kr": "혈관부종 응급", "body_en": "Patient on lisinopril suddenly develops facial swelling, lip swelling, tongue/throat swelling during PT. STOP session immediately. Call 911. This is angioedema — life-threatening airway emergency.", "body_kr": "PT 중 갑자기 얼굴·입술·혀·목 부종 발생 → 즉시 세션 중지, 119 호출. 혈관부종으로 기도 폐쇄 위험."}, {"title": "Potassium foods caution", "title_kr": "칼륨 식품 주의 안내", "body_en": "Patient on lisinopril asks about nutrition for PT. Note: ACE inhibitors cause potassium retention. Excess banana/avocado/OJ on top of ACE inhibitor + K-sparing diuretic → hyperkalemia risk.", "body_kr": "ACE 억제제는 칼륨 저류 유발. 바나나·아보카도 과잉 + 칼륨보존이뇨제 병용 시 고칼륨혈증 위험 → 식이 주의 안내."}], "side_effects_en": ["Dry cough (↑bradykinin accumulation from ACE inhibition)", "Angioedema — rare but dangerous (↑bradykinin → vascular permeability)", "Hypotension (↓angiotensin II → vasodilation)", "Hyperkalemia (↓aldosterone → K+ retention)", "Renal impairment (↓GFR from efferent arteriole dilation)"], "side_effects_kr": ["마른기침 (ACE 억제 → 브래디키닌 축적)", "혈관부종 드물지만 위험 (↑브래디키닌 → 혈관 투과성)", "저혈압 (안지오텐신II 감소 → 혈관 확장)", "고칼륨혈증 (알도스테론 감소 → K+ 저류)", "신기능 저하 (원심성 세동맥 확장 → GFR 감소)"], "red_flags": ["[BEFORE PT] First week of lisinopril — check BP before session; systolic <90 → postpone PT, call prescriber", "[DURING PT] Sudden facial/lip/tongue/throat swelling → stop session immediately, call 911 — angioedema, airway emergency, NOT allergic rash", "[DURING PT] Systolic BP drop >20 mmHg on standing after supine exercise → have patient lie down, elevate legs, monitor, do not restart until BP stable", "[DURING PT] Dry cough causing exercise intolerance → note in chart, refer to MD to switch to ARB; continue PT otherwise", "[AFTER PT] Patient reports unusual muscle cramps post-session → check for hyperkalemia history; refer to physician if recurring"], "red_flags_kr": ["[PT 전] 리시노프릴 시작 첫 주 — 세션 전 혈압 확인; 수축기 90 미만 → PT 연기, 처방의 연락", "[PT 중] 갑자기 얼굴/입술/혀/목 부종 → 즉시 세션 중지, 119 호출 — 혈관부종, 기도 응급, 알레르기 발진과 다름", "[PT 중] 앙와위 운동 후 서기 시 수축기 20mmHg 이상 하강 → 눕히고 다리 올리기, 모니터링, 혈압 안정 전 재개 금지", "[PT 중] 마른기침이 운동 내성 저해 → 차트 기록, ARB 전환 위해 의사 의뢰; 그 외 PT 지속", "[PT 후] 세션 후 비정상적 근육 경련 호소 → 고칼륨혈증 과거력 확인; 반복 시 의사 의뢰"], "interactions_en": ["Potassium-sparing diuretics: hyperkalemia", "NSAIDs: reduce antihypertensive effect + nephrotoxic", "ARBs (if combined): dual RAAS block → avoid"], "interactions_kr": ["칼륨보존이뇨제: 고칼륨혈증", "NSAIDs: 항고혈압 효과 감소 + 신독성", "ARB 병용: dual RAAS 차단 → 피할 것"], "chart_note_en": "Patient on Lisinopril 10mg QD. No cough reported. Pre-exercise BP 128/78. No angioedema signs observed.", "chart_note_kr": "리시노프릴 10mg 1일 1회 복용 중. 기침 없음. 운동 전 혈압 128/78. 혈관부종 징후 없음.", "dosage": [{"form": "HTN", "normal": "10–40mg QD", "high": ">40mg/day"}]}, {"id": "losartan", "name": "Losartan", "brand": "Cozaar", "name_kr": "로사르탄", "category": "Cardiovascular", "category_kr": "심혈관계", "class": "ARB (Angiotensin Receptor Blocker)", "class_kr": "안지오텐신 수용체 차단제", "rx": true, "risk": "moderate", "image": "", "emoji": "🫀", "summary_en": "ARB for HTN, HF, diabetic nephropathy. Like ACE inhibitor but WITHOUT the cough.", "summary_kr": "고혈압·심부전·당뇨신증. ACE 억제제와 유사하나 기침 없음.", "mechanism_en": "Blocks AT1 receptor directly → vasodilation + ↓aldosterone. Does NOT inhibit ACE, so no bradykinin accumulation → no cough.", "mechanism_kr": "AT1 수용체 직접 차단 → 혈관 확장. ACE 미억제로 기침 없음.", "onset": "1–3 hr", "halflife": "2 hr (active metabolite 6–9 hr)", "scenarios": [{"title": "ACE cough switcher", "title_kr": "ACE 기침으로 전환된 환자", "body_en": "Patient switched from lisinopril to losartan due to cough. PT context: similar BP-lowering profile. Watch for first-dose orthostatic hypotension — same caution applies.", "body_kr": "기침 때문에 리시노프릴에서 전환된 경우. 초회 기립성 저혈압 동일하게 주의."}, {"title": "HTN + Gout combo patient", "title_kr": "고혈압 + 통풍 환자", "body_en": "Losartan has unique uricosuric effect — lowers uric acid. Ideal for HTN patients who also have gout. PT note: joint mobilization near acutely inflamed joints still needs MD clearance.", "body_kr": "로사르탄은 요산 배출 효과도 있어 고혈압+통풍 환자에게 선호. 급성 관절 염증 부위 도수치료는 의사 허가 필요."}, {"title": "Dehydration risk in summer", "title_kr": "여름철 탈수 위험", "body_en": "ARBs + summer sweating during PT → significant BP drop. Monitor closely during outdoor or high-temperature PT sessions. Ensure patient is hydrated before session.", "body_kr": "ARB + 고온 환경 운동 → 큰 폭 혈압 하강 가능. 운동 전 수분 상태 확인 필수."}], "side_effects_en": ["Dizziness (↓angiotensin II → vasodilation → BP drop)", "Hyperkalemia (↓aldosterone → K+ retention)", "Hypotension (vasodilation, especially first dose)", "Renal impairment (↓GFR, similar to ACE inhibitor mechanism)", "Rare angioedema (↑bradykinin via alternative pathway)"], "side_effects_kr": ["어지러움 (안지오텐신II 감소 → 혈관 확장 → 혈압 하강)", "고칼륨혈증 (알도스테론 감소 → K+ 저류)", "저혈압 (혈관 확장, 특히 첫 복용 시)", "신기능 저하 (GFR 감소, ACE 억제제와 유사 기전)", "드문 혈관부종 (대안 경로 통한 브래디키닌 상승)"], "red_flags": ["[BEFORE PT] BP <90/60 reported or patient feels lightheaded before session → hold PT, refer to physician", "[DURING PT] Systolic BP drop >20 mmHg on position change → stop position change, slow transitions, recheck BP, hold tilting/traction tables", "[DURING PT] Facial or tongue swelling (rare angioedema with ARBs) → call 911 immediately, stop session", "[AFTER PT] Patient on losartan + potassium supplement reports palpitations after session → refer to physician — hyperkalemia risk"], "red_flags_kr": ["[PT 전] 혈압 90/60 미만 보고 또는 어지러움 → PT 보류, 의사 의뢰", "[PT 중] 자세 변경 시 수축기 20mmHg 이상 하강 → 자세 변경 중지, 천천히 전환, 혈압 재확인, 틸트/견인 테이블 보류", "[PT 중] 얼굴 또는 혀 부종(ARB의 드문 혈관부종) → 즉시 119 호출, 세션 중지", "[PT 후] 로사르탄 + 칼륨 보충제 복용 환자 세션 후 심계항진 → 의사 의뢰 — 고칼륨혈증 위험"], "interactions_en": ["ACE inhibitors: dual RAAS → avoid", "NSAIDs: reduce effect + nephrotoxic", "K+ supplements: hyperkalemia"], "interactions_kr": ["ACE 억제제 병용: dual RAAS 차단 피할 것", "NSAIDs: 효과 감소 + 신독성", "칼륨 보충제: 고칼륨혈증"], "chart_note_en": "Patient on Losartan 50mg QD for HTN. Pre-exercise BP 122/76. No dizziness or edema reported.", "chart_note_kr": "로사르탄 50mg 1일 1회 복용 중. 운동 전 BP 122/76. 어지러움·부종 없음.", "dosage": [{"form": "HTN", "normal": "25–100mg QD", "high": ">100mg/day"}]}, {"id": "amlodipine", "name": "Amlodipine", "brand": "Norvasc", "name_kr": "암로디핀", "category": "Cardiovascular", "category_kr": "심혈관계", "class": "Calcium Channel Blocker (DHP)", "class_kr": "칼슘채널차단제(DHP)", "rx": true, "risk": "low", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Amlodipine_5mg_tablets.jpg/120px-Amlodipine_5mg_tablets.jpg", "emoji": "💊", "summary_en": "Dihydropyridine CCB for HTN and angina. Causes peripheral edema. Long half-life = consistent BP control.", "summary_kr": "고혈압·협심증. 말초부종 흔함. 긴 반감기로 안정적 혈압 조절.", "mechanism_en": "Blocks L-type Ca2+ channels in vascular smooth muscle → vasodilation. Minimal cardiac depression (unlike diltiazem/verapamil).", "mechanism_kr": "혈관 평활근 칼슘 차단 → 혈관 확장. 심장 억제 최소(딜티아젬과 달리).", "onset": "6–12 hr", "halflife": "30–50 hr", "scenarios": [{"title": "Ankle edema misread", "title_kr": "발목 부종 오인", "body_en": "Patient with bilateral ankle pitting edema on amlodipine 10mg. Do NOT assume this is cardiac failure edema. Amlodipine causes venous dilation → fluid pooling. Ask: 'Is this new or longstanding?' Compare bilaterally — amlodipine edema is bilateral and symmetric.", "body_kr": "양측 발목 함요부종 → 심부전으로 오인 금지. 암로디핀의 정맥 확장으로 체액 정체. 양측 대칭적이면 약물성 가능성."}, {"title": "Flushing during exercise", "title_kr": "운동 중 홍조", "body_en": "Patient reports facial flushing and headache during early exercise on amlodipine. Common vasodilation side effect. Reassure patient; reduce intensity initially. Flushing typically improves with continued use.", "body_kr": "운동 초반 얼굴 홍조·두통 호소 → 혈관 확장 부작용. 초기에 흔히 발생, 강도 낮추고 지속 사용 시 개선."}, {"title": "Gingival hyperplasia note", "title_kr": "치은 증식 주의", "body_en": "Long-term amlodipine patient mentions 'my gums are growing.' This is gingival hyperplasia — a known CCB side effect. Not PT-managed but note in chart and refer to dentist/prescriber.", "body_kr": "장기 복용 환자의 잇몸 증식(치은 증식) → CCB 부작용. 치과 또는 처방의에게 의뢰."}], "side_effects_en": ["Peripheral edema — ankles (venous dilation → fluid pooling, NOT fluid overload)", "Flushing (peripheral vasodilation)", "Headache (cerebral vasodilation)", "Palpitations (reflex tachycardia from vasodilation)", "Gingival hyperplasia — long-term (Ca²⁺ channel blockade in gum fibroblasts)"], "side_effects_kr": ["말초부종 발목 (정맥 확장 → 체액 정체, 체액 과부하 아님)", "홍조 (말초 혈관 확장)", "두통 (뇌혈관 확장)", "심계항진 (혈관 확장에 대한 반사적 빈맥)", "치은 증식 장기 (잇몸 섬유아세포의 Ca²⁺ 채널 차단)"], "red_flags": ["[BEFORE PT] Bilateral ankle edema rapidly worsening over 2–3 days → refer to physician before proceeding — rule out CHF, do not assume drug-only cause", "[DURING PT] Flushing + headache in early treatment → reassure, reduce intensity, monitor; normal vasodilation effect", "[DURING PT] HR >110 + palpitations at rest during session → stop, have patient rest, check BP, refer if persistent or symptomatic", "[DURING PT] Severe headache not responding to rest during PT → stop session, refer to physician same day — check for hypertensive urgency", "[AFTER PT] New or worsening gum swelling reported → refer to dentist AND prescriber — gingival hyperplasia (long-term CCB side effect)"], "red_flags_kr": ["[PT 전] 2-3일 내 급격히 악화되는 양측 발목 부종 → 진행 전 의사 의뢰 — 심부전 감별, 약물 단독 원인으로 단정 금지", "[PT 중] 초기 치료 중 홍조 + 두통 → 안심시키고, 강도 낮추기, 모니터링; 정상 혈관 확장 효과", "[PT 중] 세션 중 안정시 HR 110 초과 + 심계항진 → 중지, 안정, 혈압 확인, 지속/증상 있으면 의뢰", "[PT 중] PT 중 안정해도 나아지지 않는 심한 두통 → 세션 중지, 당일 의사 의뢰 — 고혈압성 긴급증 확인", "[PT 후] 새로운 또는 악화되는 잇몸 부종 보고 → 치과 및 처방의 모두 의뢰 — 치은 증식(장기 CCB 부작용)"], "interactions_en": ["Beta-blockers: additive HR/BP reduction", "Simvastatin >20mg: rhabdomyolysis risk", "CYP3A4 inhibitors (grapefruit): increased levels"], "interactions_kr": ["베타차단제: 심박수·혈압 추가 감소", "심바스타틴 20mg 초과: 횡문근융해 위험", "자몽: 혈중 농도 증가"], "chart_note_en": "Patient on Amlodipine 5mg QD. Bilateral ankle edema noted, symmetric, non-pitting. Consistent with medication side effect per patient's MD.", "chart_note_kr": "암로디핀 5mg 1일 1회 복용 중. 양측 발목 비함요부종 관찰, 대칭적. 담당의 확인 완료된 약물 부작용.", "dosage": [{"form": "HTN", "normal": "5mg QD", "high": "10mg QD"}]}, {"id": "furosemide", "name": "Furosemide", "brand": "Lasix", "name_kr": "푸로세미드", "category": "Cardiovascular", "category_kr": "심혈관계", "class": "Loop Diuretic", "class_kr": "루프 이뇨제", "rx": true, "risk": "moderate", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/Furosemide_40mg_tablets.jpg/120px-Furosemide_40mg_tablets.jpg", "emoji": "💊", "summary_en": "Powerful loop diuretic for edema, HF, HTN. Causes potassium loss and dehydration. Schedule PT 4+ hrs after dose.", "summary_kr": "강력한 이뇨제. 칼륨 손실·탈수 유발. 복용 4시간 후 PT 권장.", "mechanism_en": "Inhibits Na-K-2Cl transporter in Loop of Henle → massive diuresis. Rapid onset 30–60 min (oral).", "mechanism_kr": "헨레고리 Na-K-2Cl 수송체 억제 → 강력한 이뇨. 경구 30-60분 내 효과.", "onset": "30–60 min (oral)", "halflife": "2 hr", "scenarios": [{"title": "PT timing critical", "title_kr": "PT 타이밍 중요", "body_en": "Patient takes furosemide 40mg at 8am. Schedule PT no earlier than 12pm. If PT during peak diuresis: patient needs frequent bathroom breaks, significant dehydration possible, BP may drop during exercise.", "body_kr": "오전 8시 복용 시 낮 12시 이후 PT 권장. 이뇨 최고점에 운동 시 화장실 빈번, 탈수, 혈압 하강 가능."}, {"title": "Hypokalemia presentation", "title_kr": "저칼륨혈증 증상", "body_en": "Patient mid-PT session suddenly reports: leg cramps, muscle weakness, palpitations. On furosemide daily. STOP exercise. This is classic hypokalemia presentation. Check K+ history. K+ <3.0 = medical emergency.", "body_kr": "PT 중 갑자기 다리 경련·근력 약화·심계항진 → 저칼륨혈증 의심. 운동 즉시 중지. K+ 3.0 미만 = 응급."}, {"title": "Weight monitoring education", "title_kr": "체중 모니터링 교육", "body_en": "CHF patient on furosemide: daily weight is a clinical vital sign. Weight gain >2 lbs overnight = fluid retention → dose may need adjustment. Educate patient to report to MD.", "body_kr": "심부전 환자 매일 체중 측정 필수. 하루 0.9kg(2파운드) 이상 증가 = 체액 저류 신호 → 의사에게 보고 교육."}], "side_effects_en": ["Hypokalemia (↑K⁺ loss in Loop of Henle — most clinically important)", "Dehydration (massive diuresis → volume depletion)", "Hypotension (↓intravascular volume)", "Ototoxicity at high IV doses (↓endolymph ion transport in cochlea)", "Hyponatremia (↑Na⁺ loss with diuresis)", "Hyperuricemia/Gout (↓uric acid excretion)"], "side_effects_kr": ["저칼륨혈증 (헨레고리에서 K⁺ 손실 증가 — 임상적으로 가장 중요)", "탈수 (강력한 이뇨 → 혈량 감소)", "저혈압 (혈관 내 용적 감소)", "이독성 고용량 IV (달팽이관 내림프액 이온 수송 감소)", "저나트륨혈증 (이뇨와 함께 Na⁺ 손실 증가)", "고요산혈증/통풍 (요산 배설 감소)"], "red_flags": ["[BEFORE PT] Schedule PT 4+ hours after morning furosemide dose — peak diuresis at 1–2 hr causes urgency and hypotension during exercise", "[BEFORE PT] K+ <3.5 mEq/L on recent labs → hold entire session, refer to physician today — arrhythmia risk", "[BEFORE PT] Patient reports significant diarrhea or vomiting since last session → check hydration, hold PT, refer to physician — dehydration + diuretic = dangerous BP drop", "[DURING PT] Sudden leg cramps + weakness mid-session → stop immediately, lay supine, assess for hypokalemia, refer to physician", "[DURING PT] Dizziness + BP drop + tachycardia → stop PT, lay supine, call physician — dehydration/orthostatic hypotension", "[AFTER PT] CHF patient gained >2 lbs overnight → cancel next PT session, refer to physician same day — fluid retention signal"], "red_flags_kr": ["[PT 전] 아침 푸로세미드 복용 4시간 이상 후 PT 예약 — 최고 이뇨 시간(1-2시간)에 운동 시 화장실 빈번 및 저혈압", "[PT 전] 최근 검사 K+ 3.5 미만 → 전체 세션 보류, 당일 의사 의뢰 — 부정맥 위험", "[PT 전] 지난 세션 이후 심한 설사 또는 구토 보고 → 수분 상태 확인, PT 보류, 의사 의뢰 — 탈수 + 이뇨제 = 위험한 혈압 하강", "[PT 중] 세션 중 갑자기 다리 경련 + 근력 약화 → 즉시 중지, 앙와위, 저칼륨혈증 평가, 의사 의뢰", "[PT 중] 어지러움 + 혈압 하강 + 빈맥 → PT 중지, 앙와위, 의사 연락 — 탈수/기립성 저혈압", "[PT 후] 심부전 환자 하룻밤 0.9kg(2파운드) 이상 증가 → 다음 PT 세션 취소, 당일 의사 의뢰 — 체액 저류 신호"], "interactions_en": ["Digoxin: hypokalemia increases digoxin toxicity", "NSAIDs: blunt diuretic effect", "Aminoglycosides: combined ototoxicity"], "interactions_kr": ["디곡신: 저칼륨혈증이 디곡신 독성 증가", "NSAIDs: 이뇨 효과 감소", "아미노글리코사이드: 이독성 상승"], "chart_note_en": "Patient on Furosemide 40mg QD (taken at 8am). PT session at 1pm. Adequate hydration confirmed. No cramping or dizziness during session. K+ 3.9 per last labs.", "chart_note_kr": "푸로세미드 40mg 오전 8시 복용. PT 오후 1시 진행. 충분한 수분 확인. 경련·어지러움 없음. 최근 K+ 3.9.", "dosage": [{"form": "Edema", "normal": "20–80mg QD", "high": ">600mg/day (acute)"}]}, {"id": "hctz", "name": "HCTZ (Hydrochlorothiazide)", "brand": "Microzide", "name_kr": "히드로클로로티아지드", "category": "Cardiovascular", "category_kr": "심혈관계", "class": "Thiazide Diuretic", "class_kr": "티아지드 이뇨제", "rx": true, "risk": "low", "image": "", "emoji": "💧", "summary_en": "First-line thiazide diuretic for HTN. Milder than furosemide. Causes photosensitivity and hypokalemia.", "summary_kr": "1차 선택 이뇨제. 푸로세미드보다 순함. 광과민성·저칼륨혈증 유발.", "mechanism_en": "Inhibits Na-Cl cotransporter in distal convoluted tubule → moderate diuresis. Also reduces peripheral vascular resistance long-term.", "mechanism_kr": "원위곱슬세관 Na-Cl 공수송체 억제 → 중등도 이뇨.", "onset": "2 hr", "halflife": "6–15 hr", "scenarios": [{"title": "Outdoor PT sun caution", "title_kr": "야외 PT 태양광 주의", "body_en": "HCTZ causes photosensitivity. Outdoor PT: ensure patient has sunscreen and protective clothing. Prolonged sun exposure → severe sunburn risk even with brief exposure.", "body_kr": "HCTZ 복용 환자 야외 운동 시 자외선 차단제·보호 의류 필수. 짧은 노출에도 심한 화상 가능."}, {"title": "Diabetic patient risk", "title_kr": "당뇨 환자 위험", "body_en": "HCTZ raises blood glucose. Diabetic patient on HCTZ: monitor for unexpected hyperglycemia symptoms during PT (increased thirst, polyuria, fatigue).", "body_kr": "HCTZ는 혈당 상승 유발. 당뇨 환자 운동 중 고혈당 증상(갈증·다뇨·피로) 모니터링."}, {"title": "Gout flare trigger", "title_kr": "통풍 발작 유발", "body_en": "HCTZ increases uric acid. Patient with HTN + gout history on HCTZ: acute ankle/foot pain during PT may be gout flare, not musculoskeletal. Assess carefully.", "body_kr": "HCTZ는 요산 증가. 고혈압+통풍 이력 환자의 갑작스러운 발·발목 통증 → 통풍 발작 가능성 감별."}], "side_effects_en": ["Hypokalemia (↑K⁺ loss in distal tubule)", "Photosensitivity (sulfonamide structure → UV skin reaction)", "Hyperglycemia (↓insulin secretion + ↑gluconeogenesis)", "Hyperuricemia/Gout (↓uric acid excretion)", "Hyponatremia (↑free water reabsorption)"], "side_effects_kr": ["저칼륨혈증 (원위세관에서 K⁺ 손실 증가)", "광과민성 (설폰아미드 구조 → 자외선 피부 반응)", "고혈당 (인슐린 분비 감소 + 포도당 신생합성 증가)", "고요산혈증/통풍 (요산 배설 감소)", "저나트륨혈증 (자유수 재흡수 증가)"], "red_flags": ["[BEFORE PT] Outdoor PT planned → ensure patient has applied sunscreen SPF 30+; HCTZ causes photosensitivity — severe sunburn from brief exposure", "[BEFORE PT] Diabetic patient on HCTZ — check glucose before session; HCTZ raises blood glucose unpredictably", "[DURING PT] Acute foot/ankle joint pain + swelling during session → stop exercise on that joint, refer to physician — possible gout flare triggered by HCTZ-elevated uric acid", "[DURING PT] Sudden muscle cramps + weakness → check for hypokalemia history; stop exercise, refer to physician", "[AFTER PT] Sunburn or severe skin reaction after outdoor session → document, educate, ensure sun protection every future outdoor PT"], "red_flags_kr": ["[PT 전] 야외 PT 계획 시 → SPF 30 이상 자외선 차단제 도포 확인; HCTZ 광과민성 — 짧은 노출에도 심한 화상", "[PT 전] HCTZ 복용 당뇨 환자 — 세션 전 혈당 확인; HCTZ는 혈당을 예측 불가하게 상승", "[PT 중] 세션 중 발/발목 급성 관절 통증 + 부종 → 해당 관절 운동 중지, 의사 의뢰 — HCTZ 요산 상승으로 인한 통풍 발작 가능", "[PT 중] 갑작스러운 근육 경련 + 근력 약화 → 저칼륨혈증 과거력 확인; 운동 중지, 의사 의뢰", "[PT 후] 야외 세션 후 햇빛 화상 또는 심한 피부 반응 → 차트 기록, 교육, 이후 모든 야외 PT 자외선 차단 필수"], "interactions_en": ["NSAIDs: reduced antihypertensive effect", "Lithium: increased lithium toxicity", "Corticosteroids: additive potassium loss"], "interactions_kr": ["NSAIDs: 항고혈압 효과 감소", "리튬: 리튬 독성 증가", "코르티코스테로이드: 칼륨 손실 가중"], "chart_note_en": "Patient on HCTZ 25mg QD. Outdoor session: sunscreen applied. No gout symptoms. Last K+ 3.8.", "chart_note_kr": "HCTZ 25mg 1일 1회 복용 중. 야외 세션 시 자외선 차단 확인. 통풍 증상 없음. 최근 K+ 3.8.", "dosage": [{"form": "HTN", "normal": "12.5–25mg QD", "high": "50mg QD"}]}, {"id": "warfarin", "name": "Warfarin", "brand": "Coumadin", "name_kr": "와파린", "category": "Cardiovascular", "category_kr": "심혈관계", "class": "Vitamin K Antagonist", "class_kr": "비타민K 길항제", "rx": true, "risk": "high", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Coumadin5.jpg/120px-Coumadin5.jpg", "emoji": "⚠️", "summary_en": "Anticoagulant for AF, DVT, PE, mechanical valves. Narrow therapeutic window (INR 2–3). HIGH BLEEDING RISK.", "summary_kr": "심방세동·DVT·PE·기계판막에 사용. 치료 범위 좁음(INR 2-3). 출혈 위험 높음.", "mechanism_en": "Inhibits Vitamin K epoxide reductase → ↓factors II, VII, IX, X. Monitored by INR (target 2–3, 2.5–3.5 for mechanical valves).", "mechanism_kr": "비타민K 에폭시드 환원효소 억제 → 응고인자 II·VII·IX·X 감소. INR 2-3 목표.", "onset": "2–5 days (full effect)", "halflife": "40 hr", "scenarios": [{"title": "Fall risk = highest priority", "title_kr": "낙상 위험 = 최우선 과제", "body_en": "Warfarin patient falls during PT — ANY head strike, even minor: stop session, call EMS or have patient seen same-day. Intracranial hemorrhage risk is real. Document exact fall mechanism.", "body_kr": "와파린 복용 중 낙상 → 가벼운 머리 충돌도 응급. 즉시 세션 중지, EMS 또는 당일 진료. 두개내 출혈 위험."}, {"title": "INR check before manual therapy", "title_kr": "도수치료 전 INR 확인", "body_en": "Before any joint mobilization or soft tissue technique: confirm recent INR. INR >3.5 → hold manual therapy, refer to physician. INR 2–3 = proceed with modified technique (no aggressive high-velocity thrust).", "body_kr": "관절 가동화나 연부조직 기법 전 최근 INR 확인. INR 3.5 초과 → 도수치료 보류, 의사 의뢰. 2-3 범위 시 조심스러운 기법 가능."}, {"title": "Unexplained bruising assessment", "title_kr": "원인 불명 멍 평가", "body_en": "Patient shows extensive bruising during PT session. On warfarin. Ask: 'When did you last check your INR?' Large hematomas or ecchymosis beyond minor PT contact → possible supratherapeutic INR. Refer immediately.", "body_kr": "광범위한 멍 발견 시 최근 INR 확인. 경미한 접촉 이상의 혈종·멍 → 치료 범위 초과 가능. 즉시 의뢰."}, {"title": "Diet interaction education", "title_kr": "식이 상호작용 교육", "body_en": "Vitamin K-rich foods (spinach, kale, broccoli) decrease warfarin effect. Patient starting new diet/juicing program → notify prescriber. Consistency in Vit K intake is key, not avoidance.", "body_kr": "시금치·케일·브로콜리 등 비타민K 식품 → 와파린 효과 감소. 새 식단 시작 시 처방의에게 알리도록 교육. 완전 기피보다 일관성이 중요."}], "side_effects_en": ["Bleeding — major risk (↓clotting factors II,VII,IX,X → prolonged clotting time)", "Bruising (↓platelet plug stabilization)", "Hemorrhagic stroke (↑cerebral bleeding risk when INR supratherapeutic)", "Skin necrosis — rare (protein C/S depletion in first days)"], "side_effects_kr": ["출혈 주요 위험 (응고인자 II·VII·IX·X 감소 → 응고 시간 연장)", "멍 (혈소판 응집 안정화 감소)", "출혈성 뇌졸중 (INR 치료 범위 초과 시 뇌출혈 위험 증가)", "피부 괴사 드물게 (초기 며칠 단백질 C/S 고갈)"], "red_flags": ["[BEFORE PT] INR >3.5 → cancel all joint mobilization, manipulation, and soft tissue techniques; light active exercise only; refer to physician", "[BEFORE PT] INR >4.0 → cancel entire PT session; refer to physician or ER immediately — reverse anticoagulation needed", "[BEFORE PT] No recent INR check (>2 weeks) before manual therapy → defer aggressive techniques until INR confirmed", "[DURING PT] Head impact of any kind during session → stop immediately, send patient to ER same day for CT — intracranial hemorrhage risk regardless of impact force", "[DURING PT] Spontaneous bruising or hematoma forming during session → stop PT, document size/location with diagram, refer to physician same day", "[AFTER PT] Patient reports dark/tarry stool or blood in urine after PT → refer to ER — GI or urinary bleed"], "red_flags_kr": ["[PT 전] INR 3.5 초과 → 관절 가동화, 도수조작, 연부조직 기법 전면 취소; 가벼운 능동 운동만 가능; 의사 의뢰", "[PT 전] INR 4.0 초과 → 전체 PT 세션 취소; 즉시 의사 또는 응급실 의뢰 — 항응고 역전 필요", "[PT 전] 도수치료 전 2주 이상 INR 미확인 → INR 확인 전 공격적 기법 연기", "[PT 중] 세션 중 어떤 형태로든 머리 충돌 → 즉시 중지, 당일 응급실 CT 평가 — 충격 강도와 무관하게 두개내 출혈 위험", "[PT 중] 세션 중 자발적 멍 또는 혈종 형성 → PT 중지, 크기/위치 도식으로 기록, 당일 의사 의뢰", "[PT 후] PT 후 검은 대변 또는 혈뇨 보고 → 응급실 의뢰 — 소화관 또는 요로 출혈"], "interactions_en": ["Aspirin/NSAIDs: additive bleeding", "Antibiotics: alter gut flora → INR changes", "Vitamin K foods: decrease effect", "Many drugs via CYP2C9"], "interactions_kr": ["아스피린/NSAIDs: 출혈 위험 가중", "항생제: 장내 세균총 변화 → INR 변동", "비타민K 식품: 효과 감소", "다수 약물과 CYP2C9 상호작용"], "chart_note_en": "Patient on Warfarin (target INR 2–3). INR 2.4 reported per patient (last check 3 days ago). Fall prevention protocol in place. No aggressive manual therapy performed.", "chart_note_kr": "와파린 복용 중(목표 INR 2-3). 환자 보고 INR 2.4(3일 전 검사). 낙상 예방 프로토콜 시행. 공격적 도수치료 미실시.", "dosage": [{"form": "Anticoagulation", "normal": "2–10mg QD (INR-guided)", "high": "INR >4 = toxic"}]}, {"id": "apixaban", "name": "Apixaban", "brand": "Eliquis", "name_kr": "아픽사반", "category": "Cardiovascular", "category_kr": "심혈관계", "class": "Factor Xa Inhibitor (DOAC)", "class_kr": "Xa인자 억제제(DOAC)", "rx": true, "risk": "high", "image": "", "emoji": "🩸", "summary_en": "DOAC for AF, DVT/PE. No INR monitoring. Predictable dosing but NO routine reversal agent available in all settings.", "summary_kr": "심방세동·DVT/PE에 사용. INR 모니터링 불필요. 예측 가능한 용량. 일부 환경에서 역전제 없음.", "mechanism_en": "Directly inhibits Factor Xa → ↓thrombin generation → ↓clot formation. More predictable than warfarin.", "mechanism_kr": "Xa인자 직접 억제 → 트롬빈 생성 감소. 와파린보다 예측 가능.", "onset": "1–3 hr", "halflife": "12 hr", "scenarios": [{"title": "No INR, but still bleeds", "title_kr": "INR 없어도 출혈 위험", "body_en": "Common PT misconception: 'Patient on Eliquis, no INR to check, so less worry.' WRONG. Eliquis patients bleed significantly. Same fall precautions as warfarin. Head injury → same-day evaluation.", "body_kr": "흔한 오해: Eliquis는 INR 없으니 덜 위험하다? 아님. 출혈 위험 동일. 낙상 예방·머리 충돌 당일 평가 동일하게 적용."}, {"title": "Reversal agent availability", "title_kr": "역전제 가용성 확인", "body_en": "Andexanet alfa (Andexxa) is the reversal agent for apixaban — not always available at local ERs. In emergency, advise EMS/patient to go to major hospital. Document patient's anticoagulation status in chart.", "body_kr": "역전제(Andexxa) 소형 응급실엔 없을 수 있음. 응급 시 대형 병원으로 이송 안내. 차트에 항응고제 복용 기록 필수."}, {"title": "Missed dose concern", "title_kr": "복용 누락 걱정", "body_en": "Patient says 'I forgot my Eliquis last night, should I exercise today?' Apixaban 12hr half-life means one missed dose significantly reduces anticoagulation. Refer to prescriber for guidance, but no specific PT restriction from missed dose alone.", "body_kr": "어제 복용 누락 → 반감기 12시간으로 항응고 효과 감소. 처방의에게 문의 권고. PT 자체 제한은 없으나 기록."}], "side_effects_en": ["Bleeding (↓Factor Xa → ↓thrombin → ↓clot formation)", "Bruising (impaired clot formation at minor injury sites)", "GI bleeding (direct mucosal contact + ↓local clotting)", "Anemia (chronic low-grade bleeding)"], "side_effects_kr": ["출혈 (Xa인자 억제 → 트롬빈 감소 → 혈전 형성 감소)", "멍 (경미한 손상 부위 혈전 형성 장애)", "소화관 출혈 (점막 직접 접촉 + 국소 응고 감소)", "빈혈 (만성 미세 출혈)"], "red_flags": ["[BEFORE PT] No INR needed — but same bleeding precautions as warfarin apply; educate all staff", "[DURING PT] Head injury during PT (any force) → stop session, send to ER same day — no INR to reassure you; reversal agent (Andexxa) may not be available at local ER", "[DURING PT] Spontaneous hematoma or unusual bruising mid-session → stop PT, document, refer physician same day", "[AFTER PT] Dark/tarry stool or blood in urine reported → refer to ER — GI or urinary bleed", "[AFTER PT] Patient missed dose >12hr before PT → note in chart, add extra fall precautions; advise to contact prescriber"], "red_flags_kr": ["[PT 전] INR 불필요 — 그러나 와파린과 동일한 출혈 예방 조치 적용; 모든 직원 교육", "[PT 중] PT 중 머리 부상(어떤 강도든) → 세션 중지, 당일 응급실 이송 — INR로 안심 불가; 역전제(Andexxa) 지역 응급실에 없을 수 있음", "[PT 중] 세션 중 자발적 혈종 또는 비정상적 멍 → PT 중지, 기록, 당일 의사 의뢰", "[PT 후] 검은 대변 또는 혈뇨 보고 → 응급실 의뢰 — 소화관 또는 요로 출혈", "[PT 후] PT 전 12시간 이상 복용 누락 → 차트 기록, 추가 낙상 예방 조치; 처방의 연락 권고"], "interactions_en": ["NSAIDs/aspirin: additive bleeding", "Strong CYP3A4 inhibitors: increased apixaban levels", "Rifampin: reduced efficacy"], "interactions_kr": ["NSAIDs/아스피린: 출혈 위험 가중", "강력한 CYP3A4 억제제: 혈중 농도 증가", "리팜핀: 효과 감소"], "chart_note_en": "Patient on Apixaban 5mg BID for Afib. Fall prevention education provided. No head injury during session. Bleeding precautions reviewed.", "chart_note_kr": "아픽사반 5mg 1일 2회 복용(심방세동). 낙상 예방 교육 시행. 세션 중 머리 충돌 없음. 출혈 주의 사항 검토.", "dosage": [{"form": "Afib stroke prev", "normal": "5mg BID", "high": "10mg BID (DVT/PE)"}]}, {"id": "atorvastatin", "name": "Atorvastatin", "brand": "Lipitor", "name_kr": "아토르바스타틴", "category": "Cardiovascular", "category_kr": "심혈관계", "class": "HMG-CoA Reductase Inhibitor (Statin)", "class_kr": "스타틴", "rx": true, "risk": "low", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/3/36/Lipitor_80mg.jpg/120px-Lipitor_80mg.jpg", "emoji": "💊", "summary_en": "Statin for hyperlipidemia and CV risk reduction. Most common complaint in PT: muscle pain (myopathy).", "summary_kr": "이상지질혈증·심혈관 위험 감소. PT에서 가장 흔한 호소: 근육통(근병증).", "mechanism_en": "Inhibits HMG-CoA reductase → ↓hepatic cholesterol synthesis → ↓LDL. High-intensity: atorvastatin 40–80mg.", "mechanism_kr": "HMG-CoA 환원효소 억제 → 간의 콜레스테롤 합성 감소 → LDL 감소.", "onset": "2–4 weeks (lipid effect)", "halflife": "14 hr", "scenarios": [{"title": "Statin myopathy vs DOMS", "title_kr": "스타틴 근병증 vs 지연성 근육통", "body_en": "Patient on atorvastatin 80mg complains of generalized muscle aching after starting new exercise program. Differentiate: statin myopathy is bilateral, proximal (thighs, shoulders), present at REST. DOMS is activity-related and resolves. Check CK if myopathy suspected.", "body_kr": "아토르바스타틴 복용 환자 근육통 호소 → 스타틴 근병증: 양측성, 근위부(허벅지·어깨), 안정 시도 지속. 지연성 근육통: 활동 연관, 자연 회복. CK 검사 의뢰 고려."}, {"title": "Rhabdomyolysis red flag", "title_kr": "횡문근융해 경고", "body_en": "Patient on high-dose statin + started intense exercise + taking amlodipine or gemfibrozil: dark/cola-colored urine + severe muscle weakness = possible rhabdomyolysis. STOP exercise, refer emergently.", "body_kr": "고용량 스타틴 + 강도 높은 운동 시작 + 암로디핀/겜피브로질 병용: 콜라색 소변 + 심한 근력 약화 = 횡문근융해 가능성. 즉시 운동 중지, 응급 의뢰."}, {"title": "Exercise and statin benefit", "title_kr": "운동과 스타틴의 시너지", "body_en": "Statins + aerobic exercise: additive cardiovascular benefit. PT can reinforce this. However: very high intensity exercise can temporarily raise CK even without statin — context matters.", "body_kr": "스타틴 + 유산소 운동 = 심혈관 보호 시너지. PT에서 운동 지속 독려 가능. 단, 고강도 운동은 스타틴 없이도 CK 일시 상승 가능 → 맥락 고려."}], "side_effects_en": ["Myopathy/muscle pain (↓CoQ10 synthesis + ↓mevalonate pathway → mitochondrial dysfunction)", "Elevated CK (muscle fiber breakdown)", "Rhabdomyolysis — rare (severe muscle destruction → myoglobin → renal failure)", "Elevated liver enzymes (↓cholesterol synthesis → hepatocyte stress)", "GI upset (direct GI mucosal irritation)"], "side_effects_kr": ["근병증/근육통 (CoQ10 합성 감소 + 메발로네이트 경로 억제 → 미토콘드리아 기능 장애)", "CK 상승 (근섬유 분해)", "횡문근융해 드물게 (심각한 근육 파괴 → 미오글로빈 → 신부전)", "간효소 상승 (콜레스테롤 합성 감소 → 간세포 스트레스)", "소화불량 (소화관 점막 직접 자극)"], "red_flags": ["[BEFORE PT] Patient started high-intensity exercise program same week as statin initiation → start low intensity; CK can spike with new exercise + new statin", "[BEFORE PT] Bilateral proximal muscle aching at rest (not DOMS) >1 week → hold resistance exercise, refer to physician for CK check before resuming", "[DURING PT] Cola-colored or dark urine reported → stop PT immediately, send to ER — rhabdomyolysis, life-threatening, do NOT wait", "[DURING PT] Severe generalized muscle weakness unable to complete basic movements → stop PT, refer to physician same day", "[AFTER PT] CK >10x upper normal limit reported after session → do not exercise, refer to physician immediately"], "red_flags_kr": ["[PT 전] 스타틴 시작과 같은 주에 고강도 운동 프로그램 시작 → 저강도로 시작; 새 운동 + 새 스타틴 시 CK 급상승 가능", "[PT 전] 안정시 양측 근위부 근육통(지연성 근육통 아님) 1주 이상 → 저항 운동 보류, CK 검사 위해 의사 의뢰 후 재개", "[PT 중] 콜라색 또는 검은 소변 보고 → 즉시 PT 중지, 응급실 이송 — 횡문근융해, 생명 위협, 기다리지 말 것", "[PT 중] 기본 동작 수행 불가한 심한 전신 근력 약화 → PT 중지, 당일 의사 의뢰", "[PT 후] 세션 후 CK 정상 상한 10배 초과 보고 → 운동 금지, 즉시 의사 의뢰"], "interactions_en": ["Amlodipine >20mg simvastatin: use atorvastatin instead", "Gemfibrozil: rhabdomyolysis risk", "Grapefruit juice: increased statin levels"], "interactions_kr": ["암로디핀: 심바스타틴 20mg 초과 금지, 아토르바스타틴으로 전환", "겜피브로질: 횡문근융해 위험", "자몽주스: 스타틴 혈중 농도 증가"], "chart_note_en": "Patient on Atorvastatin 40mg QD. Mild bilateral thigh achiness reported, onset 2 weeks ago with statin initiation. CK pending per MD order. Exercise modified to low-intensity pending results.", "chart_note_kr": "아토르바스타틴 40mg 1일 1회. 2주 전 스타틴 시작 후 양측 허벅지 경미한 통증 보고. 의사 지시로 CK 검사 예정. 결과 전까지 저강도 운동 수정.", "dosage": [{"form": "Hyperlipidemia", "normal": "10–40mg QD", "high": "80mg QD (high-intensity)"}]}, {"id": "aspirin", "name": "Aspirin (Low-dose)", "brand": "Bayer / Ecotrin (81mg)", "name_kr": "아스피린(저용량)", "category": "Musculoskeletal", "category_kr": "근골격계", "class": "Antiplatelet / Salicylate", "class_kr": "항혈소판제 / 살리실산계", "rx": false, "risk": "moderate", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Aspirin-100-tablets.jpg/120px-Aspirin-100-tablets.jpg", "emoji": "💊", "summary_en": "81mg = antiplatelet for CV prevention. 325mg+ = analgesic/anti-inflammatory. IRREVERSIBLE platelet inhibition (7–10 days).", "summary_kr": "81mg = 심혈관 예방용 항혈소판. 325mg+ = 진통/항염. 혈소판 억제 비가역적(7-10일).", "mechanism_en": "Irreversibly inhibits COX-1 (and COX-2 at high doses) → ↓TXA2 → ↓platelet aggregation. Platelet cannot regenerate COX.", "mechanism_kr": "COX-1 비가역적 억제 → TXA2 감소 → 혈소판 응집 억제. 혈소판 수명(7-10일) 내내 지속.", "onset": "30–60 min (analgesic)", "halflife": "15–20 min (ASA) / 3–5 days (platelet effect)", "scenarios": [{"title": "Bleeding risk with procedures", "title_kr": "시술 시 출혈 위험", "body_en": "Patient on daily aspirin 81mg scheduled for dry needling or cupping. Even 81mg = clinically significant bleeding risk. Check with prescriber before invasive PT procedures. Platelet function impaired for 7–10 days after last dose.", "body_kr": "아스피린 81mg 복용 환자 건침·부항 예정 → 출혈 위험 존재. 시술 전 처방의 확인. 복용 중단 후에도 7-10일간 혈소판 기능 저하."}, {"title": "Joint injection timing", "title_kr": "관절 주사 타이밍", "body_en": "PT coordinating with MD for joint injection: patient on aspirin should ideally hold 7 days pre-procedure. However, for low-risk joints, some MDs allow continuation. Document aspirin status in referral.", "body_kr": "관절 주사 전 이상적으로 7일 전 아스피린 중단. 일부 저위험 관절은 의사가 지속 허용. 의뢰 시 아스피린 복용 여부 기록."}, {"title": "Warfarin + Aspirin combo", "title_kr": "와파린 + 아스피린 복합", "body_en": "Patient on BOTH warfarin AND aspirin (e.g., post-MI with Afib): extreme bleeding risk. ANY fall or bruising = urgent evaluation. No aggressive manual therapy. Document both drugs.", "body_kr": "와파린 + 아스피린 동시 복용(예: 심근경색 후 심방세동): 극도의 출혈 위험. 낙상·멍 → 즉시 평가. 공격적 도수치료 금지."}, {"title": "GI symptom monitoring", "title_kr": "소화관 증상 모니터링", "body_en": "Long-term aspirin user complains of epigastric pain or dark stool during PT. ASA-induced GI erosion → possible GI bleed. Refer to MD promptly. Not normal muscle soreness.", "body_kr": "장기 아스피린 복용 환자의 명치 통증·검은 대변 → 소화관 출혈 가능. 즉시 의사 의뢰. 근육통과 혼동 금지."}], "side_effects_en": ["GI irritation/bleeding (↓COX-1 → ↓prostaglandin E2 → ↓gastric mucosal protection)", "Bleeding/bruising (↓TXA2 → irreversible platelet inhibition for 7–10 days)", "Tinnitus at high doses (salicylate toxicity → cochlear damage)", "Platelet dysfunction (irreversible COX-1 inhibition — lasts lifespan of platelet)"], "side_effects_kr": ["소화관 자극/출혈 (COX-1 억제 → 프로스타글란딘E2 감소 → 위점막 보호 감소)", "출혈/멍 (TXA2 감소 → 혈소판 비가역적 억제 7-10일)", "고용량 이명 (살리실산 독성 → 달팽이관 손상)", "혈소판 기능 장애 (비가역적 COX-1 억제 — 혈소판 수명만큼 지속)"], "red_flags": ["[BEFORE PT] Dry needling or cupping planned → verify with prescriber before proceeding; 81mg aspirin = clinically significant bleeding risk for invasive PT", "[BEFORE PT] Patient on aspirin + anticoagulant (warfarin/apixaban) → document both, apply maximum fall prevention protocol for entire session", "[DURING PT] Patient reports epigastric pain or nausea during session → stop PT, refer to physician — possible GI irritation or ulcer", "[DURING PT] Head injury during PT in aspirin user → stop, send to ER same day — platelet function impaired 7–10 days even after stopping", "[AFTER PT] Dark/tarry stool or vomiting blood reported → refer to ER — GI bleed", "[AFTER PT] Tinnitus (ringing ears) in high-dose aspirin user → refer to physician same day — aspirin toxicity"], "red_flags_kr": ["[PT 전] 건침 또는 부항 계획 시 → 진행 전 처방의 확인; 아스피린 81mg도 침습적 PT에 임상적 출혈 위험", "[PT 전] 아스피린 + 항응고제(와파린/아픽사반) 동시 복용 → 두 가지 모두 기록, 전체 세션 최대 낙상 예방 프로토콜 적용", "[PT 중] 세션 중 명치 통증 또는 구역 호소 → PT 중지, 의사 의뢰 — 소화관 자극 또는 궤양 가능", "[PT 중] 아스피린 복용 환자 PT 중 머리 부상 → 중지, 당일 응급실 이송 — 중단 후에도 7-10일 혈소판 기능 저하", "[PT 후] 검은 대변 또는 토혈 보고 → 응급실 의뢰 — 소화관 출혈", "[PT 후] 고용량 아스피린 복용자 이명(귀 울림) → 당일 의사 의뢰 — 아스피린 독성"], "interactions_en": ["Warfarin: additive bleeding", "Other NSAIDs: compete for COX binding, reduce aspirin antiplatelet effect", "Ibuprofen timing: take aspirin 2hr before ibuprofen"], "interactions_kr": ["와파린: 출혈 위험 가중", "다른 NSAIDs: COX 결합 경쟁, 항혈소판 효과 감소", "이부프로펜: 아스피린을 2시간 먼저 복용"], "chart_note_en": "Patient on Aspirin 81mg QD (antiplatelet). Dry needling deferred pending MD clearance. Bruising tendency noted. No current GI complaints.", "chart_note_kr": "아스피린 81mg 1일 1회(항혈소판). 건침 의사 허가 전 보류. 멍 경향 있음. 현재 소화관 증상 없음.", "dosage": [{"form": "Antiplatelet", "normal": "81mg QD", "high": "325–4000mg/day (pain)"}]}, {"id": "acetaminophen", "name": "Acetaminophen", "brand": "Tylenol", "name_kr": "아세트아미노펜", "category": "Musculoskeletal", "category_kr": "근골격계", "class": "Analgesic / Antipyretic", "class_kr": "진통제 / 해열제", "rx": false, "risk": "moderate", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/Tylenol_8_hour.jpg/120px-Tylenol_8_hour.jpg", "emoji": "💊", "summary_en": "Most common OTC analgesic. Safe for GI/platelets unlike NSAIDs. HEPATOTOXIC >4g/day. Hidden in many combo drugs.", "summary_kr": "가장 흔한 OTC 진통제. 소화관·혈소판 안전. 4g/일 초과 시 간독성. 복합 약물에 숨어있음 주의.", "mechanism_en": "Central COX inhibition + endocannabinoid system modulation → analgesia/antipyresis. No peripheral anti-inflammatory effect.", "mechanism_kr": "중추 COX 억제 + 내인성 카나비노이드 조절 → 진통·해열. 말초 항염 효과 없음.", "onset": "30–60 min", "halflife": "2–4 hr", "scenarios": [{"title": "Hidden APAP in combo drugs", "title_kr": "복합 약물 속 숨은 APAP", "body_en": "Patient takes Percocet (oxycodone + APAP 325mg) + NyQuil (APAP 650mg) + Tylenol PM (APAP 500mg) = 1,475mg from 3 sources before counting regular Tylenol. Easily exceeds 4g/day. Ask about ALL medications before PT pain management education.", "body_kr": "Percocet(APAP 325mg) + NyQuil(APAP 650mg) + Tylenol PM(APAP 500mg) = 세 가지 출처에서만 1,475mg. 일반 타이레놀 포함 시 4g 초과 위험. 모든 약물 목록 확인 필수."}, {"title": "Alcohol user warning", "title_kr": "음주자 경고", "body_en": "Patient who drinks alcohol daily is taking acetaminophen for PT-related pain. Alcohol + APAP induces CYP2E1 → increased toxic metabolite (NAPQI). Hepatotoxicity risk at much lower doses (2g/day).", "body_kr": "매일 음주 환자의 아세트아미노펜 복용 → CYP2E1 유도로 독성 대사물(NAPQI) 증가. 2g/일에서도 간독성 위험."}, {"title": "Post-PT pain management guidance", "title_kr": "PT 후 통증 관리 안내", "body_en": "Acetaminophen is first-line for mild-moderate musculoskeletal pain. Advantages over NSAIDs: safe in CKD (short-term), no platelet effect, OK in elderly. Max 3g/day recommended for older adults or liver risk patients.", "body_kr": "경-중등도 근골격계 통증의 1차 선택. NSAIDs 대비 장점: 단기 신기능 저하 환자 안전, 혈소판 영향 없음, 노인 가능. 노인·간 위험군은 3g/일 최대."}], "side_effects_en": ["Hepatotoxicity >4g/day (↑NAPQI toxic metabolite overwhelms glutathione stores)", "Acute liver failure at overdose (zone 3 hepatic necrosis from NAPQI)", "Rash — rare (hypersensitivity reaction)"], "side_effects_kr": ["간독성 4g/일 초과 (NAPQI 독성 대사물이 글루타치온 저장량 초과)", "과용량 시 급성 간부전 (NAPQI에 의한 3구역 간 괴사)", "발진 드물게 (과민반응)"], "red_flags": ["[BEFORE PT] Review all medications patient takes — APAP is hidden in Percocet, NyQuil, Vicodin, Tylenol PM; total >4g/day = hepatotoxicity risk; refer to physician", "[BEFORE PT] Daily alcohol drinker taking acetaminophen → educate on risk; hepatotoxicity at 2g/day; refer to physician if >2g/day", "[DURING PT] Patient appears jaundiced (yellow skin/eyes) → stop PT, refer to ER — possible acute liver failure", "[DURING PT] RUQ abdominal pain + nausea + fatigue → stop PT, refer to physician same day — liver involvement possible", "[AFTER PT] Patient asks to increase APAP for PT-related pain → calculate total daily APAP from all sources first; do not exceed 3g/day for elderly"], "red_flags_kr": ["[PT 전] 모든 복용 약물 검토 — APAP는 Percocet, NyQuil, Vicodin, Tylenol PM에 숨어 있음; 총 4g/일 초과 = 간독성 위험; 의사 의뢰", "[PT 전] 매일 음주 + 아세트아미노펜 복용 → 위험 교육; 2g/일에서 간독성; 2g/일 초과 시 의사 의뢰", "[PT 중] 황달 증상(피부/눈 노랗게) 발견 → PT 중지, 응급실 의뢰 — 급성 간부전 가능", "[PT 중] 우상복부 통증 + 구역 + 피로 → PT 중지, 당일 의사 의뢰 — 간 관련 가능", "[PT 후] PT 관련 통증을 위해 APAP 증량 요청 → 먼저 모든 출처의 총 일일 APAP 계산; 노인은 3g/일 초과 금지"], "interactions_en": ["Warfarin: increases INR at high APAP doses", "Alcohol: hepatotoxicity at lower doses", "Isoniazid: hepatotoxicity risk"], "interactions_kr": ["와파린: 고용량 APAP 시 INR 상승", "알코올: 저용량에서도 간독성", "이소니아지드: 간독성 위험"], "chart_note_en": "Patient using Acetaminophen 500mg PRN for post-exercise soreness. Confirmed no other APAP-containing products. Non-drinker. Total APAP <2g/day.", "chart_note_kr": "아세트아미노펜 500mg PRN 복용 중(운동 후 통증). 다른 APAP 함유 제품 없음 확인. 비음주. 총 APAP 2g/일 미만.", "dosage": [{"form": "Pain", "normal": "325–1000mg q4–6h (max 4g/day)", "high": ">4g/day = hepatotoxic"}]}, {"id": "ibuprofen", "name": "Ibuprofen", "brand": "Advil / Motrin", "name_kr": "이부프로펜", "category": "Musculoskeletal", "category_kr": "근골격계", "class": "NSAID (Non-selective COX inhibitor)", "class_kr": "비선택적 COX 억제제(NSAID)", "rx": false, "risk": "moderate", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Ibuprofen_200mg_Zegerid.jpg/120px-Ibuprofen_200mg_Zegerid.jpg", "emoji": "💊", "summary_en": "Most common NSAID. Anti-inflammatory for acute MSK injury. GI risk, hypertension effect, nephrotoxicity.", "summary_kr": "가장 흔한 NSAID. 급성 근골격계 손상에 항염. 소화관 위험·혈압 상승·신독성.", "mechanism_en": "Reversibly inhibits COX-1 and COX-2 → ↓prostaglandins → ↓inflammation, pain, fever, platelet aggregation.", "mechanism_kr": "COX-1·2 가역적 억제 → 프로스타글란딘 감소 → 항염·진통·해열·혈소판 억제.", "onset": "30 min", "halflife": "2 hr", "scenarios": [{"title": "NSAID masking during PT", "title_kr": "PT 중 통증 은폐", "body_en": "Patient takes ibuprofen 800mg before PT 'to get through the session.' Problem: eliminates pain feedback → patient pushes beyond tissue tolerance → re-injury risk. Educate: use APAP or ice before PT, save NSAIDs for post-session if needed.", "body_kr": "PT 전 이부프로펜 복용으로 통증 은폐 → 조직 한계 초과 위험. PT 전 APAP 또는 얼음 사용 권고. NSAIDs는 세션 후 사용."}, {"title": "Kidney risk + dehydration", "title_kr": "신장 위험 + 탈수", "body_en": "Elderly patient on HCTZ + ibuprofen (OTC, self-medicating). Dehydration from diuretic + NSAID renal vasoconstriction = acute kidney injury risk. Ask: 'Do you take any pain relievers on your own?'", "body_kr": "이뇨제 + NSAIDs 복용 노인: 탈수 + 신장 혈관 수축 → 급성 신손상 위험. 'OTC 진통제 드시나요?' 반드시 확인."}, {"title": "Fracture healing concern", "title_kr": "골절 치유 우려", "body_en": "Post-fracture patient using ibuprofen for pain. NSAIDs may inhibit bone healing (especially first 2 weeks). Discuss with MD — acetaminophen may be preferred alternative. Document discussion.", "body_kr": "골절 후 이부프로펜 복용 → NSAIDs가 초기 골 치유 억제 가능(특히 첫 2주). 의사와 논의, APAP 대안 고려. 논의 내용 기록."}], "side_effects_en": ["GI irritation/ulcer (↓COX-1 → ↓prostaglandin → ↓gastric mucosal protection)", "Nephrotoxicity (↓prostaglandin-mediated renal vasodilation → ↓GFR)", "Elevated BP (↓prostaglandin → ↑sodium/water retention + vasoconstriction)", "Platelet inhibition — reversible (↓TXA2 while drug is active; reversible unlike aspirin)", "↑CV risk long-term (↓prostacyclin → ↑thrombosis tendency)"], "side_effects_kr": ["소화관 자극/궤양 (COX-1 억제 → 프로스타글란딘 감소 → 위점막 보호 감소)", "신독성 (프로스타글란딘 매개 신장 혈관 확장 감소 → GFR 감소)", "혈압 상승 (프로스타글란딘 감소 → 나트륨/수분 저류 + 혈관 수축)", "혈소판 억제 가역적 (약물 활성 중 TXA2 감소; 아스피린과 달리 가역적)", "장기 심혈관 위험 증가 (프로스타클린 감소 → 혈전 경향 증가)"], "red_flags": ["[BEFORE PT] Patient using ibuprofen before PT 'to get through the session' → educate: pain feedback is essential for safe PT; switch to post-session use or acetaminophen pre-PT", "[BEFORE PT] Patient on NSAID + diuretic + elderly/dehydrated → high risk of acute kidney injury; ensure adequate hydration before session", "[DURING PT] Epigastric pain or nausea mid-session → stop PT, refer to physician — GI ulcer or bleed possible", "[DURING PT] Ankle edema + reduced urine output → stop PT, refer to physician today — possible nephrotoxicity", "[AFTER PT] Post-fracture patient (first 2 weeks) on ibuprofen → discuss with MD switching to acetaminophen — NSAIDs may impair early bone healing"], "red_flags_kr": ["[PT 전] '세션을 버티기 위해' PT 전 이부프로펜 복용 → 교육: 통증 피드백은 안전한 PT에 필수; PT 전 아세트아미노펜으로 전환하거나 세션 후 사용", "[PT 전] NSAIDs + 이뇨제 + 노인/탈수 → 급성 신손상 고위험; 세션 전 충분한 수분 섭취 확인", "[PT 중] 세션 중 명치 통증 또는 구역 → PT 중지, 의사 의뢰 — 소화관 궤양 또는 출혈 가능", "[PT 중] 발목 부종 + 소변량 감소 → PT 중지, 당일 의사 의뢰 — 신독성 가능", "[PT 후] 골절 후 첫 2주 이부프로펜 복용 → APAP 전환 위해 의사와 논의 — NSAIDs가 초기 골 치유 방해 가능"], "interactions_en": ["Warfarin: increased bleeding", "ACE inhibitors/ARBs: nephrotoxic combo + blunts BP effect", "Corticosteroids: GI ulcer risk doubles"], "interactions_kr": ["와파린: 출혈 증가", "ACE억제제/ARB: 신독성 조합 + 혈압 효과 감소", "코르티코스테로이드: 소화관 궤양 위험 2배"], "chart_note_en": "Patient using OTC Ibuprofen 400mg PRN. Advised not to use before PT sessions to preserve pain feedback. No GI symptoms or edema.", "chart_note_kr": "OTC 이부프로펜 400mg PRN 복용. PT 세션 전 사용 금지 교육(통증 피드백 보존). 소화관 증상·부종 없음.", "dosage": [{"form": "Pain/inflammation", "normal": "400–600mg TID", "high": "800mg TID (Rx)"}]}, {"id": "prednisone", "name": "Prednisone", "brand": "Deltasone / generic", "name_kr": "프레드니손", "category": "Musculoskeletal", "category_kr": "근골격계", "class": "Systemic Corticosteroid", "class_kr": "전신 코르티코스테로이드", "rx": true, "risk": "high", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Prednisone_20mg_tablets.jpg/120px-Prednisone_20mg_tablets.jpg", "emoji": "⚠️", "summary_en": "Powerful anti-inflammatory. Long-term use = osteoporosis, myopathy, immune suppression, AVN. Weight gain and mood changes.", "summary_kr": "강력한 항염. 장기 사용 = 골다공증·근병증·면역 억제·무혈성 괴사. 체중 증가·기분 변화.", "mechanism_en": "Binds glucocorticoid receptors → ↓inflammatory cytokines, immune suppression. Causes protein catabolism, fat redistribution.", "mechanism_kr": "글루코코르티코이드 수용체 결합 → 염증 사이토카인 감소, 면역 억제. 단백질 이화·지방 재분포 유발.", "onset": "1–4 hr", "halflife": "3–4 hr (biological effect 18–36 hr)", "scenarios": [{"title": "Osteoporosis + fracture risk", "title_kr": "골다공증 + 골절 위험", "body_en": "Patient on prednisone >5mg/day for >3 months. HIGH fracture risk. PT fall prevention = priority 1. Weight-bearing exercise recommended for bone density but no high-impact. DEXA scan referral if not done.", "body_kr": "프레드니손 5mg 이상 3개월 이상 복용 → 골절 위험 높음. 낙상 예방 최우선. 체중부하 운동 권장하나 충격 운동 금지. DEXA 검사 미실시 시 의뢰."}, {"title": "Hip pain = AVN until proven otherwise", "title_kr": "고관절 통증 = 무혈성 괴사 의심", "body_en": "Long-term prednisone patient presents with new hip pain. Do NOT assume bursitis or muscle strain. Avascular necrosis (AVN) of femoral head is a known complication. Refer to MD for imaging before aggressive hip mobilization.", "body_kr": "장기 프레드니손 복용 중 새로운 고관절 통증 → 대퇴골두 무혈성 괴사(AVN) 가능성. 공격적 고관절 도수치료 전 영상 검사 의뢰."}, {"title": "Steroid myopathy differentiation", "title_kr": "스테로이드 근병증 감별", "body_en": "Patient on prednisone 30mg/day x 6 weeks presents with proximal muscle weakness (difficulty rising from chair). This is steroid myopathy — not treatable with more exercise. Refer to MD. Resistance exercise at LOW intensity may help, but confirm with prescriber.", "body_kr": "30mg 6주 복용 후 근위부 근력 약화(의자에서 일어나기 힘듦) → 스테로이드 근병증. 더 많은 운동으로 해결 안 됨. 의사 의뢰. 저강도 저항 운동 확인 후 가능."}, {"title": "Infection risk monitoring", "title_kr": "감염 위험 모니터링", "body_en": "Immunosuppressed patient on prednisone: any sign of infection during PT (fever, wound not healing, unusual skin changes) → refer promptly. No PT when patient is acutely febrile.", "body_kr": "면역 억제 환자 PT 중 감염 징후(발열·상처 불치유·피부 변화) → 즉시 의뢰. 발열 시 PT 금지."}], "side_effects_en": ["Osteoporosis (↓osteoblast activity + ↑osteoclast activity + ↓Ca²⁺ absorption)", "Proximal myopathy (protein catabolism in Type II muscle fibers)", "Immunosuppression (↓T-cell proliferation + ↓cytokine production)", "Hyperglycemia (↑gluconeogenesis + ↓insulin sensitivity)", "Avascular necrosis (↓vascular endothelial growth factor → femoral head ischemia)", "Mood changes/insomnia (glucocorticoid receptor activation in CNS)", "Cushingoid features — long-term (fat redistribution: trunk↑, limbs↓)"], "side_effects_kr": ["골다공증 (조골세포 활성 감소 + 파골세포 활성 증가 + Ca²⁺ 흡수 감소)", "근위부 근병증 (Type II 근섬유의 단백질 이화)", "면역 억제 (T세포 증식 감소 + 사이토카인 생성 감소)", "고혈당 (포도당 신생합성 증가 + 인슐린 감수성 감소)", "무혈성 괴사 (혈관 내피성장인자 감소 → 대퇴골두 허혈)", "기분 변화/불면 (CNS 글루코코르티코이드 수용체 활성화)", "쿠싱 증후군 장기 (지방 재분포: 몸통↑, 사지↓)"], "red_flags": ["[BEFORE PT] Chronic steroid user (>3 months >5mg/day) → establish fall prevention protocol before any exercise; DEXA referral if not done", "[BEFORE PT] Patient reports new hip or groin pain → do not proceed with weight-bearing exercises; refer to physician for X-ray/MRI — AVN must be ruled out before PT", "[DURING PT] Proximal muscle weakness limits basic transfers (can't rise from chair) → stop resistance exercise, refer to physician — steroid myopathy, exercise will not fix this", "[DURING PT] Fever + wound not healing in immunosuppressed patient → cancel session, refer physician same day — infection in immunosuppressed patient is emergency", "[DURING PT] Back pain + inability to bear weight in elderly steroid user → stop axial loading, refer to physician for vertebral fracture imaging", "[AFTER PT] Blood glucose spike in diabetic patient post-session on prednisone → adjust PT schedule, notify physician — steroids elevate BG unpredictably"], "red_flags_kr": ["[PT 전] 만성 스테로이드 복용(3개월 이상 5mg/일 이상) → 모든 운동 전 낙상 예방 프로토콜 확립; 미실시 시 DEXA 검사 의뢰", "[PT 전] 새로운 고관절 또는 사타구니 통증 보고 → 체중부하 운동 진행 금지; X-ray/MRI 위해 의사 의뢰 — PT 전 AVN 감별 필수", "[PT 중] 근위부 근력 약화로 기본 이동 제한(의자에서 일어나기 불가) → 저항 운동 중지, 의사 의뢰 — 스테로이드 근병증, 운동으로 해결 안 됨", "[PT 중] 면역 억제 환자 발열 + 상처 미치유 → 세션 취소, 당일 의사 의뢰 — 면역 억제 환자 감염은 응급", "[PT 중] 노인 스테로이드 복용자 허리 통증 + 체중부하 불가 → 축성 하중 중지, 척추 골절 영상 검사 의뢰", "[PT 후] 프레드니손 복용 당뇨 환자 세션 후 혈당 급상승 → PT 일정 조정, 의사 통보 — 스테로이드는 혈당을 예측 불가하게 상승"], "interactions_en": ["NSAIDs: GI ulcer risk", "Insulin/antidiabetics: counteracts glucose lowering", "Vaccines: reduced immune response (avoid live vaccines)"], "interactions_kr": ["NSAIDs: 소화관 궤양 위험", "인슐린/혈당강하제: 혈당 저하 효과 상쇄", "생백신: 면역 반응 감소(생백신 금지)"], "chart_note_en": "Patient on Prednisone 10mg QD x 4 months (RA). Fall risk screen: medium-high. Hip/knee pain: absent today. Weight-bearing strengthening with fall prevention focus.", "chart_note_kr": "프레드니손 10mg 4개월 복용 중(류마티스 관절염). 낙상 위험: 중-고. 오늘 고관절/무릎 통증 없음. 낙상 예방 중점 체중부하 근력 강화.", "dosage": [{"form": "Anti-inflammatory", "normal": "5–40mg QD", "high": ">40mg/day (acute)"}]}, {"id": "alendronate", "name": "Alendronate", "brand": "Fosamax", "name_kr": "알렌드로네이트", "category": "Musculoskeletal", "category_kr": "근골격계", "class": "Bisphosphonate", "class_kr": "비스포스포네이트", "rx": true, "risk": "moderate", "image": "", "emoji": "🦴", "summary_en": "Bisphosphonate for osteoporosis. Inhibits osteoclasts. Risk: atypical femur fracture (long-term), osteonecrosis of jaw.", "summary_kr": "골다공증 치료. 파골세포 억제. 장기 복용 위험: 비정형 대퇴골 골절, 턱뼈 괴사.", "mechanism_en": "Binds hydroxyapatite → inhibits osteoclast activity → ↓bone resorption → ↑bone density.", "mechanism_kr": "하이드록시아파타이트 결합 → 파골세포 활성 억제 → 골 흡수 감소 → 골밀도 증가.", "onset": "Bone density effect: months", "halflife": "10+ years (bone binding)", "scenarios": [{"title": "Atypical femur fracture in PT", "title_kr": "비정형 대퇴골 골절", "body_en": "Long-term bisphosphonate patient (>5 years) presents with thigh/groin pain without trauma. STOP weight-bearing exercise. Order X-ray/MRI referral. Atypical femoral fracture (subtrochanteric) can occur with minimal stress.", "body_kr": "비스포스포네이트 5년 이상 복용 환자의 외상 없는 허벅지/사타구니 통증 → 체중부하 운동 즉시 중지. 영상 검사 의뢰. 비정형 대퇴골 골절은 최소 스트레스로도 발생."}, {"title": "Administration education", "title_kr": "복용 방법 교육", "body_en": "Alendronate must be taken fasting, with full glass of water, remaining upright for 30 minutes. Esophageal erosion is serious. Ask patient: 'How do you take your Fosamax?' If incorrect, educate and document.", "body_kr": "공복, 물 한 컵, 복용 후 30분 직립 유지 필수. 식도 미란 심각한 부작용. 복용 방법 확인 및 교육 시행."}, {"title": "Drug holiday consideration", "title_kr": "약물 휴약 기간", "body_en": "Bisphosphonate >5 years: prescribers often consider 'drug holiday' (1–2 years off). Patient may ask PT about this. Answer: 'That's a medical decision, but it's a known practice. Discuss with your doctor at next appointment.'", "body_kr": "5년 이상 복용 시 1-2년 휴약 고려. 환자 질문 시: '의사와 상담하세요. 알려진 관행입니다.' 수준으로 답변."}], "side_effects_en": ["Esophageal erosion (direct mucosal contact if not taken upright with water)", "Atypical femur fracture — long-term (↑bone density but ↓bone remodeling flexibility → brittle)", "Osteonecrosis of jaw (↓osteoclast function → impaired bone remodeling in jaw)", "GI upset (mucosal irritation)", "Hypocalcemia (↑calcium incorporation into bone)"], "side_effects_kr": ["식도 미란 (직립 복용 안 할 시 점막 직접 접촉)", "비정형 대퇴골 골절 장기 (골밀도 증가하나 골 재형성 유연성 감소 → 취약)", "턱뼈 괴사 (파골세포 기능 감소 → 턱뼈 골 재형성 장애)", "소화불량 (점막 자극)", "저칼슘혈증 (뼈로의 칼슘 유입 증가)"], "red_flags": ["[BEFORE PT] Bisphosphonate use >5 years + new thigh/groin pain without trauma → do not start session; refer to physician for X-ray before any weight-bearing PT — atypical femur fracture", "[BEFORE PT] Confirm patient takes alendronate correctly: fasting, full glass water, upright 30 min — if not, educate and note in chart", "[DURING PT] Acute back pain during exercise in osteoporosis patient → stop axial loading immediately; refer to physician for imaging — vertebral fracture", "[DURING PT] Hip/knee pain during weight-bearing exercise in long-term user → stop, do not assume muscle soreness; refer for imaging", "[AFTER PT] Patient reports jaw pain after recent dental work → refer to oral surgeon and prescriber — possible osteonecrosis of jaw (ONJ)"], "red_flags_kr": ["[PT 전] 비스포스포네이트 5년 이상 복용 + 외상 없는 새 허벅지/사타구니 통증 → 세션 시작 금지; 체중부하 PT 전 X-ray 위해 의사 의뢰 — 비정형 대퇴골 골절", "[PT 전] 알렌드로네이트 복용 방법 확인: 공복, 물 한 컵, 30분 직립 — 미준수 시 교육 및 차트 기록", "[PT 중] 운동 중 골다공증 환자 급성 허리 통증 → 즉시 축성 하중 중지; 영상 검사 위해 의사 의뢰 — 척추 골절", "[PT 중] 장기 복용자 체중부하 운동 중 고관절/무릎 통증 → 중지, 근육통으로 단정 금지; 영상 검사 의뢰", "[PT 후] 최근 치과 치료 후 턱 통증 보고 → 구강외과 및 처방의 의뢰 — 턱뼈 괴사(ONJ) 가능"], "interactions_en": ["Calcium/antacids: take 30+ min apart", "NSAIDs: additive GI risk"], "interactions_kr": ["칼슘/제산제: 30분 이상 간격", "NSAIDs: 소화관 위험 가중"], "chart_note_en": "Patient on Alendronate 70mg weekly (osteoporosis, DEXA T-score -2.8). No thigh/groin pain. Low-impact weight-bearing exercise. Fall prevention protocol active.", "chart_note_kr": "알렌드로네이트 70mg 주 1회 복용(골다공증, T점수 -2.8). 허벅지/사타구니 통증 없음. 저충격 체중부하 운동. 낙상 예방 프로토콜 시행.", "dosage": [{"form": "Osteoporosis", "normal": "10mg QD or 70mg weekly", "high": "Adjust for renal function"}]}, {"id": "gabapentin", "name": "Gabapentin", "brand": "Neurontin", "name_kr": "가바펜틴", "category": "Neurological", "category_kr": "신경계", "class": "Alpha-2-delta Ligand / Anticonvulsant", "class_kr": "알파2델타 리간드/항경련제", "rx": true, "risk": "moderate", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Gabapentin_300_mg_capsules.jpg/120px-Gabapentin_300_mg_capsules.jpg", "emoji": "🧠", "summary_en": "For neuropathic pain, fibromyalgia, post-herpetic neuralgia, DPN. Major PT risk: sedation, dizziness, ataxia.", "summary_kr": "신경병성 통증·섬유근통·대상포진 후 신경통·당뇨신경병증에 사용. PT 주요 위험: 진정·어지러움·운동실조.", "mechanism_en": "Binds α2δ subunit of voltage-gated Ca2+ channels in spinal cord → ↓glutamate/substance P release → pain modulation.", "mechanism_kr": "척수 전압개폐 칼슘채널 α2δ 소단위 결합 → 글루타메이트/P물질 방출 감소 → 통증 조절.", "onset": "1–2 weeks (neuropathic effect)", "halflife": "5–7 hr", "scenarios": [{"title": "Ataxia at session start", "title_kr": "세션 시작 시 운동실조", "body_en": "Patient on gabapentin 900mg TID arrives looking unsteady, slurred speech, eyes glazed. These are signs of gabapentin CNS depression — session is unsafe. Have patient sit/lie down, monitor, consider transportation home. Do NOT dismiss as 'just tired.'", "body_kr": "가바펜틴 900mg 복용 환자 불안정한 보행·언어 불명확·눈 초점 흐림 → CNS 억제 신호. 세션 위험. 앉히거나 눕히고 귀가 방법 확인. '피곤한 것'으로 무시 금지."}, {"title": "Opioid combination risk", "title_kr": "오피오이드 병용 위험", "body_en": "Gabapentin + opioids = significantly increased respiratory depression risk. Patient on both: monitor RR before and during PT. RR <12 = stop exercise. Naloxone availability in clinic is ideal.", "body_kr": "가바펜틴 + 오피오이드 = 호흡 억제 위험 현저히 증가. 세션 전후 호흡수 확인. 분당 12회 미만 → 운동 중지. 클리닉 내 날록손 비치 권장."}, {"title": "Fall risk in elderly", "title_kr": "노인의 낙상 위험", "body_en": "Elderly patient on gabapentin 600mg BID for DPN: dizziness + peripheral neuropathy = very high fall risk. Gait training with assistive device, parallel bars first. Document fall risk level HIGH.", "body_kr": "당뇨신경병증 노인 환자 가바펜틴 복용: 어지러움 + 말초신경병증 = 매우 높은 낙상 위험. 보조 기구·평행봉부터 보행 훈련. 낙상 위험도 HIGH 기록."}, {"title": "Dose timing inquiry", "title_kr": "복용 타이밍 문의", "body_en": "If patient asks: 'Should I take my gabapentin before or after PT?' — generally, taking it AFTER PT session is preferred to avoid sedation during exercise. But always defer to prescriber's instructions.", "body_kr": "환자가 복용 타이밍 문의 시: 일반적으로 PT 세션 후 복용이 운동 중 진정 효과 회피에 유리. 그러나 처방의 지시 우선."}], "side_effects_en": ["Sedation/somnolence (↓glutamate via α2δ Ca²⁺ channel blockade in CNS)", "Dizziness/ataxia (cerebellar Ca²⁺ channel inhibition → impaired coordination)", "Weight gain (↑appetite + fluid retention mechanism unclear)", "Peripheral edema (unknown mechanism, not cardiac)", "Cognitive blunting (↓excitatory neurotransmission broadly)"], "side_effects_kr": ["진정/졸음 (CNS α2δ Ca²⁺ 채널 차단 → 글루타메이트 감소)", "어지러움/운동실조 (소뇌 Ca²⁺ 채널 억제 → 협응 장애)", "체중 증가 (식욕 증가 + 수분 저류 기전 불명확)", "말초 부종 (기전 불명확, 심장성 아님)", "인지 둔화 (흥분성 신경전달 전반적 감소)"], "red_flags": ["[BEFORE PT] Patient arrives with ataxia, slurred speech, or glazed eyes → cancel session immediately; do not exercise — CNS depression; arrange safe transportation home, do not allow patient to drive", "[BEFORE PT] Gabapentin + opioid combination — check respiratory rate before every session; RR <12 → cancel PT, call physician", "[DURING PT] Balance deterioration mid-session in elderly patient on gabapentin → stop gait training, switch to parallel bars or seated exercise; increase fall risk documentation", "[DURING PT] RR drops below 12 during session (gabapentin + opioid) → stop immediately, call 911, monitor airway", "[DURING PT] Patient expresses suicidal thoughts → stop PT immediately, stay with patient, call 988 (Crisis Line) or 911 — black box warning for anticonvulsants", "[AFTER PT] Patient reports extreme drowsiness affecting daily function → educate to discuss dose timing with prescriber; suggest taking after PT session"], "red_flags_kr": ["[PT 전] 운동실조, 언어 불명확, 눈 초점 흐림으로 도착 → 즉시 세션 취소; 운동 금지 — CNS 억제; 안전한 귀가 마련, 직접 운전 금지", "[PT 전] 가바펜틴 + 오피오이드 병용 — 모든 세션 전 호흡수 확인; RR 12 미만 → PT 취소, 의사 연락", "[PT 중] 가바펜틴 복용 노인 환자 세션 중 균형 저하 → 보행 훈련 중지, 평행봉 또는 앉은 운동으로 전환; 낙상 위험도 문서화 강화", "[PT 중] 세션 중 RR 12 미만(가바펜틴 + 오피오이드) → 즉시 중지, 119 호출, 기도 모니터링", "[PT 중] 자살 충동 표현 → 즉시 PT 중지, 환자와 함께 있기, 988(위기상담전화) 또는 119 — 항경련제 블랙박스 경고", "[PT 후] 일상 기능에 영향을 주는 극심한 졸음 호소 → 처방의와 복용 시간 조정 논의 교육; PT 세션 후 복용 제안"], "interactions_en": ["Opioids: respiratory depression", "Benzodiazepines: CNS depression", "Alcohol: additive sedation"], "interactions_kr": ["오피오이드: 호흡 억제", "벤조디아제핀: CNS 억제", "알코올: 진정 효과 가중"], "chart_note_en": "Patient on Gabapentin 600mg TID for DPN. Gait: mildly ataxic, ambulatory with SPC. Fall risk: HIGH. Berg Balance Score 42/56. Exercise intensity limited per neurological status.", "chart_note_kr": "가바펜틴 600mg 1일 3회(당뇨신경병증). 보행: 경미한 운동실조, 지팡이로 보행 가능. 낙상 위험: 높음. Berg Balance 42/56. 신경학적 상태에 따라 운동 강도 제한.", "dosage": [{"form": "Neuropathic pain", "normal": "300–600mg TID", "high": "1800–3600mg/day"}]}, {"id": "baclofen", "name": "Baclofen", "brand": "Lioresal / Gablofen", "name_kr": "바클로펜", "category": "Neurological", "category_kr": "신경계", "class": "GABA-B Agonist / Antispastic", "class_kr": "GABA-B 작용제/항경직제", "rx": true, "risk": "moderate", "image": "", "emoji": "🧠", "summary_en": "Antispastic for MS, SCI, CP. Profound sedation. NEVER stop abruptly — withdrawal seizures possible.", "summary_kr": "다발성경화증·척수손상·뇌성마비 경직 치료. 강한 진정 효과. 갑작스러운 중단 절대 금지(경련 위험).", "mechanism_en": "GABA-B receptor agonist in spinal cord → inhibits monosynaptic/polysynaptic reflexes → ↓spasticity.", "mechanism_kr": "척수 GABA-B 수용체 작용 → 단시냅스/다시냅스 반사 억제 → 경직 감소.", "onset": "30–60 min", "halflife": "2–6 hr", "scenarios": [{"title": "Abrupt withdrawal danger", "title_kr": "갑작스러운 중단 위험", "body_en": "Patient with MS on baclofen 20mg TID: 'I ran out of baclofen 3 days ago.' URGENT: baclofen withdrawal = fever, severe spasticity, hallucinations, seizures. Refer to prescriber IMMEDIATELY. Document and notify physician.", "body_kr": "바클로펜 3일 전 중단 → 응급: 발열·심한 경직·환각·경련 가능. 즉시 처방의에게 연락. 기록 후 의사 통보 필수."}, {"title": "Sedation affecting PT quality", "title_kr": "진정 효과로 PT 질 저하", "body_en": "SCI patient on baclofen 40mg BID: extreme drowsiness first 2 hours after dose. Schedule PT 2–3 hours after their last dose for optimal participation. Coordinate with nursing/caregivers for timing.", "body_kr": "복용 후 2시간이 진정 효과 최고점. PT 세션은 마지막 복용 2-3시간 후로 계획. 간호사·보호자와 타이밍 조율."}, {"title": "Spasticity as functional asset", "title_kr": "경직의 기능적 자산", "body_en": "SCI patient with some spasticity: do NOT simply request more baclofen. Some spasticity helps with transfers, standing, bladder management. Discuss optimal dose with prescriber — reducing spasticity too much can reduce function.", "body_kr": "경직이 이동·서기·방광 관리에 도움이 되는 경우도 있음. 단순히 약량 증가 요청 금지. 처방의와 최적 용량 논의."}], "side_effects_en": ["Sedation — major (GABA-B agonism in CNS → generalized CNS depression)", "Muscle weakness/hypotonia (↓all muscle tone, not just spastic)", "Dizziness (↓CNS excitability)", "Seizures on abrupt withdrawal (rebound CNS excitability when GABA-B receptors upregulate)"], "side_effects_kr": ["진정 주요 (CNS GABA-B 작용 → 전반적 CNS 억제)", "근력 약화/저긴장 (경직 근육뿐 아니라 전체 근긴장도 감소)", "어지러움 (CNS 흥분성 감소)", "갑작스러운 중단 시 경련 (GABA-B 수용체 상향조절 시 CNS 흥분성 반동)"], "red_flags": ["[BEFORE PT] Patient ran out of baclofen 2+ days ago → do not exercise; refer to physician or ER immediately — withdrawal seizures, severe spasticity, hallucinations possible", "[BEFORE PT] Schedule PT 2–3 hours after last baclofen dose to avoid peak sedation (sedation peaks 1–2 hr post-dose)", "[BEFORE PT] Intrathecal pump: confirm pump functioning with patient/caregiver before session", "[DURING PT] Sudden increase in spasticity during session (patient was well-controlled) → stop, check if dose was missed; refer to physician", "[DURING PT] Intrathecal pump alarm sounds during PT → stop session immediately, call physician, transfer to ER — pump failure = withdrawal emergency", "[AFTER PT] Fever + increased spasticity + confusion after session → call 911 — baclofen withdrawal or pump failure"], "red_flags_kr": ["[PT 전] 2일 이상 전 바클로펜 소진 → 운동 금지; 즉시 의사 또는 응급실 의뢰 — 금단 경련, 심한 경직, 환각 가능", "[PT 전] 마지막 바클로펜 복용 2-3시간 후 PT 예약 — 최고 진정 시간(복용 후 1-2시간) 회피", "[PT 전] 척수강 내 펌프: 세션 전 환자/보호자와 펌프 작동 확인", "[PT 중] 세션 중 갑작스러운 경직 증가(잘 조절되던 환자) → 중지, 복용 누락 확인; 의사 의뢰", "[PT 중] PT 중 척수강 내 펌프 알람 → 즉시 세션 중지, 의사 연락, 응급실 이송 — 펌프 오작동 = 금단 응급", "[PT 후] 세션 후 발열 + 경직 증가 + 혼동 → 119 호출 — 바클로펜 금단 또는 펌프 오작동"], "interactions_en": ["CNS depressants: additive sedation", "Alcohol: profound CNS depression", "TCA antidepressants: increased CNS side effects"], "interactions_kr": ["CNS 억제제: 진정 효과 가중", "알코올: 심각한 CNS 억제", "삼환계 항우울제: CNS 부작용 증가"], "chart_note_en": "Patient on Baclofen 20mg TID (MS spasticity). Session timed 2.5hr post-dose. MAS (Modified Ashworth) R LE: 2+/4. Functional transfer training focus.", "chart_note_kr": "바클로펜 20mg 1일 3회(MS 경직). 복용 2.5시간 후 세션 시행. MAS 우측 하지 2+/4. 기능적 이동 훈련 중심.", "dosage": [{"form": "Spasticity", "normal": "5–20mg TID", "high": "80mg/day max"}]}, {"id": "tizanidine", "name": "Tizanidine", "brand": "Zanaflex", "name_kr": "티자니딘", "category": "Neurological", "category_kr": "신경계", "class": "Alpha-2 Adrenergic Agonist / Antispastic", "class_
