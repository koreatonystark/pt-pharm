<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PT Pharm">
<meta name="theme-color" content="#00bfae">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PT Pharmacology</title>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--card2:#22263a;--teal:#00bfae;--blue:#3d8ef8;--red:#ff4d4f;--yellow:#fbbf24;--green:#22c55e;--purple:#a78bfa;--text:#e8eaf0;--muted:#8b8fa8;--border:#2d3154;--risk-low:#22c55e;--risk-mod:#fbbf24;--risk-high:#ff4d4f;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;font-size:14px;min-height:100vh;padding-bottom:80px}
.header{background:var(--card);padding:16px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:700;color:var(--teal)}
.header p{font-size:11px;color:var(--muted);margin-top:2px}
.search-box{margin:12px 16px 0;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:8px}
.search-box input{background:none;border:none;outline:none;color:var(--text);width:100%;font-size:14px}
.search-box input::placeholder{color:var(--muted)}
.lang-btn{background:var(--teal);color:#000;border:none;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;padding:8px 0 env(safe-area-inset-bottom,8px)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;cursor:pointer;border:none;background:none;color:var(--muted);font-size:10px}
.tab-btn.active{color:var(--teal)}
.tab-btn svg{width:22px;height:22px}
.view{display:none;padding:16px}
.view.active{display:block}
.cond-list{display:flex;flex-direction:column;gap:8px}
.cond-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer}
.cond-card:active{opacity:0.8}
.cond-name{font-weight:600;font-size:14px}
.cond-drugs{color:var(--muted);font-size:12px;margin-top:4px}
.drug-grid{display:flex;flex-direction:column;gap:10px}
.drug-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;display:flex;align-items:center;gap:12px}
.drug-card:active{opacity:0.8}
.drug-img{width:56px;height:56px;border-radius:8px;object-fit:cover;background:var(--card2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px}
.drug-img img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.drug-info{flex:1;min-width:0}
.drug-name{font-weight:700;font-size:15px}
.drug-brand{color:var(--muted);font-size:12px}
.badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-class{background:#1e3a5f;color:var(--blue)}
.badge-rx{background:#1a2e1a;color:var(--green)}
.badge-otc{background:#2e2a1a;color:var(--yellow)}
.badge-risk-low{background:#1a2e1a;color:var(--risk-low)}
.badge-risk-moderate{background:#2e2a1a;color:var(--risk-mod)}
.badge-risk-high{background:#2e1a1a;color:var(--risk-high)}
.star-btn{font-size:22px;cursor:pointer;flex-shrink:0;background:none;border:none;padding:4px}
.detail-view{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;overflow-y:auto;padding-bottom:40px}
.detail-view.open{display:block}
.detail-header{background:var(--card);padding:16px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px}
.back-btn{background:none;border:none;color:var(--teal);font-size:24px;cursor:pointer;padding:0;line-height:1}
.detail-header h2{font-weight:700;font-size:18px;flex:1}
.detail-content{padding:16px;display:flex;flex-direction:column;gap:16px}
.detail-drug-hero{background:var(--card);border-radius:14px;padding:16px;display:flex;gap:14px;align-items:flex-start}
.detail-drug-img{width:80px;height:80px;border-radius:10px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:40px;flex-shrink:0;overflow:hidden}
.detail-drug-img img{width:100%;height:100%;object-fit:cover}
.detail-drug-main{flex:1}
.detail-drug-name{font-size:20px;font-weight:800}
.detail-drug-brand{color:var(--muted);font-size:13px;margin-top:2px}
.detail-drug-summary{font-size:13px;color:var(--text);margin-top:8px;line-height:1.5}
.section{background:var(--card);border-radius:14px;padding:16px}
.section-title{font-weight:700;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.quick-item{background:var(--card2);border-radius:8px;padding:10px}
.quick-label{font-size:10px;color:var(--muted);margin-bottom:2px}
.quick-val{font-size:12px;font-weight:600}
.scenario-list{display:flex;flex-direction:column;gap:10px}
.scenario-item{background:#003d36;border:1px solid #005a50;border-radius:10px;padding:12px}
.scenario-title{font-weight:700;font-size:13px;color:var(--teal);margin-bottom:6px}
.scenario-body{font-size:12px;line-height:1.6;color:#c8f0ec}
.tag-list{display:flex;flex-direction:column;gap:6px}
.tag-item{background:var(--card2);border-radius:8px;padding:8px 12px;font-size:12px}
.red-flag-item{background:#2e1a1a;border:1px solid #5a2020;border-radius:8px;padding:8px 12px;font-size:12px;color:#ffb3b3}
.interaction-item{background:#1a1f3a;border:1px solid #2d3575;border-radius:8px;padding:8px 12px;font-size:12px;color:#b3c3ff}
.dose-table{width:100%;border-collapse:collapse}
.dose-table th{background:var(--card2);padding:8px;font-size:12px;text-align:left;color:var(--muted)}
.dose-table td{padding:8px;font-size:12px;border-top:1px solid var(--border)}
.note-box{background:#1a2e1a;border:1px solid #2d5a2d;border-radius:10px;padding:12px;font-size:12px;color:#b3f0b3;line-height:1.6;font-family:monospace}
.empty{text-align:center;color:var(--muted);padding:40px 0}
.filter-scroll{display:flex;gap:8px;overflow-x:auto;padding:12px 16px;scrollbar-width:none}
.filter-scroll::-webkit-scrollbar{display:none}
.filter-chip{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;white-space:nowrap;cursor:pointer;color:var(--muted)}
.filter-chip.active{background:var(--teal);color:#000;border-color:var(--teal);font-weight:700}
.risk-bar{display:flex;align-items:center;gap:8px;margin-top:8px}
.risk-dot{width:10px;height:10px;border-radius:50%}

.drug-img-wrap { cursor: pointer; position: relative; }
.drug-img-wrap::after {
  content: '🔍';
  position: absolute;
  bottom: 2px;
  right: 2px;
  font-size: 11px;
  background: rgba(0,0,0,0.6);
  border-radius: 4px;
  padding: 1px 3px;
  line-height: 1.4;
  pointer-events: none;
}
.drug-img-wrap.sm-card::after { display: none; }
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <h1>💊 PT Pharmacology</h1>
      <p>Dr.Jeon 2026 — 22 Drugs · Clinical Focus</p>
    </div>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">한/EN</button>
  </div>
  <div class="search-box">
    <span style="color:var(--muted)">🔍</span>
    <input type="text" id="searchInput" placeholder="Search drug name, condition..." oninput="doSearch()">
  </div>
</div>

<div class="filter-scroll" id="filterScroll">
  <span class="filter-chip active" onclick="filterCat('all',this)">All</span>
  <span class="filter-chip" onclick="filterCat('Cardiovascular',this)">❤️ Cardio</span>
  <span class="filter-chip" onclick="filterCat('Musculoskeletal',this)">🦴 MSK</span>
  <span class="filter-chip" onclick="filterCat('Neurological',this)">🧠 Neuro</span>
  <span class="filter-chip" onclick="filterCat('Pain',this)">🚨 Opioid</span>
  <span class="filter-chip" onclick="filterCat('Respiratory',this)">💨 Resp</span>
  <span class="filter-chip" onclick="filterCat('Endocrine',this)">💉 Endo</span>
</div>

<!-- View: Drug List -->
<div class="view active" id="view-drugs">
  <div class="drug-grid" id="drugGrid"></div>
</div>

<!-- View: Conditions -->
<div class="view" id="view-conditions">
  <div class="cond-list" id="condList"></div>
</div>

<!-- View: Starred -->
<div class="view" id="view-starred">
  <div class="drug-grid" id="starredGrid"></div>
</div>

<!-- Tab Bar -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-drugs" onclick="showTab('drugs')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Drugs
  </button>
  <button class="tab-btn" id="tab-conditions" onclick="showTab('conditions')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
    Conditions
  </button>
  <button class="tab-btn" id="tab-starred" onclick="showTab('starred')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    Starred
  </button>
</div>

<!-- Detail Panel -->
<div class="detail-view" id="detailView">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">←</button>
    <h2 id="detailTitle" style="font-size:15px">Drug Detail</h2>
    <button class="lang-btn" id="detailLangBtn" onclick="toggleLang()" style="flex-shrink:0">한/EN</button>
    <button class="star-btn" id="detailStarBtn" onclick="toggleStarDetail()">☆</button>
  </div>
  <div class="detail-content" id="detailContent"></div>
</div>

const imgCache = {};

async function loadDrugImage(drugId, imgEl) {
  if (imgCache[drugId]) {
    imgEl.src = imgCache[drugId];
    return;
  }
  // Set SVG fallback immediately
  imgEl.src = DRUG_FALLBACK_SVG[drugId] || '';
  imgEl.style.objectFit = 'contain';
  
  // Try NIH RxImage API
  const searchTerm = DRUG_SEARCH[drugId];
  if (!searchTerm) return;
  try {
    const url = `https://rximage.nlm.nih.gov/api/rximage/1/rxnav?name=${encodeURIComponent(searchTerm)}&resolution=120`;
    const resp = await fetch(url, {signal: AbortSignal.timeout(5000)});
    const data = await resp.json();
    const imgs = data?.nlmRxImages || [];
    if (imgs.length > 0) {
      const photoUrl = imgs[0].imageUrl;
      imgCache[drugId] = photoUrl;
      imgEl.src = photoUrl;
      imgEl.style.objectFit = 'cover';
    }
  } catch(e) {
    // Keep SVG fallback
  }
}

function openDrugsComPage(drugId, e) {
  e.stopPropagation();
  const url = DRUGS_COM_URLS[drugId];
  if (url) window.open(url, '_blank');
}

function getDrugImgHtml(d, size='sm') {
  const sz = size === 'lg' ? 80 : 56;
  const fallbackSvg = DRUG_FALLBACK_SVG[d.id] || '';
  const isLg = size === 'lg';
  const clickable = isLg ? `onclick="openDrugsComPage('${d.id}',event)" title="Tap to see drug photos on drugs.com"` : '';
  const extraClass = isLg ? '' : ' sm-card';
  return `<div class="drug-img-wrap${extraClass}" style="width:${sz}px;height:${sz}px;border-radius:${isLg?10:8}px;overflow:hidden;background:var(--card2);flex-shrink:0" ${clickable}>
    <img data-drug-id="${d.id}" src="${fallbackSvg}"
      style="width:100%;height:100%;object-fit:contain;display:block;transition:opacity 0.3s"
    >
  </div>`;
}

function loadVisibleImages() {
  document.querySelectorAll('img[data-drug-id]').forEach(img => {
    const id = img.dataset.drugId;
    if (id && !imgCache[id]) loadDrugImage(id, img);
    else if (imgCache[id]) img.src = imgCache[id];
  });
}

성 가능성."}, {"title": "Flushing during exercise", "title_kr": "운동 중 홍조", "body_en": "Patient reports facial flushing and headache during early exercise on amlodipine. Common vasodilation side effect. Reassure patient; reduce intensity initially. Flushing typically improves with continued use.", "body_kr": "운동 초반 얼굴 홍조·두통 호소 → 혈관 확장 부작용. 초기에 흔히 발생, 강도 낮추고 지속 사용 시 개선."}, {"title": "Gingival hyperplasia note", "title_kr": "치은 증식 주의", "body_en": "Long-term amlodipine patient mentions 'my gums are growing.' This is gingival hyperplasia — a known CCB side effect. Not PT-managed but note in chart and refer to dentist/prescriber.", "body_kr": "장기 복용 환자의 잇몸 증식(치은 증식) → CCB 부작용. 치과 또는 처방의에게 의뢰."}], "side_effects_en": ["Peripheral edema (ankle)", "Flushing", "Headache", "Palpitations", "Gingival hyperplasia (long-term)"], "side_effects_kr": ["말초부종(발목)", "홍조", "두통", "심계항진", "치은 증식(장기)"], "red_flags": ["Edema worsening rapidly → rule out CHF", "HR >100 + palpitations → check"], "red_flags_kr": ["빠른 부종 악화 → 심부전 감별", "HR 100 이상 + 심계항진 → 확인"], "interactions_en": ["Beta-blockers: additive HR/BP reduction", "Simvastatin >20mg: rhabdomyolysis risk", "CYP3A4 inhibitors (grapefruit): increased levels"], "interactions_kr": ["베타차단제: 심박수·혈압 추가 감소", "심바스타틴 20mg 초과: 횡문근융해 위험", "자몽: 혈중 농도 증가"], "chart_note_en": "Patient on Amlodipine 5mg QD. Bilateral ankle edema noted, symmetric, non-pitting. Consistent with medication side effect per patient's MD.", "chart_note_kr": "암로디핀 5mg 1일 1회 복용 중. 양측 발목 비함요부종 관찰, 대칭적. 담당의 확인 완료된 약물 부작용.", "dosage": [{"form": "HTN", "normal": "5mg QD", "high": "10mg QD"}]}, {"id": "furosemide", "name": "Furosemide", "brand": "Lasix", "name_kr": "푸로세미드", "category": "Cardiovascular", "category_kr": "심혈관계", "class": "Loop Diuretic", "class_kr": "루프 이뇨제", "rx": true, "risk": "moderate", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/Furosemide_40mg_tablets.jpg/120px-Furosemide_40mg_tablets.jpg", "emoji": "💊", "summary_en": "Powerful loop diuretic for edema, HF, HTN. Causes potassium loss and dehydration. Schedule PT 4+ hrs after dose.", "summary_kr": "강력한 이뇨제. 칼륨 손실·탈수 유발. 복용 4시간 후 PT 권장.", "mechanism_en": "Inhibits Na-K-2Cl transporter in Loop of Henle → massive diuresis. Rapid onset 30–60 min (oral).", "mechanism_kr": "헨레고리 Na-K-2Cl 수송체 억제 → 강력한 이뇨. 경구 30-60분 내 효과.", "onset": "30–60 min (oral)", "halflife": "2 hr", "scenarios": [{"title": "PT timing critical", "title_kr": "PT 타이밍 중요", "body_en": "Patient takes furosemide 40mg at 8am. Schedule PT no earlier than 12pm. If PT during peak diuresis: patient needs frequent bathroom breaks, significant dehydration possible, BP may drop during exercise.", "body_kr": "오전 8시 복용 시 낮 12시 이후 PT 권장. 이뇨 최고점에 운동 시 화장실 빈번, 탈수, 혈압 하강 가능."}, {"title": "Hypokalemia presentation", "title_kr": "저칼륨혈증 증상", "body_en": "Patient mid-PT session suddenly reports: leg cramps, muscle weakness, palpitations. On furosemide daily. STOP exercise. This is classic hypokalemia presentation. Check K+ history. K+ <3.0 = medical emergency.", "body_kr": "PT 중 갑자기 다리 경련·근력 약화·심계항진 → 저칼륨혈증 의심. 운동 즉시 중지. K+ 3.0 미만 = 응급."}, {"title": "Weight monitoring education", "title_kr": "체중 모니터링 교육", "body_en": "CHF patient on furosemide: daily weight is a clinical vital sign. Weight gain >2 lbs overnight = fluid retention → dose may need adjustment. Educate patient to report to MD.", "body_kr": "심부전 환자 매일 체중 측정 필수. 하루 0.9kg(2파운드) 이상 증가 = 체액 저류 신호 → 의사에게 보고 교육."}], "side_effects_en": ["Hypokalemia", "Dehydration", "Hypotension", "Ototoxicity (high IV doses)", "Hyponatremia", "Increased uric acid"], "side_effects_kr": ["저칼륨혈증", "탈수", "저혈압", "이독성(고용량 IV)", "저나트륨혈증", "요산 증가"], "red_flags": ["K+ <3.5 → hold exercise, refer", "Sudden muscle cramps + weakness during PT → hypokalemia", "Dizziness + BP drop = dehydration"], "red_flags_kr": ["K+ 3.5 미만 → 운동 보류, 의뢰", "PT 중 갑작스러운 경련+근력 저하 → 저칼륨혈증", "어지러움+혈압 하강 = 탈수"], "interactions_en": ["Digoxin: hypokalemia increases digoxin toxicity", "NSAIDs: blunt diuretic effect", "Aminoglycosides: combined ototoxicity"], "interactions_kr": ["디곡신: 저칼륨혈증이 디곡신 독성 증가", "NSAIDs: 이뇨 효과 감소", "아미노글리코사이드: 이독성 상승"], "chart_note_en": "Patient on Furosemide 40mg QD (taken at 8am). PT session at 1pm. Adequate hydration confirmed. No cramping or dizziness during session. K+ 3.9 per last labs.", "chart_note_kr": "푸로세미드 40mg 오전 8시 복용. PT 오후 1시 진행. 충분한 수분 확인. 경련·어지러움 없음. 최근 K+ 3.9.", "dosage": [{"form": "Edema", "normal": "20–80mg QD", "high": ">600mg/day (acute)"}]}, {"id": "hctz", "name": "HCTZ (Hydrochlorothiazide)", "brand": "Microzide", "name_kr": "히드로클로로티아지드", "category": "Cardiovascular", "category_kr": "심혈관계", "class": "Thiazide Diuretic", "class_kr": "티아지드 이뇨제", "rx": true, "risk": "low", "image": "", "emoji": "💧", "summary_en": "First-line thiazide diuretic for HTN. Milder than furosemide. Causes photosensitivity and hypokalemia.", "summary_kr": "1차 선택 이뇨제. 푸로세미드보다 순함. 광과민성·저칼륨혈증 유발.", "mechanism_en": "Inhibits Na-Cl cotransporter in distal convoluted tubule → moderate diuresis. Also reduces peripheral vascular resistance long-term.", "mechanism_kr": "원위곱슬세관 Na-Cl 공수송체 억제 → 중등도 이뇨.", "onset": "2 hr", "halflife": "6–15 hr", "scenarios": [{"title": "Outdoor PT sun caution", "title_kr": "야외 PT 태양광 주의", "body_en": "HCTZ causes photosensitivity. Outdoor PT: ensure patient has sunscreen and protective clothing. Prolonged sun exposure → severe sunburn risk even with brief exposure.", "body_kr": "HCTZ 복용 환자 야외 운동 시 자외선 차단제·보호 의류 필수. 짧은 노출에도 심한 화상 가능."}, {"title": "Diabetic patient risk", "title_kr": "당뇨 환자 위험", "body_en": "HCTZ raises blood glucose. Diabetic patient on HCTZ: monitor for unexpected hyperglycemia symptoms during PT (increased thirst, polyuria, fatigue).", "body_kr": "HCTZ는 혈당 상승 유발. 당뇨 환자 운동 중 고혈당 증상(갈증·다뇨·피로) 모니터링."}, {"title": "Gout flare trigger", "title_kr": "통풍 발작 유발", "body_en": "HCTZ increases uric acid. Patient with HTN + gout history on HCTZ: acute ankle/foot pain during PT may be gout flare, not musculoskeletal. Assess carefully.", "body_kr": "HCTZ는 요산 증가. 고혈압+통풍 이력 환자의 갑작스러운 발·발목 통증 → 통풍 발작 가능성 감별."}], "side_effects_en": ["Hypokalemia", "Photosensitivity", "Hyperglycemia", "Hyperuricemia/Gout", "Hyponatremia"], "side_effects_kr": ["저칼륨혈증", "광과민성", "고혈당", "고요산혈증/통풍", "저나트륨혈증"], "red_flags": ["Gout attack in HTN patient on HCTZ", "Unexpected hyperglycemia in diabetic", "Sun exposure → severe burn"], "red_flags_kr": ["HCTZ 복용 HTN 환자의 통풍 발작", "당뇨 환자 예상치 못한 고혈당", "햇빛 노출 시 심한 화상"], "interactions_en": ["NSAIDs: reduced antihypertensive effect", "Lithium: increased lithium toxicity", "Corticosteroids: additive potassium loss"], "interactions_kr": ["NSAIDs: 항고혈압 효과 감소", "리튬: 리튬 독성 증가", "코르티코스테로이드: 칼륨 손실 가중"], "chart_note_en": "Patient on HCTZ 25mg QD. Outdoor session: sunscreen applied. No gout symptoms. Last K+ 3.8.", "chart_note_kr": "HCTZ 25mg 1일 1회 복용 중. 야외 세션 시 자외선 차단 확인. 통풍 증상 없음. 최근 K+ 3.8.", "dosage": [{"form": "HTN", "normal": "12.5–25mg QD", "high": "50mg QD"}]}, {"id": "warfarin", "name": "Warfarin", "brand": "Coumadin", "name_kr": "와파린", "category": "Cardiovascular", "category_kr": "심혈관계", "class": "Vitamin K Antagonist", "class_kr": "비타민K 길항제", "rx": true, "risk": "high", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Coumadin5.jpg/120px-Coumadin5.jpg", "emoji": "⚠️", "summary_en": "Anticoagulant for AF, DVT, PE, mechanical valves. Narrow therapeutic window (INR 2–3). HIGH BLEEDING RISK.", "summary_kr": "심방세동·DVT·PE·기계판막에 사용. 치료 범위 좁음(INR 2-3). 출혈 위험 높음.", "mechanism_en": "Inhibits Vitamin K epoxide reductase → ↓factors II, VII, IX, X. Monitored by INR (target 2–3, 2.5–3.5 for mechanical valves).", "mechanism_kr": "비타민K 에폭시드 환원효소 억제 → 응고인자 II·VII·IX·X 감소. INR 2-3 목표.", "onset": "2–5 days (full effect)", "halflife": "40 hr", "scenarios": [{"title": "Fall risk = highest priority", "title_kr": "낙상 위험 = 최우선 과제", "body_en": "Warfarin patient falls during PT — ANY head strike, even minor: stop session, call EMS or have patient seen same-day. Intracranial hemorrhage risk is real. Document exact fall mechanism.", "body_kr": "와파린 복용 중 낙상 → 가벼운 머리 충돌도 응급. 즉시 세션 중지, EMS 또는 당일 진료. 두개내 출혈 위험."}, {"title": "INR check before manual therapy", "title_kr": "도수치료 전 INR 확인", "body_en": "Before any joint mobilization or soft tissue technique: confirm recent INR. INR >3.5 → hold manual therapy, refer to physician. INR 2–3 = proceed with modified technique (no aggressive high-velocity thrust).", "body_kr": "관절 가동화나 연부조직 기법 전 최근 INR 확인. INR 3.5 초과 → 도수치료 보류, 의사 의뢰. 2-3 범위 시 조심스러운 기법 가능."}, {"title": "Unexplained bruising assessment", "title_kr": "원인 불명 멍 평가", "body_en": "Patient shows extensive bruising during PT session. On warfarin. Ask: 'When did you last check your INR?' Large hematomas or ecchymosis beyond minor PT contact → possible supratherapeutic INR. Refer immediately.", "body_kr": "광범위한 멍 발견 시 최근 INR 확인. 경미한 접촉 이상의 혈종·멍 → 치료 범위 초과 가능. 즉시 의뢰."}, {"title": "Diet interaction education", "title_kr": "식이 상호작용 교육", "body_en": "Vitamin K-rich foods (spinach, kale, broccoli) decrease warfarin effect. Patient starting new diet/juicing program → notify prescriber. Consistency in Vit K intake is key, not avoidance.", "body_kr": "시금치·케일·브로콜리 등 비타민K 식품 → 와파린 효과 감소. 새 식단 시작 시 처방의에게 알리도록 교육. 완전 기피보다 일관성이 중요."}], "side_effects_en": ["Bleeding (major risk)", "Bruising", "Hemorrhagic stroke", "Drug/food interactions (many)"], "side_effects_kr": ["출혈(주요 위험)", "멍", "출혈성 뇌졸중", "약물/식품 상호작용(다수)"], "red_flags": ["Any head fall → same-day evaluation mandatory", "INR >4 → emergent reversal", "Spontaneous hematoma forming during PT"], "red_flags_kr": ["머리 충돌 낙상 → 당일 반드시 진료", "INR 4 초과 → 응급 역전", "PT 중 자발적 혈종 형성"], "interactions_en": ["Aspirin/NSAIDs: additive bleeding", "Antibiotics: alter gut flora → INR changes", "Vitamin K foods: decrease effect", "Many drugs via CYP2C9"], "interactions_kr": ["아스피린/NSAIDs: 출혈 위험 가중", "항생제: 장내 세균총 변화 → INR 변동", "비타민K 식품: 효과 감소", "다수 약물과 CYP2C9 상호작용"], "chart_note_en": "Patient on Warfarin (target INR 2–3). INR 2.4 reported per patient (last check 3 days ago). Fall prevention protocol in place. No aggressive manual therapy performed.", "chart_note_kr": "와파린 복용 중(목표 INR 2-3). 환자 보고 INR 2.4(3일 전 검사). 낙상 예방 프로토콜 시행. 공격적 도수치료 미실시.", "dosage": [{"form": "Anticoagulation", "normal": "2–10mg QD (INR-guided)", "high": "INR >4 = toxic"}]}, {"id": "apixaban", "name": "Apixaban", "brand": "Eliquis", "name_kr": "아픽사반", "category": "Cardiovascular", "category_kr": "심혈관계", "class": "Factor Xa Inhibitor (DOAC)", "class_kr": "Xa인자 억제제(DOAC)", "rx": true, "risk": "high", "image": "", "emoji": "🩸", "summary_en": "DOAC for AF, DVT/PE. No INR monitoring. Predictable dosing but NO routine reversal agent available in all settings.", "summary_kr": "심방세동·DVT/PE에 사용. INR 모니터링 불필요. 예측 가능한 용량. 일부 환경에서 역전제 없음.", "mechanism_en": "Directly inhibits Factor Xa → ↓thrombin generation → ↓clot formation. More predictable than warfarin.", "mechanism_kr": "Xa인자 직접 억제 → 트롬빈 생성 감소. 와파린보다 예측 가능.", "onset": "1–3 hr", "halflife": "12 hr", "scenarios": [{"title": "No INR, but still bleeds", "title_kr": "INR 없어도 출혈 위험", "body_en": "Common PT misconception: 'Patient on Eliquis, no INR to check, so less worry.' WRONG. Eliquis patients bleed significantly. Same fall precautions as warfarin. Head injury → same-day evaluation.", "body_kr": "흔한 오해: Eliquis는 INR 없으니 덜 위험하다? 아님. 출혈 위험 동일. 낙상 예방·머리 충돌 당일 평가 동일하게 적용."}, {"title": "Reversal agent availability", "title_kr": "역전제 가용성 확인", "body_en": "Andexanet alfa (Andexxa) is the reversal agent for apixaban — not always available at local ERs. In emergency, advise EMS/patient to go to major hospital. Document patient's anticoagulation status in chart.", "body_kr": "역전제(Andexxa) 소형 응급실엔 없을 수 있음. 응급 시 대형 병원으로 이송 안내. 차트에 항응고제 복용 기록 필수."}, {"title": "Missed dose concern", "title_kr": "복용 누락 걱정", "body_en": "Patient says 'I forgot my Eliquis last night, should I exercise today?' Apixaban 12hr half-life means one missed dose significantly reduces anticoagulation. Refer to prescriber for guidance, but no specific PT restriction from missed dose alone.", "body_kr": "어제 복용 누락 → 반감기 12시간으로 항응고 효과 감소. 처방의에게 문의 권고. PT 자체 제한은 없으나 기록."}], "side_effects_en": ["Bleeding", "Bruising", "GI bleeding", "Anemia"], "side_effects_kr": ["출혈", "멍", "소화관 출혈", "빈혈"], "red_flags": ["Head injury → same-day evaluation (same as warfarin)", "Signs of internal bleeding: dark stool, blood in urine"], "red_flags_kr": ["머리 충돌 → 당일 진료(와파린과 동일)", "내출혈 징후: 검은 대변, 혈뇨"], "interactions_en": ["NSAIDs/aspirin: additive bleeding", "Strong CYP3A4 inhibitors: increased apixaban levels", "Rifampin: reduced efficacy"], "interactions_kr": ["NSAIDs/아스피린: 출혈 위험 가중", "강력한 CYP3A4 억제제: 혈중 농도 증가", "리팜핀: 효과 감소"], "chart_note_en": "Patient on Apixaban 5mg BID for Afib. Fall prevention education provided. No head injury during session. Bleeding precautions reviewed.", "chart_note_kr": "아픽사반 5mg 1일 2회 복용(심방세동). 낙상 예방 교육 시행. 세션 중 머리 충돌 없음. 출혈 주의 사항 검토.", "dosage": [{"form": "Afib stroke prev", "normal": "5mg BID", "high": "10mg BID (DVT/PE)"}]}, {"id": "atorvastatin", "name": "Atorvastatin", "brand": "Lipitor", "name_kr": "아토르바스타틴", "category": "Cardiovascular", "category_kr": "심혈관계", "class": "HMG-CoA Reductase Inhibitor (Statin)", "class_kr": "스타틴", "rx": true, "risk": "low", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/3/36/Lipitor_80mg.jpg/120px-Lipitor_80mg.jpg", "emoji": "💊", "summary_en": "Statin for hyperlipidemia and CV risk reduction. Most common complaint in PT: muscle pain (myopathy).", "summary_kr": "이상지질혈증·심혈관 위험 감소. PT에서 가장 흔한 호소: 근육통(근병증).", "mechanism_en": "Inhibits HMG-CoA reductase → ↓hepatic cholesterol synthesis → ↓LDL. High-intensity: atorvastatin 40–80mg.", "mechanism_kr": "HMG-CoA 환원효소 억제 → 간의 콜레스테롤 합성 감소 → LDL 감소.", "onset": "2–4 weeks (lipid effect)", "halflife": "14 hr", "scenarios": [{"title": "Statin myopathy vs DOMS", "title_kr": "스타틴 근병증 vs 지연성 근육통", "body_en": "Patient on atorvastatin 80mg complains of generalized muscle aching after starting new exercise program. Differentiate: statin myopathy is bilateral, proximal (thighs, shoulders), present at REST. DOMS is activity-related and resolves. Check CK if myopathy suspected.", "body_kr": "아토르바스타틴 복용 환자 근육통 호소 → 스타틴 근병증: 양측성, 근위부(허벅지·어깨), 안정 시도 지속. 지연성 근육통: 활동 연관, 자연 회복. CK 검사 의뢰 고려."}, {"title": "Rhabdomyolysis red flag", "title_kr": "횡문근융해 경고", "body_en": "Patient on high-dose statin + started intense exercise + taking amlodipine or gemfibrozil: dark/cola-colored urine + severe muscle weakness = possible rhabdomyolysis. STOP exercise, refer emergently.", "body_kr": "고용량 스타틴 + 강도 높은 운동 시작 + 암로디핀/겜피브로질 병용: 콜라색 소변 + 심한 근력 약화 = 횡문근융해 가능성. 즉시 운동 중지, 응급 의뢰."}, {"title": "Exercise and statin benefit", "title_kr": "운동과 스타틴의 시너지", "body_en": "Statins + aerobic exercise: additive cardiovascular benefit. PT can reinforce this. However: very high intensity exercise can temporarily raise CK even without statin — context matters.", "body_kr": "스타틴 + 유산소 운동 = 심혈관 보호 시너지. PT에서 운동 지속 독려 가능. 단, 고강도 운동은 스타틴 없이도 CK 일시 상승 가능 → 맥락 고려."}], "side_effects_en": ["Myopathy (muscle pain)", "Elevated CK", "Rhabdomyolysis (rare)", "Elevated liver enzymes", "GI upset"], "side_effects_kr": ["근병증(근육통)", "CK 상승", "횡문근융해(드물게)", "간효소 상승", "소화불량"], "red_flags": ["Cola-colored urine → rhabdomyolysis → 911", "Severe proximal weakness at rest → hold exercise, refer", "CK >10x upper normal = danger"], "red_flags_kr": ["콜라색 소변 → 횡문근융해 → 응급", "안정 시 심한 근위부 근력 약화 → 운동 보류, 의뢰", "CK 정상 상한 10배 초과 = 위험"], "interactions_en": ["Amlodipine >20mg simvastatin: use atorvastatin instead", "Gemfibrozil: rhabdomyolysis risk", "Grapefruit juice: increased statin levels"], "interactions_kr": ["암로디핀: 심바스타틴 20mg 초과 금지, 아토르바스타틴으로 전환", "겜피브로질: 횡문근융해 위험", "자몽주스: 스타틴 혈중 농도 증가"], "chart_note_en": "Patient on Atorvastatin 40mg QD. Mild bilateral thigh achiness reported, onset 2 weeks ago with statin initiation. CK pending per MD order. Exercise modified to low-intensity pending results.", "chart_note_kr": "아토르바스타틴 40mg 1일 1회. 2주 전 스타틴 시작 후 양측 허벅지 경미한 통증 보고. 의사 지시로 CK 검사 예정. 결과 전까지 저강도 운동 수정.", "dosage": [{"form": "Hyperlipidemia", "normal": "10–40mg QD", "high": "80mg QD (high-intensity)"}]}, {"id": "aspirin", "name": "Aspirin (Low-dose)", "brand": "Bayer / Ecotrin (81mg)", "name_kr": "아스피린(저용량)", "category": "Musculoskeletal", "category_kr": "근골격계", "class": "Antiplatelet / Salicylate", "class_kr": "항혈소판제 / 살리실산계", "rx": false, "risk": "moderate", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Aspirin-100-tablets.jpg/120px-Aspirin-100-tablets.jpg", "emoji": "💊", "summary_en": "81mg = antiplatelet for CV prevention. 325mg+ = analgesic/anti-inflammatory. IRREVERSIBLE platelet inhibition (7–10 days).", "summary_kr": "81mg = 심혈관 예방용 항혈소판. 325mg+ = 진통/항염. 혈소판 억제 비가역적(7-10일).", "mechanism_en": "Irreversibly inhibits COX-1 (and COX-2 at high doses) → ↓TXA2 → ↓platelet aggregation. Platelet cannot regenerate COX.", "mechanism_kr": "COX-1 비가역적 억제 → TXA2 감소 → 혈소판 응집 억제. 혈소판 수명(7-10일) 내내 지속.", "onset": "30–60 min (analgesic)", "halflife": "15–20 min (ASA) / 3–5 days (platelet effect)", "scenarios": [{"title": "Bleeding risk with procedures", "title_kr": "시술 시 출혈 위험", "body_en": "Patient on daily aspirin 81mg scheduled for dry needling or cupping. Even 81mg = clinically significant bleeding risk. Check with prescriber before invasive PT procedures. Platelet function impaired for 7–10 days after last dose.", "body_kr": "아스피린 81mg 복용 환자 건침·부항 예정 → 출혈 위험 존재. 시술 전 처방의 확인. 복용 중단 후에도 7-10일간 혈소판 기능 저하."}, {"title": "Joint injection timing", "title_kr": "관절 주사 타이밍", "body_en": "PT coordinating with MD for joint injection: patient on aspirin should ideally hold 7 days pre-procedure. However, for low-risk joints, some MDs allow continuation. Document aspirin status in referral.", "body_kr": "관절 주사 전 이상적으로 7일 전 아스피린 중단. 일부 저위험 관절은 의사가 지속 허용. 의뢰 시 아스피린 복용 여부 기록."}, {"title": "Warfarin + Aspirin combo", "title_kr": "와파린 + 아스피린 복합", "body_en": "Patient on BOTH warfarin AND aspirin (e.g., post-MI with Afib): extreme bleeding risk. ANY fall or bruising = urgent evaluation. No aggressive manual therapy. Document both drugs.", "body_kr": "와파린 + 아스피린 동시 복용(예: 심근경색 후 심방세동): 극도의 출혈 위험. 낙상·멍 → 즉시 평가. 공격적 도수치료 금지."}, {"title": "GI symptom monitoring", "title_kr": "소화관 증상 모니터링", "body_en": "Long-term aspirin user complains of epigastric pain or dark stool during PT. ASA-induced GI erosion → possible GI bleed. Refer to MD promptly. Not normal muscle soreness.", "body_kr": "장기 아스피린 복용 환자의 명치 통증·검은 대변 → 소화관 출혈 가능. 즉시 의사 의뢰. 근육통과 혼동 금지."}], "side_effects_en": ["GI irritation/bleeding", "Bleeding/bruising", "Tinnitus (high doses)", "Reye syndrome (children)", "Platelet dysfunction"], "side_effects_kr": ["소화관 자극/출혈", "출혈/멍", "이명(고용량)", "라이증후군(소아)", "혈소판 기능 장애"], "red_flags": ["Dark/tarry stool → GI bleed → refer", "Fall + head injury on aspirin → evaluation", "Tinnitus + high-dose aspirin = toxicity"], "red_flags_kr": ["검고 타르 같은 대변 → 소화관 출혈 → 의뢰", "아스피린 복용 중 낙상+머리 부상 → 평가", "고용량 이명 = 독성"], "interactions_en": ["Warfarin: additive bleeding", "Other NSAIDs: compete for COX binding, reduce aspirin antiplatelet effect", "Ibuprofen timing: take aspirin 2hr before ibuprofen"], "interactions_kr": ["와파린: 출혈 위험 가중", "다른 NSAIDs: COX 결합 경쟁, 항혈소판 효과 감소", "이부프로펜: 아스피린을 2시간 먼저 복용"], "chart_note_en": "Patient on Aspirin 81mg QD (antiplatelet). Dry needling deferred pending MD clearance. Bruising tendency noted. No current GI complaints.", "chart_note_kr": "아스피린 81mg 1일 1회(항혈소판). 건침 의사 허가 전 보류. 멍 경향 있음. 현재 소화관 증상 없음.", "dosage": [{"form": "Antiplatelet", "normal": "81mg QD", "high": "325–4000mg/day (pain)"}]}, {"id": "acetaminophen", "name": "Acetaminophen", "brand": "Tylenol", "name_kr": "아세트아미노펜", "category": "Musculoskeletal", "category_kr": "근골격계", "class": "Analgesic / Antipyretic", "class_kr": "진통제 / 해열제", "rx": false, "risk": "moderate", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/Tylenol_8_hour.jpg/120px-Tylenol_8_hour.jpg", "emoji": "💊", "summary_en": "Most common OTC analgesic. Safe for GI/platelets unlike NSAIDs. HEPATOTOXIC >4g/day. Hidden in many combo drugs.", "summary_kr": "가장 흔한 OTC 진통제. 소화관·혈소판 안전. 4g/일 초과 시 간독성. 복합 약물에 숨어있음 주의.", "mechanism_en": "Central COX inhibition + endocannabinoid system modulation → analgesia/antipyresis. No peripheral anti-inflammatory effect.", "mechanism_kr": "중추 COX 억제 + 내인성 카나비노이드 조절 → 진통·해열. 말초 항염 효과 없음.", "onset": "30–60 min", "halflife": "2–4 hr", "scenarios": [{"title": "Hidden APAP in combo drugs", "title_kr": "복합 약물 속 숨은 APAP", "body_en": "Patient takes Percocet (oxycodone + APAP 325mg) + NyQuil (APAP 650mg) + Tylenol PM (APAP 500mg) = 1,475mg from 3 sources before counting regular Tylenol. Easily exceeds 4g/day. Ask about ALL medications before PT pain management education.", "body_kr": "Percocet(APAP 325mg) + NyQuil(APAP 650mg) + Tylenol PM(APAP 500mg) = 세 가지 출처에서만 1,475mg. 일반 타이레놀 포함 시 4g 초과 위험. 모든 약물 목록 확인 필수."}, {"title": "Alcohol user warning", "title_kr": "음주자 경고", "body_en": "Patient who drinks alcohol daily is taking acetaminophen for PT-related pain. Alcohol + APAP induces CYP2E1 → increased toxic metabolite (NAPQI). Hepatotoxicity risk at much lower doses (2g/day).", "body_kr": "매일 음주 환자의 아세트아미노펜 복용 → CYP2E1 유도로 독성 대사물(NAPQI) 증가. 2g/일에서도 간독성 위험."}, {"title": "Post-PT pain management guidance", "title_kr": "PT 후 통증 관리 안내", "body_en": "Acetaminophen is first-line for mild-moderate musculoskeletal pain. Advantages over NSAIDs: safe in CKD (short-term), no platelet effect, OK in elderly. Max 3g/day recommended for older adults or liver risk patients.", "body_kr": "경-중등도 근골격계 통증의 1차 선택. NSAIDs 대비 장점: 단기 신기능 저하 환자 안전, 혈소판 영향 없음, 노인 가능. 노인·간 위험군은 3g/일 최대."}], "side_effects_en": ["Hepatotoxicity (>4g/day)", "Acute liver failure (overdose)", "Rash (rare)"], "side_effects_kr": ["간독성(4g/일 초과)", "급성 간부전(과용량)", "발진(드물게)"], "red_flags": ["Jaundice + APAP use → liver failure", "Overdose: N-acetylcysteine (Mucomyst) antidote", "Daily alcohol + APAP = hepatotoxicity at lower doses"], "red_flags_kr": ["황달 + APAP 복용 → 간부전", "과용량: N-아세틸시스테인 해독제", "매일 음주 + APAP = 저용량에서도 간독성"], "interactions_en": ["Warfarin: increases INR at high APAP doses", "Alcohol: hepatotoxicity at lower doses", "Isoniazid: hepatotoxicity risk"], "interactions_kr": ["와파린: 고용량 APAP 시 INR 상승", "알코올: 저용량에서도 간독성", "이소니아지드: 간독성 위험"], "chart_note_en": "Patient using Acetaminophen 500mg PRN for post-exercise soreness. Confirmed no other APAP-containing products. Non-drinker. Total APAP <2g/day.", "chart_note_kr": "아세트아미노펜 500mg PRN 복용 중(운동 후 통증). 다른 APAP 함유 제품 없음 확인. 비음주. 총 APAP 2g/일 미만.", "dosage": [{"form": "Pain", "normal": "325–1000mg q4–6h (max 4g/day)", "high": ">4g/day = hepatotoxic"}]}, {"id": "ibuprofen", "name": "Ibuprofen", "brand": "Advil / Motrin", "name_kr": "이부프로펜", "category": "Musculoskeletal", "category_kr": "근골격계", "class": "NSAID (Non-selective COX inhibitor)", "class_kr": "비선택적 COX 억제제(NSAID)", "rx": false, "risk": "moderate", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Ibuprofen_200mg_Zegerid.jpg/120px-Ibuprofen_200mg_Zegerid.jpg", "emoji": "💊", "summary_en": "Most common NSAID. Anti-inflammatory for acute MSK injury. GI risk, hypertension effect, nephrotoxicity.", "summary_kr": "가장 흔한 NSAID. 급성 근골격계 손상에 항염. 소화관 위험·혈압 상승·신독성.", "mechanism_en": "Reversibly inhibits COX-1 and COX-2 → ↓prostaglandins → ↓inflammation, pain, fever, platelet aggregation.", "mechanism_kr": "COX-1·2 가역적 억제 → 프로스타글란딘 감소 → 항염·진통·해열·혈소판 억제.", "onset": "30 min", "halflife": "2 hr", "scenarios": [{"title": "NSAID masking during PT", "title_kr": "PT 중 통증 은폐", "body_en": "Patient takes ibuprofen 800mg before PT 'to get through the session.' Problem: eliminates pain feedback → patient pushes beyond tissue tolerance → re-injury risk. Educate: use APAP or ice before PT, save NSAIDs for post-session if needed.", "body_kr": "PT 전 이부프로펜 복용으로 통증 은폐 → 조직 한계 초과 위험. PT 전 APAP 또는 얼음 사용 권고. NSAIDs는 세션 후 사용."}, {"title": "Kidney risk + dehydration", "title_kr": "신장 위험 + 탈수", "body_en": "Elderly patient on HCTZ + ibuprofen (OTC, self-medicating). Dehydration from diuretic + NSAID renal vasoconstriction = acute kidney injury risk. Ask: 'Do you take any pain relievers on your own?'", "body_kr": "이뇨제 + NSAIDs 복용 노인: 탈수 + 신장 혈관 수축 → 급성 신손상 위험. 'OTC 진통제 드시나요?' 반드시 확인."}, {"title": "Fracture healing concern", "title_kr": "골절 치유 우려", "body_en": "Post-fracture patient using ibuprofen for pain. NSAIDs may inhibit bone healing (especially first 2 weeks). Discuss with MD — acetaminophen may be preferred alternative. Document discussion.", "body_kr": "골절 후 이부프로펜 복용 → NSAIDs가 초기 골 치유 억제 가능(특히 첫 2주). 의사와 논의, APAP 대안 고려. 논의 내용 기록."}], "side_effects_en": ["GI irritation/ulcer", "Nephrotoxicity", "Elevated BP", "Platelet inhibition (reversible)", "Increased CV risk (long-term)"], "side_effects_kr": ["소화관 자극/궤양", "신독성", "혈압 상승", "혈소판 억제(가역적)", "심혈관 위험 증가(장기)"], "red_flags": ["Dark stool/hematemesis → GI bleed", "Edema + decreased urine output = renal issue", "Avoid in CKD, CHF, post-MI"], "red_flags_kr": ["검은 대변/토혈 → 소화관 출혈", "부종 + 소변량 감소 = 신장 문제", "CKD·심부전·심근경색 후 금기"], "interactions_en": ["Warfarin: increased bleeding", "ACE inhibitors/ARBs: nephrotoxic combo + blunts BP effect", "Corticosteroids: GI ulcer risk doubles"], "interactions_kr": ["와파린: 출혈 증가", "ACE억제제/ARB: 신독성 조합 + 혈압 효과 감소", "코르티코스테로이드: 소화관 궤양 위험 2배"], "chart_note_en": "Patient using OTC Ibuprofen 400mg PRN. Advised not to use before PT sessions to preserve pain feedback. No GI symptoms or edema.", "chart_note_kr": "OTC 이부프로펜 400mg PRN 복용. PT 세션 전 사용 금지 교육(통증 피드백 보존). 소화관 증상·부종 없음.", "dosage": [{"form": "Pain/inflammation", "normal": "400–600mg TID", "high": "800mg TID (Rx)"}]}, {"id": "prednisone", "name": "Prednisone", "brand": "Deltasone / generic", "name_kr": "프레드니손", "category": "Musculoskeletal", "category_kr": "근골격계", "class": "Systemic Corticosteroid", "class_kr": "전신 코르티코스테로이드", "rx": true, "risk": "high", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Prednisone_20mg_tablets.jpg/120px-Prednisone_20mg_tablets.jpg", "emoji": "⚠️", "summary_en": "Powerful anti-inflammatory. Long-term use = osteoporosis, myopathy, immune suppression, AVN. Weight gain and mood changes.", "summary_kr": "강력한 항염. 장기 사용 = 골다공증·근병증·면역 억제·무혈성 괴사. 체중 증가·기분 변화.", "mechanism_en": "Binds glucocorticoid receptors → ↓inflammatory cytokines, immune suppression. Causes protein catabolism, fat redistribution.", "mechanism_kr": "글루코코르티코이드 수용체 결합 → 염증 사이토카인 감소, 면역 억제. 단백질 이화·지방 재분포 유발.", "onset": "1–4 hr", "halflife": "3–4 hr (biological effect 18–36 hr)", "scenarios": [{"title": "Osteoporosis + fracture risk", "title_kr": "골다공증 + 골절 위험", "body_en": "Patient on prednisone >5mg/day for >3 months. HIGH fracture risk. PT fall prevention = priority 1. Weight-bearing exercise recommended for bone density but no high-impact. DEXA scan referral if not done.", "body_kr": "프레드니손 5mg 이상 3개월 이상 복용 → 골절 위험 높음. 낙상 예방 최우선. 체중부하 운동 권장하나 충격 운동 금지. DEXA 검사 미실시 시 의뢰."}, {"title": "Hip pain = AVN until proven otherwise", "title_kr": "고관절 통증 = 무혈성 괴사 의심", "body_en": "Long-term prednisone patient presents with new hip pain. Do NOT assume bursitis or muscle strain. Avascular necrosis (AVN) of femoral head is a known complication. Refer to MD for imaging before aggressive hip mobilization.", "body_kr": "장기 프레드니손 복용 중 새로운 고관절 통증 → 대퇴골두 무혈성 괴사(AVN) 가능성. 공격적 고관절 도수치료 전 영상 검사 의뢰."}, {"title": "Steroid myopathy differentiation", "title_kr": "스테로이드 근병증 감별", "body_en": "Patient on prednisone 30mg/day x 6 weeks presents with proximal muscle weakness (difficulty rising from chair). This is steroid myopathy — not treatable with more exercise. Refer to MD. Resistance exercise at LOW intensity may help, but confirm with prescriber.", "body_kr": "30mg 6주 복용 후 근위부 근력 약화(의자에서 일어나기 힘듦) → 스테로이드 근병증. 더 많은 운동으로 해결 안 됨. 의사 의뢰. 저강도 저항 운동 확인 후 가능."}, {"title": "Infection risk monitoring", "title_kr": "감염 위험 모니터링", "body_en": "Immunosuppressed patient on prednisone: any sign of infection during PT (fever, wound not healing, unusual skin changes) → refer promptly. No PT when patient is acutely febrile.", "body_kr": "면역 억제 환자 PT 중 감염 징후(발열·상처 불치유·피부 변화) → 즉시 의뢰. 발열 시 PT 금지."}], "side_effects_en": ["Osteoporosis", "Proximal myopathy", "Immunosuppression", "Hyperglycemia", "AVN (femoral head)", "Mood changes/insomnia", "Cushingoid features (long-term)"], "side_effects_kr": ["골다공증", "근위부 근병증", "면역 억제", "고혈당", "무혈성 괴사", "기분 변화/불면", "쿠싱 증후군(장기)"], "red_flags": ["New hip/knee pain in chronic user → AVN rule-out", "Vertebral fracture in elderly on steroids", "Fever/wound not healing = infection emergency"], "red_flags_kr": ["장기 복용자의 새 고관절/무릎 통증 → AVN 감별", "노인 척추 골절", "발열·상처 미치유 = 감염 응급"], "interactions_en": ["NSAIDs: GI ulcer risk", "Insulin/antidiabetics: counteracts glucose lowering", "Vaccines: reduced immune response (avoid live vaccines)"], "interactions_kr": ["NSAIDs: 소화관 궤양 위험", "인슐린/혈당강하제: 혈당 저하 효과 상쇄", "생백신: 면역 반응 감소(생백신 금지)"], "chart_note_en": "Patient on Prednisone 10mg QD x 4 months (RA). Fall risk screen: medium-high. Hip/knee pain: absent today. Weight-bearing strengthening with fall prevention focus.", "chart_note_kr": "프레드니손 10mg 4개월 복용 중(류마티스 관절염). 낙상 위험: 중-고. 오늘 고관절/무릎 통증 없음. 낙상 예방 중점 체중부하 근력 강화.", "dosage": [{"form": "Anti-inflammatory", "normal": "5–40mg QD", "high": ">40mg/day (acute)"}]}, {"id": "alendronate", "name": "Alendronate", "brand": "Fosamax", "name_kr": "알렌드로네이트", "category": "Musculoskeletal", "category_kr": "근골격계", "class": "Bisphosphonate", "class_kr": "비스포스포네이트", "rx": true, "risk": "moderate", "image": "", "emoji": "🦴", "summary_en": "Bisphosphonate for osteoporosis. Inhibits osteoclasts. Risk: atypical femur fracture (long-term), osteonecrosis of jaw.", "summary_kr": "골다공증 치료. 파골세포 억제. 장기 복용 위험: 비정형 대퇴골 골절, 턱뼈 괴사.", "mechanism_en": "Binds hydroxyapatite → inhibits osteoclast activity → ↓bone resorption → ↑bone density.", "mechanism_kr": "하이드록시아파타이트 결합 → 파골세포 활성 억제 → 골 흡수 감소 → 골밀도 증가.", "onset": "Bone density effect: months", "halflife": "10+ years (bone binding)", "scenarios": [{"title": "Atypical femur fracture in PT", "title_kr": "비정형 대퇴골 골절", "body_en": "Long-term bisphosphonate patient (>5 years) presents with thigh/groin pain without trauma. STOP weight-bearing exercise. Order X-ray/MRI referral. Atypical femoral fracture (subtrochanteric) can occur with minimal stress.", "body_kr": "비스포스포네이트 5년 이상 복용 환자의 외상 없는 허벅지/사타구니 통증 → 체중부하 운동 즉시 중지. 영상 검사 의뢰. 비정형 대퇴골 골절은 최소 스트레스로도 발생."}, {"title": "Administration education", "title_kr": "복용 방법 교육", "body_en": "Alendronate must be taken fasting, with full glass of water, remaining upright for 30 minutes. Esophageal erosion is serious. Ask patient: 'How do you take your Fosamax?' If incorrect, educate and document.", "body_kr": "공복, 물 한 컵, 복용 후 30분 직립 유지 필수. 식도 미란 심각한 부작용. 복용 방법 확인 및 교육 시행."}, {"title": "Drug holiday consideration", "title_kr": "약물 휴약 기간", "body_en": "Bisphosphonate >5 years: prescribers often consider 'drug holiday' (1–2 years off). Patient may ask PT about this. Answer: 'That's a medical decision, but it's a known practice. Discuss with your doctor at next appointment.'", "body_kr": "5년 이상 복용 시 1-2년 휴약 고려. 환자 질문 시: '의사와 상담하세요. 알려진 관행입니다.' 수준으로 답변."}], "side_effects_en": ["Esophageal erosion", "Atypical femur fracture (long-term)", "Osteonecrosis of jaw (ONJ)", "GI upset", "Hypocalcemia"], "side_effects_kr": ["식도 미란", "비정형 대퇴골 골절(장기)", "턱뼈 괴사(ONJ)", "소화불량", "저칼슘혈증"], "red_flags": ["Thigh/groin pain >5yr use → atypical fracture rule-out", "Jaw pain post-dental procedure = ONJ suspect", "New back pain = possible vertebral fracture"], "red_flags_kr": ["5년 이상 복용 중 허벅지/사타구니 통증 → 비정형 골절 감별", "치과 시술 후 턱 통증 = ONJ 의심", "새로운 등 통증 = 척추 골절 가능"], "interactions_en": ["Calcium/antacids: take 30+ min apart", "NSAIDs: additive GI risk"], "interactions_kr": ["칼슘/제산제: 30분 이상 간격", "NSAIDs: 소화관 위험 가중"], "chart_note_en": "Patient on Alendronate 70mg weekly (osteoporosis, DEXA T-score -2.8). No thigh/groin pain. Low-impact weight-bearing exercise. Fall prevention protocol active.", "chart_note_kr": "알렌드로네이트 70mg 주 1회 복용(골다공증, T점수 -2.8). 허벅지/사타구니 통증 없음. 저충격 체중부하 운동. 낙상 예방 프로토콜 시행.", "dosage": [{"form": "Osteoporosis", "normal": "10mg QD or 70mg weekly", "high": "Adjust for renal function"}]}, {"id": "gabapentin", "name": "Gabapentin", "brand": "Neurontin", "name_kr": "가바펜틴", "category": "Neurological", "category_kr": "신경계", "class": "Alpha-2-delta Ligand / Anticonvulsant", "class_kr": "알파2델타 리간드/항경련제", "rx": true, "risk": "moderate", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Gabapentin_300_mg_capsules.jpg/120px-Gabapentin_300_mg_capsules.jpg", "emoji": "🧠", "summary_en": "For neuropathic pain, fibromyalgia, post-herpetic neuralgia, DPN. Major PT risk: sedation, dizziness, ataxia.", "summary_kr": "신경병성 통증·섬유근통·대상포진 후 신경통·당뇨신경병증에 사용. PT 주요 위험: 진정·어지러움·운동실조.", "mechanism_en": "Binds α2δ subunit of voltage-gated Ca2+ channels in spinal cord → ↓glutamate/substance P release → pain modulation.", "mechanism_kr": "척수 전압개폐 칼슘채널 α2δ 소단위 결합 → 글루타메이트/P물질 방출 감소 → 통증 조절.", "onset": "1–2 weeks (neuropathic effect)", "halflife": "5–7 hr", "scenarios": [{"title": "Ataxia at session start", "title_kr": "세션 시작 시 운동실조", "body_en": "Patient on gabapentin 900mg TID arrives looking unsteady, slurred speech, eyes glazed. These are signs of gabapentin CNS depression — session is unsafe. Have patient sit/lie down, monitor, consider transportation home. Do NOT dismiss as 'just tired.'", "body_kr": "가바펜틴 900mg 복용 환자 불안정한 보행·언어 불명확·눈 초점 흐림 → CNS 억제 신호. 세션 위험. 앉히거나 눕히고 귀가 방법 확인. '피곤한 것'으로 무시 금지."}, {"title": "Opioid combination risk", "title_kr": "오피오이드 병용 위험", "body_en": "Gabapentin + opioids = significantly increased respiratory depression risk. Patient on both: monitor RR before and during PT. RR <12 = stop exercise. Naloxone availability in clinic is ideal.", "body_kr": "가바펜틴 + 오피오이드 = 호흡 억제 위험 현저히 증가. 세션 전후 호흡수 확인. 분당 12회 미만 → 운동 중지. 클리닉 내 날록손 비치 권장."}, {"title": "Fall risk in elderly", "title_kr": "노인의 낙상 위험", "body_en": "Elderly patient on gabapentin 600mg BID for DPN: dizziness + peripheral neuropathy = very high fall risk. Gait training with assistive device, parallel bars first. Document fall risk level HIGH.", "body_kr": "당뇨신경병증 노인 환자 가바펜틴 복용: 어지러움 + 말초신경병증 = 매우 높은 낙상 위험. 보조 기구·평행봉부터 보행 훈련. 낙상 위험도 HIGH 기록."}, {"title": "Dose timing inquiry", "title_kr": "복용 타이밍 문의", "body_en": "If patient asks: 'Should I take my gabapentin before or after PT?' — generally, taking it AFTER PT session is preferred to avoid sedation during exercise. But always defer to prescriber's instructions.", "body_kr": "환자가 복용 타이밍 문의 시: 일반적으로 PT 세션 후 복용이 운동 중 진정 효과 회피에 유리. 그러나 처방의 지시 우선."}], "side_effects_en": ["Sedation/somnolence", "Dizziness", "Ataxia", "Weight gain", "Peripheral edema", "Cognitive blunting"], "side_effects_kr": ["진정/졸음", "어지러움", "운동실조", "체중 증가", "말초 부종", "인지 둔화"], "red_flags": ["Ataxia + slurred speech on arrival → cancel session", "RR <12 with opioid combo → emergent", "Suicidal ideation (black box warning for anticonvulsants)"], "red_flags_kr": ["운동실조 + 언어 불명확 → 세션 취소", "오피오이드 병용 중 호흡수 12회 미만 → 응급", "자살 충동(항경련제 블랙박스 경고)"], "interactions_en": ["Opioids: respiratory depression", "Benzodiazepines: CNS depression", "Alcohol: additive sedation"], "interactions_kr": ["오피오이드: 호흡 억제", "벤조디아제핀: CNS 억제", "알코올: 진정 효과 가중"], "chart_note_en": "Patient on Gabapentin 600mg TID for DPN. Gait: mildly ataxic, ambulatory with SPC. Fall risk: HIGH. Berg Balance Score 42/56. Exercise intensity limited per neurological status.", "chart_note_kr": "가바펜틴 600mg 1일 3회(당뇨신경병증). 보행: 경미한 운동실조, 지팡이로 보행 가능. 낙상 위험: 높음. Berg Balance 42/56. 신경학적 상태에 따라 운동 강도 제한.", "dosage": [{"form": "Neuropathic pain", "normal": "300–600mg TID", "high": "1800–3600mg/day"}]}, {"id": "baclofen", "name": "Baclofen", "brand": "Lioresal / Gablofen", "name_kr": "바클로펜", "category": "Neurological", "category_kr": "신경계", "class": "GABA-B Agonist / Antispastic", "class_kr": "GABA-B 작용제/항경직제", "rx": true, "risk": "moderate", "image": "", "emoji": "🧠", "summary_en": "Antispastic for MS, SCI, CP. Profound sedation. NEVER stop abruptly — withdrawal seizures possible.", "summary_kr": "다발성경화증·척수손상·뇌성마비 경직 치료. 강한 진정 효과. 갑작스러운 중단 절대 금지(경련 위험).", "mechanism_en": "GABA-B receptor agonist in spinal cord → inhibits monosynaptic/polysynaptic reflexes → ↓spasticity.", "mechanism_kr": "척수 GABA-B 수용체 작용 → 단시냅스/다시냅스 반사 억제 → 경직 감소.", "onset": "30–60 min", "halflife": "2–6 hr", "scenarios": [{"title": "Abrupt withdrawal danger", "title_kr": "갑작스러운 중단 위험", "body_en": "Patient with MS on baclofen 20mg TID: 'I ran out of baclofen 3 days ago.' URGENT: baclofen withdrawal = fever, severe spasticity, hallucinations, seizures. Refer to prescriber IMMEDIATELY. Document and notify physician.", "body_kr": "바클로펜 3일 전 중단 → 응급: 발열·심한 경직·환각·경련 가능. 즉시 처방의에게 연락. 기록 후 의사 통보 필수."}, {"title": "Sedation affecting PT quality", "title_kr": "진정 효과로 PT 질 저하", "body_en": "SCI patient on baclofen 40mg BID: extreme drowsiness first 2 hours after dose. Schedule PT 2–3 hours after their last dose for optimal participation. Coordinate with nursing/caregivers for timing.", "body_kr": "복용 후 2시간이 진정 효과 최고점. PT 세션은 마지막 복용 2-3시간 후로 계획. 간호사·보호자와 타이밍 조율."}, {"title": "Spasticity as functional asset", "title_kr": "경직의 기능적 자산", "body_en": "SCI patient with some spasticity: do NOT simply request more baclofen. Some spasticity helps with transfers, standing, bladder management. Discuss optimal dose with prescriber — reducing spasticity too much can reduce function.", "body_kr": "경직이 이동·서기·방광 관리에 도움이 되는 경우도 있음. 단순히 약량 증가 요청 금지. 처방의와 최적 용량 논의."}], "side_effects_en": ["Sedation (major)", "Muscle weakness", "Hypotonia", "Dizziness", "Seizures on withdrawal"], "side_effects_kr": ["진정(주요)", "근력 약화", "저긴장", "어지러움", "금단 경련"], "red_flags": ["Abrupt discontinuation → SEIZURE risk → refer emergently", "Fever + confusion in baclofen user → withdrawal", "Intrathecal pump failure = withdrawal emergency"], "red_flags_kr": ["갑작스러운 중단 → 경련 위험 → 응급 의뢰", "발열 + 혼동 → 금단 증상", "척수강 내 펌프 오작동 = 응급"], "interactions_en": ["CNS depressants: additive sedation", "Alcohol: profound CNS depression", "TCA antidepressants: increased CNS side effects"], "interactions_kr": ["CNS 억제제: 진정 효과 가중", "알코올: 심각한 CNS 억제", "삼환계 항우울제: CNS 부작용 증가"], "chart_note_en": "Patient on Baclofen 20mg TID (MS spasticity). Session timed 2.5hr post-dose. MAS (Modified Ashworth) R LE: 2+/4. Functional transfer training focus.", "chart_note_kr": "바클로펜 20mg 1일 3회(MS 경직). 복용 2.5시간 후 세션 시행. MAS 우측 하지 2+/4. 기능적 이동 훈련 중심.", "dosage": [{"form": "Spasticity", "normal": "5–20mg TID", "high": "80mg/day max"}]}, {"id": "tizanidine", "name": "Tizanidine", "brand": "Zanaflex", "name_kr": "티자니딘", "category": "Neurological", "category_kr": "신경계", "class": "Alpha-2 Adrenergic Agonist / Antispastic", "class_kr": "알파2 작용제/항경직제", "rx": true, "risk": "moderate", "image": "", "emoji": "💤", "summary_en": "Short-acting muscle relaxant/antispastic. Very sedating. Hypotension risk. Hepatotoxicity (rare). Do NOT use with ciprofloxacin.", "summary_kr": "단기 근이완/항경직제. 매우 강한 진정 효과. 저혈압 위험. 간독성(드물게). 시프로플록사신 병용 절대 금지.", "mechanism_en": "Alpha-2 agonist in spinal cord → inhibits spinal interneurons → ↓spasticity. Also reduces norepinephrine → hypotension.", "mechanism_kr": "척수 알파2 작용 → 척수 중간뉴런 억제 → 경직 감소. 노르에피네프린 감소 → 저혈압.", "onset": "1–2 hr (peak 1.5 hr)", "halflife": "2.5 hr", "scenarios": [{"title": "Profound sedation + PT", "title_kr": "심한 진정 효과 + PT", "body_en": "Tizanidine 8mg peaks 1.5hr post-dose with intense sedation. Schedule PT BEFORE dose or 3+ hours after. Patient may appear drunk — eyes drooping, slurred, slow movements. Driving after dose is dangerous.", "body_kr": "복용 1.5시간 후 최고 진정 효과. PT는 복용 전 또는 3시간 이상 후 계획. 환자가 술 취한 것처럼 보일 수 있음. 복용 후 운전 위험 교육."}, {"title": "Hypotension during position changes", "title_kr": "자세 변경 시 저혈압", "body_en": "Tizanidine + antihypertensive: BP can drop significantly on position change. Tilt table use with tizanidine = extra caution. Measure BP lying/sitting/standing. Tilt progression must be slow.", "body_kr": "티자니딘 + 혈압약 병용: 자세 변경 시 BP 큰 폭 하강. 틸트 테이블 사용 시 각별 주의. 와위→앉기→서기 혈압 측정 필수. 기울기 천천히."}, {"title": "Ciprofloxacin absolute contraindication", "title_kr": "시프로플록사신 절대 금기", "body_en": "Patient on tizanidine prescribed ciprofloxacin (common UTI antibiotic): THIS IS A MAJOR DRUG INTERACTION. Cipro inhibits tizanidine metabolism → toxic blood levels → profound hypotension, sedation. Notify prescriber immediately.", "body_kr": "티자니딘 + 시프로플록사신(흔한 요로감염 항생제): 중대 약물 상호작용. 시프로가 티자니딘 대사 억제 → 독성 혈중 농도 → 심각한 저혈압·진정. 즉시 처방의에게 알릴 것."}], "side_effects_en": ["Sedation (major)", "Hypotension", "Dry mouth", "Hepatotoxicity (rare)", "Dizziness", "Weakness"], "side_effects_kr": ["진정(주요)", "저혈압", "구강건조", "간독성(드물게)", "어지러움", "근력 약화"], "red_flags": ["Ciprofloxacin co-prescription → notify MD immediately", "BP drop >20mmHg on position change during PT", "Jaundice in long-term user → hepatotoxicity"], "red_flags_kr": ["시프로플록사신 병용 → 즉시 의사에게 알림", "자세 변경 시 20mmHg 이상 BP 하강", "장기 복용 중 황달 → 간독성"], "interactions_en": ["Ciprofloxacin: MAJOR — toxic levels", "Antihypertensives: additive hypotension", "Alcohol/CNS depressants: profound sedation", "OCP: increases tizanidine levels"], "interactions_kr": ["시프로플록사신: 금기 - 독성 수준", "혈압약: 저혈압 가중", "알코올/CNS억제제: 심각한 진정", "경구피임약: 티자니딘 혈중 농도 증가"], "chart_note_en": "Patient on Tizanidine 4mg TID for spasticity. PT session scheduled 30 min before pm dose. BP 118/72 (lying) → 106/68 (standing): acceptable. No ciprofloxacin or other contraindicated drugs per patient report.", "chart_note_kr": "티자니딘 4mg 1일 3회(경직). 오후 복용 30분 전 PT 세션. BP 118/72(와위)→106/68(서기): 허용 범위. 시프로플록사신 등 금기 약물 없음 확인.", "dosage": [{"form": "Spasticity", "normal": "4–8mg q6–8h PRN", "high": "36mg/day max"}]}, {"id": "duloxetine", "name": "Duloxetine", "brand": "Cymbalta", "name_kr": "둘록세틴", "category": "Neurological", "category_kr": "신경계", "class": "SNRI Antidepressant", "class_kr": "세로토닌·노르에피네프린 재흡수 억제제(SNRI)", "rx": true, "risk": "moderate", "image": "", "emoji": "🧠", "summary_en": "SNRI for depression, anxiety, fibromyalgia, DPN, chronic pain. Used widely in PT patients. Serotonin syndrome risk with tramadol.", "summary_kr": "우울증·불안·섬유근통·당뇨신경병증·만성 통증에 사용. PT 환자에서 매우 흔함. 트라마돌과 세로토닌 증후군 위험.", "mechanism_en": "Inhibits serotonin + norepinephrine reuptake → mood elevation, pain modulation (descending inhibition).", "mechanism_kr": "세로토닌 + 노르에피네프린 재흡수 억제 → 기분 향상, 통증 조절(하행 억제 강화).", "onset": "2–4 weeks (full effect)", "halflife": "12 hr", "scenarios": [{"title": "Serotonin syndrome with tramadol", "title_kr": "트라마돌과 세로토닌 증후군", "body_en": "Patient on duloxetine prescribed tramadol for acute PT pain. HIGH RISK: serotonin syndrome (agitation, fever, diaphoresis, clonus, tachycardia). If patient shows these signs during PT — 911 immediately. Report to prescriber before patient takes tramadol.", "body_kr": "둘록세틴 복용 중 트라마돌 추가 처방 → 세로토닌 증후군 고위험: 초조·발열·발한·간대성경련·빈맥. PT 중 이 증상 → 즉시 119. 처방 전 처방의에게 알릴 것."}, {"title": "Pain modulation benefit", "title_kr": "통증 조절 이점", "body_en": "Duloxetine for fibromyalgia: patient may have improved pain tolerance allowing better PT participation. Monitor for over-exertion — pain suppression means reduced protective feedback.", "body_kr": "섬유근통 환자의 둘록세틴: 통증 내성 향상으로 PT 참여 개선 가능. 단, 통증 억제로 과운동 위험 → 주관적 호소보다 객관적 기능 평가 중심."}, {"title": "Hypertension monitoring", "title_kr": "혈압 모니터링", "body_en": "SNRI increases norepinephrine → mild BP elevation possible. Monitor BP in hypertensive patients starting duloxetine. Coordinate with prescriber if consistent BP increase noted during PT sessions.", "body_kr": "SNRIs는 노르에피네프린 증가로 혈압 소폭 상승 가능. 고혈압 환자의 둘록세틴 시작 시 PT 세션 중 혈압 모니터링."}, {"title": "Discontinuation syndrome", "title_kr": "중단 증후군", "body_en": "Patient stopped duloxetine abruptly: 'electric shock' sensations (brain zaps), dizziness, flu-like symptoms. This is discontinuation syndrome, not withdrawal. Reassure patient; PT can continue. Advise physician about tapering.", "body_kr": "갑작스러운 중단 시 '전기 충격' 느낌·어지러움·독감 유사 증상 = 중단 증후군(금단과 다름). PT 지속 가능. 의사에게 서서히 감량 권고."}], "side_effects_en": ["Nausea", "Dry mouth", "Insomnia", "Dizziness", "BP elevation", "Sweating", "Serotonin syndrome (with serotonergic drugs)"], "side_effects_kr": ["구역", "구강건조", "불면", "어지러움", "혈압 상승", "발한", "세로토닌 증후군(세로토닌 약물과)"], "red_flags": ["Tramadol + duloxetine = serotonin syndrome risk → notify MD", "Fever + agitation + clonus during PT = serotonin syndrome → 911", "Suicidal ideation (SNRI black box)"], "red_flags_kr": ["트라마돌 + 둘록세틴 = 세로토닌 증후군 → 의사에게 알림", "PT 중 발열+초조+간대성경련 = 세로토닌 증후군 → 119", "자살 충동(SNRI 블랙박스)"], "interactions_en": ["Tramadol: serotonin syndrome", "MAOIs: serotonin syndrome (absolute contraindication)", "Warfarin: may alter bleeding risk", "NSAIDs: additive GI/bleeding risk"], "interactions_kr": ["트라마돌: 세로토닌 증후군", "MAOIs: 세로토닌 증후군(절대 금기)", "와파린: 출혈 위험 변화", "NSAIDs: 소화관/출혈 위험 가중"], "chart_note_en": "Patient on Duloxetine 60mg QD (fibromyalgia). Pain VAS 4/10 today (improved from 7/10). No tramadol or other serotonergic drugs reported. Exercise tolerance improving.", "chart_note_kr": "둘록세틴 60mg 1일 1회(섬유근통). 통증 VAS 4/10(7/10에서 개선). 트라마돌 등 세로토닌 약물 없음 확인. 운동 내성 호전 중.", "dosage": [{"form": "Depression/Pain", "normal": "30–60mg QD", "high": "120mg/day"}]}, {"id": "oxycodone", "name": "Oxycodone", "brand": "OxyContin / Percocet", "name_kr": "옥시코돈", "category": "Pain", "category_kr": "통증", "class": "Opioid Agonist (Schedule II)", "class_kr": "오피오이드 작용제(II급 규제약물)", "rx": true, "risk": "high", "image": "", "emoji": "🚨", "summary_en": "Potent opioid. Percocet = oxycodone + APAP. Respiratory depression = overdose. Check RR before PT. Narcan (naloxone) awareness.", "summary_kr": "강력한 오피오이드. Percocet = 옥시코돈 + APAP. 호흡 억제 = 과용량. PT 전 호흡수 확인. 날록손 인지.", "mechanism_en": "Binds mu-opioid receptors in CNS → analgesia, euphoria, respiratory depression, constipation.", "mechanism_kr": "뮤 오피오이드 수용체 결합 → 진통·도취감·호흡 억제·변비.", "onset": "10–30 min (IR)", "halflife": "3–5 hr (IR) / 12 hr (ER)", "scenarios": [{"title": "Overdose triad recognition", "title_kr": "과용량 3징후 인식", "body_en": "Patient on oxycodone arrives for PT: pinpoint pupils (miosis) + respiratory rate <12 + decreased level of consciousness = OPIOID OVERDOSE TRIAD. Call 911 immediately. If clinic has naloxone (Narcan), administer per protocol.", "body_kr": "옥시코돈 복용 환자 도착 시: 점상 동공 + 호흡수 12 미만 + 의식 저하 = 오피오이드 과용량 3징후 → 즉시 119. 날록손 있으면 프로토콜 따라 투여."}, {"title": "Pain masking during exercise", "title_kr": "운동 중 통증 은폐", "body_en": "Post-surgical patient on oxycodone able to complete aggressive ROM. But opioids mask pain → tissue damage risk without feedback. Limit ROM to anatomically safe ranges, not patient-reported pain tolerance.", "body_kr": "수술 후 옥시코돈 복용 환자 공격적 ROM 가능 → 통증 은폐로 조직 손상 위험. ROM을 환자 통증 허용 범위가 아닌 해부학적 안전 범위로 제한."}, {"title": "APAP calculation (Percocet)", "title_kr": "APAP 계산(Percocet)", "body_en": "Percocet 5/325 = 5mg oxycodone + 325mg APAP. Patient taking 2 tabs q6h = 2600mg APAP/day from Percocet alone. Add regular Tylenol or NyQuil → easily approaching 4g hepatotoxic threshold.", "body_kr": "Percocet 5/325 x 2정 x 4회 = APAP 2600mg/일. 추가 타이레놀 복용 시 4g 간독성 한계치 근접. 모든 약물의 APAP 총량 계산 필수."}, {"title": "Constipation and back pain", "title_kr": "변비와 요통", "body_en": "Opioid-induced constipation is near-universal (90%+). Severe straining during Valsalva worsens lumbar disc pressure. Ask opioid patients: 'How are your bowels?' If severe constipation, address with MD before aggressive lumbar exercise.", "body_kr": "오피오이드 유발 변비는 거의 100%. 심한 힘주기 시 요추 디스크 압력 악화. 오피오이드 환자의 배변 상태 확인. 심한 변비 시 요추 운동 전 의사 상담."}], "side_effects_en": ["Respiratory depression (overdose)", "Constipation", "Nausea", "Sedation", "Dependence", "Pruritus"], "side_effects_kr": ["호흡 억제(과용량)", "변비", "구역", "진정", "의존성", "소양증"], "red_flags": ["RR <12 + miosis + LOC = OVERDOSE → 911 + Narcan", "RR <12 at session start → cancel PT, call MD", "Rapid dose escalation = tolerance/addiction concern"], "red_flags_kr": ["호흡수 12 미만 + 점상동공 + 의식저하 = 과용량 → 119 + 날록손", "세션 시작 시 호흡수 12 미만 → PT 취소, 의사 연락", "빠른 용량 증가 = 내성/의존 우려"], "interactions_en": ["Benzodiazepines: BLACK BOX respiratory depression", "Gabapentin: respiratory depression", "Alcohol: CNS/respiratory depression", "MAOIs: serotonin syndrome"], "interactions_kr": ["벤조디아제핀: 블랙박스 호흡 억제", "가바펜틴: 호흡 억제", "알코올: CNS/호흡 억제", "MAOIs: 세로토닌 증후군"], "chart_note_en": "Patient on Oxycodone 5mg q6h PRN post-op. RR 16 at session start. Pain VAS 3/10 with medication. ROM limited to anatomically safe ranges per opioid use protocol. No miosis observed.", "chart_note_kr": "수술 후 옥시코돈 5mg PRN 복용. 세션 시작 시 호흡수 16. 투약 후 통증 VAS 3/10. 오피오이드 사용 프로토콜에 따라 해부학적 안전 범위로 ROM 제한. 점상동공 없음.", "dosage": [{"form": "Pain", "normal": "5–15mg q4–6h IR", "high": "Dose escalation = tolerance/addiction risk"}]}, {"id": "albuterol", "name": "Albuterol", "brand": "ProAir / Ventolin / Proventil", "name_kr": "알부테롤", "category": "Respiratory", "category_kr": "호흡기", "class": "Short-Acting Beta-2 Agonist (SABA)", "class_kr": "단기 베타2 작용제(SABA)", "rx": true, "risk": "low", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Salbutamol_Inhaler.jpg/120px-Salbutamol_Inhaler.jpg", "emoji": "💨", "summary_en": "Rescue inhaler for asthma/COPD. Use 20 min before exercise (EIB). Tachycardia and tremor are common. Use >2x/week = not well controlled.", "summary_kr": "천식/COPD 구조 흡입기. 운동 유발 기관지경련 예방: 운동 20분 전 사용. 빈맥·진전 흔함. 주 2회 초과 사용 = 미조절 상태.", "mechanism_en": "β2 agonist → smooth muscle relaxation → bronchodilation. Onset 5–15 min, duration 4–6 hr.", "mechanism_kr": "β2 작용 → 기관지 평활근 이완 → 기관지 확장. 발현 5-15분, 지속 4-6시간.", "onset": "5–15 min", "halflife": "3–8 hr", "scenarios": [{"title": "Pre-exercise EIB prevention", "title_kr": "운동 유발 기관지경련 예방", "body_en": "Exercise-induced bronchospasm (EIB) patient: albuterol 2 puffs 15–20 min before PT session. Ensure patient has inhaler available during all PT sessions. Warm-up period especially important.", "body_kr": "운동 유발 기관지경련 환자: PT 세션 15-20분 전 알부테롤 2회 흡입. 세션 중 흡입기 항상 휴대. 충분한 준비 운동 특히 중요."}, {"title": "Acute bronchospasm during PT", "title_kr": "PT 중 급성 기관지경련", "body_en": "Patient develops audible wheeze + dyspnea during treadmill. STOP exercise. Have patient use rescue inhaler (2 puffs). If no relief in 15 min → 911. SpO2 <90% → oxygen + 911.", "body_kr": "트레드밀 중 청진 가능한 천명음 + 호흡 곤란 → 운동 즉시 중지. 구조 흡입기 2회 흡입. 15분 후 호전 없음 → 119. SpO2 90% 미만 → 산소 투여 + 119."}, {"title": "Tachycardia interpretation", "title_kr": "빈맥 해석", "body_en": "Patient HR 108 after albuterol use + mild exercise. This may be medication effect, not just exercise HR. Do NOT push intensity based on HR target — patient may already be at albuterol-induced tachycardia baseline. Use SpO2 and RPE for guidance.", "body_kr": "알부테롤 + 운동 후 HR 108 → 약물 효과로 HR 기저치 상승 가능. HR 목표로 강도 조절 금지. SpO2와 RPE 사용."}, {"title": "Overuse = poor control", "title_kr": "과사용 = 미조절 신호", "body_en": "Patient reports using rescue inhaler daily. This indicates poorly controlled asthma. PT cannot be the asthma manager, but document frequency and refer to pulmonologist for controller medication (ICS/LABA) optimization.", "body_kr": "매일 구조 흡입기 사용 = 미조절 천식. PT가 관리할 수 없음. 사용 빈도 기록 후 호흡기 전문의 의뢰. 조절약(ICS/LABA) 최적화 필요."}], "side_effects_en": ["Tachycardia", "Tremor (skeletal muscle)", "Hypokalemia (high dose)", "Palpitations", "Nervousness/anxiety"], "side_effects_kr": ["빈맥", "진전(골격근)", "저칼륨혈증(고용량)", "심계항진", "초조/불안"], "red_flags": ["Wheeze + dyspnea unresponsive to 2 puffs after 15 min → 911", "SpO2 <90% → 911 + supplemental O2", "HR >150 post-albuterol at rest = excessive response"], "red_flags_kr": ["2회 흡입 15분 후 호전 없는 천명음+호흡곤란 → 119", "SpO2 90% 미만 → 119 + 보충 산소", "안정 시 알부테롤 후 HR 150 초과 = 과도한 반응"], "interactions_en": ["Beta-blockers: block bronchodilation (avoid non-selective BB in asthma)", "MAOIs: tachycardia", "Diuretics: hypokalemia synergy"], "interactions_kr": ["베타차단제: 기관지 확장 차단(천식에 비선택적 BB 금기)", "MAOIs: 빈맥", "이뇨제: 저칼륨혈증 상승"], "chart_note_en": "Patient with asthma, on Albuterol PRN. 2 puffs administered 15 min pre-exercise. No wheeze or dyspnea during session. SpO2 98%. HR peaked at 112 (attributed to partial albuterol effect + exercise).", "chart_note_kr": "천식 환자, 알부테롤 PRN. 운동 15분 전 2회 흡입. 세션 중 천명음·호흡곤란 없음. SpO2 98%. HR 최고 112(알부테롤 + 운동 효과).", "dosage": [{"form": "Rescue", "normal": "2 puffs (180mcg) q4–6h PRN", "high": "Frequent use = poor control"}]}, {"id": "metformin", "name": "Metformin", "brand": "Glucophage", "name_kr": "메트포르민", "category": "Endocrine", "category_kr": "내분비", "class": "Biguanide / Antidiabetic", "class_kr": "비구아나이드/항당뇨병제", "rx": true, "risk": "low", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Metformin_500mg.jpg/120px-Metformin_500mg.jpg", "emoji": "💊", "summary_en": "First-line for Type 2 DM. Does NOT cause hypoglycemia alone. Lactic acidosis (rare). Hold before contrast dye procedures.", "summary_kr": "2형 당뇨 1차 선택. 단독으로는 저혈당 유발 안 함. 젖산 산증(드물게). 조영제 시술 전 중단.", "mechanism_en": "↓hepatic gluconeogenesis, ↑insulin sensitivity, ↓intestinal glucose absorption. Does not stimulate insulin secretion.", "mechanism_kr": "간의 포도당 신생합성 억제, 인슐린 감수성 증가, 장의 포도당 흡수 감소. 인슐린 분비 자극 없음.", "onset": "1–3 days (full effect weeks)", "halflife": "4–9 hr", "scenarios": [{"title": "Exercise + metformin synergy", "title_kr": "운동 + 메트포르민 시너지", "body_en": "Metformin and aerobic exercise have additive glucose-lowering effects through similar mechanisms. Reinforce exercise adherence — PT is actually augmenting the drug's mechanism. Educate patient on this synergy.", "body_kr": "메트포르민과 유산소 운동은 유사한 기전으로 혈당 강하 상가 효과. PT가 약물 기전 강화 역할. 환자에게 이 시너지 교육 가능."}, {"title": "No hypoglycemia concern alone", "title_kr": "단독 저혈당 위험 없음", "body_en": "Metformin alone does NOT cause hypoglycemia (unlike insulin or sulfonylureas). If patient on ONLY metformin experiences hypoglycemic symptoms during PT, consider other causes: skipped meal, other medication, underlying condition.", "body_kr": "메트포르민 단독 저혈당 유발 없음. 메트포르민만 복용 중 저혈당 증상 시 다른 원인 탐색: 결식, 다른 약물, 기저 질환."}, {"title": "GI symptoms timing", "title_kr": "소
